<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読み込み中...</title>
</head>
<body>
<script>
const d = new URLSearchParams(location.search).get('d');
if (!d) {
  document.body.textContent = 'エラー: ?d= パラメータが必要です（例: /quiz.html?d=tests/xxx/data.json）';
} else {
  fetch('/' + d)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      const src = data.problems ? '/js/nekku-engine.js' : '/js/quiz-engine.js';
      const fn  = data.problems ? 'initNekku' : 'initQuiz';
      const s = document.createElement('script');
      s.src = src;
      s.onload = () => window[fn](data);
      document.head.appendChild(s);
    })
    .catch(e => { document.body.style.cssText = 'font:1rem sans-serif;padding:40px;color:#e7eef7;background:#0a1626'; document.body.textContent = 'データ読み込みエラー: ' + e.message; });
}
</script>
</body>
</html>
