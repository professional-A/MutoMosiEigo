<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>熱流体工学Ⅰ 中間試験対策</title>
<style>
  :root{
    --bg:#0f1117;--card:#1a1d2e;--card2:#242740;
    --accent:#7c6af7;--accent2:#56cfb2;--text:#e8eaf6;
    --muted:#9ca3af;--border:#2d3154;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Noto Sans JP',sans-serif;font-size:15px;line-height:1.7;padding-bottom:60px}
  header{background:linear-gradient(135deg,#1a1d2e,#0d0f1a);border-bottom:2px solid var(--accent);padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
  header h1{font-size:1.2rem;color:var(--accent)}
  header small{color:var(--muted);font-size:.8rem}
  .back-btn{margin-left:auto;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;text-decoration:none;font-size:.85rem;white-space:nowrap}

  .score-wrap{max-width:860px;margin:14px auto;padding:0 16px}
  .score-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:14px}
  .score-track{flex:1;height:10px;background:var(--card2);border-radius:99px;overflow:hidden}
  .score-fill{height:100%;background:var(--accent2);border-radius:99px;transition:width .4s}
  .score-num{font-size:1.05rem;font-weight:700;color:var(--accent2);white-space:nowrap}
  .score-label{font-size:.78rem;color:var(--muted);white-space:nowrap}
  .reset-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:.76rem;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:inherit}
  .reset-btn:hover{border-color:var(--accent);color:var(--accent)}

  main{max-width:860px;margin:0 auto;padding:0 16px}

  .prob{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;transition:border-color .2s}
  .prob.all-ok{border-color:#4caf50}
  .prob.has-ng{border-color:#f44336}

  .prob-head{background:var(--card2);padding:9px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
  .prob-no{font-weight:700;color:var(--accent);min-width:30px;font-size:.9rem}
  .badge{font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:600}
  .b1{background:#3b4fd8;color:#fff}
  .b2{background:#2e7d32;color:#fff}
  .b3{background:#e65100;color:#fff}
  .b4{background:#6a1b9a;color:#fff}
  .prob-tag{font-size:.8rem;color:var(--muted);margin-left:auto}

  .prob-body{padding:14px 16px}
  .prob-q{font-size:.93rem;line-height:1.8;margin-bottom:12px}
  .prob-q code{font-family:monospace;background:var(--card2);padding:1px 6px;border-radius:3px;font-size:.88em;color:#a5b4fc}

  .part{margin-bottom:8px}
  .part-label{font-size:.82rem;color:var(--accent2);font-weight:600;margin-bottom:4px}
  .input-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .ans-input{background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:.95rem;padding:7px 10px;border-radius:7px;width:130px;font-family:monospace;outline:none;transition:border-color .2s}
  .ans-input:focus{border-color:var(--accent)}
  .unit{color:var(--muted);font-size:.85rem;font-family:monospace;white-space:nowrap}
  .chk-btn{background:var(--accent);border:none;color:#fff;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:600;font-family:inherit;white-space:nowrap}
  .chk-btn:hover{opacity:.85}
  .part-fb{font-size:.82rem;font-weight:600;margin-top:3px;min-height:18px}
  .part-fb.ok{color:#a5d6a7}
  .part-fb.ng{color:#ef9a9a}

  .prob-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .hint-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:7px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:.15s}
  .hint-btn:hover{border-color:var(--accent2);color:var(--accent2)}
  .reveal-btn{background:none;border:1px solid #333;color:#777;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:.15s}
  .reveal-btn:hover{border-color:#666;color:var(--text)}

  .hint-box{background:#1a1a2a;border-left:3px solid var(--accent2);padding:9px 14px;border-radius:0 6px 6px 0;font-family:monospace;font-size:.85rem;color:#a5b4fc;margin-top:10px;display:none;line-height:1.8}
  .hint-box.show{display:block}
  .ans-box{background:#1a2a1a;border-left:3px solid #4caf50;padding:9px 14px;border-radius:0 6px 6px 0;font-size:.85rem;color:#a5d6a7;margin-top:8px;display:none;line-height:1.85}
  .ans-box.show{display:block}

  .note{font-size:.78rem;color:var(--muted);background:rgba(255,204,100,.08);border:1px solid rgba(255,204,100,.25);border-radius:6px;padding:6px 12px;margin-bottom:12px}
</style>

<header>
  <div>
    <h1>📝 熱流体工学Ⅰ 中間試験対策</h1>

<main id="main"></main>

<script>
/* ──────────────────────────────────────────
   問題データ
   parts: [{label, unit, ans, isAngle}]
   isAngle=true → |val-ans|<=2 で正解
   それ以外     → |val-ans|/|ans|<=0.02
────────────────────────────────────────── */
const PROBS = [
  {
    no:1, ch:'第1章', chN:1, tag:'動粘度',
    q:'間隙 <code>Y = 1.0 mm</code>、比重 <code>s = 0.90</code> の油が満たされたシリンダを、速度 <code>U = 5.0 m/s</code> でピストンが動いている。シリンダ面のせん断応力が <code>τ = 3.60 Pa</code> のとき、この油の動粘度 <code>ν</code> を求めよ。<br><span style="font-size:.8rem;color:#9ca3af">（小さい数は <code>8e-7</code> のように入力可）</span>',
    hint:'① τ = μ(U/Y) → μ = τY/U\n② ρ = s × 1000\n③ ν = μ/ρ',
    reveal:['μ = 3.60 × 0.001 / 5.0 = 7.20×10⁻⁴ Pa·s','ρ = 0.90 × 1000 = 900 kg/m³','ν = 7.20×10⁻⁴ / 900 = 8.00×10⁻⁷ m²/s'],
    parts:[{label:'', unit:'m²/s', ans:8.00e-7, isAngle:false}]
  },
  {
    no:2, ch:'第1章', chN:1, tag:'両面せん断',
    q:'間隔 <code>h = 20 mm</code> の固定平行2平面に <code>μ = 0.80 Pa·s</code> の油が満たされている。面積 <code>A = 0.30 m²</code> の薄い板を、固定面から <code>Y₁ = 8.0 mm</code> の位置に置き、速度 <code>U = 0.50 m/s</code> で引くのに必要な力 <code>F</code> を求めよ。',
    hint:'F = μAU(1/Y₁ + 1/Y₂)　（Y₂ = h − Y₁ = 12 mm）',
    reveal:['Y₂ = 20 − 8.0 = 12.0 mm','F = 0.80 × 0.30 × 0.50 × (1/0.008 + 1/0.012)','= 0.12 × (125 + 83.3) = 0.12 × 208.3 = 25.0 N'],
    parts:[{label:'', unit:'N', ans:25.0, isAngle:false}]
  },
  {
    no:3, ch:'第1章', chN:1, tag:'傾斜面滑落',
    q:'底面積 <code>A = 0.04 m²</code>、質量 <code>m = 40 kg</code> の物体が、傾斜角 <code>θ = 30°</code> の斜面上を油膜（厚さ <code>δ = 0.020 mm</code>、粘性係数 <code>μ = 0.020 Pa·s</code>）の上を滑落する。到達できる最大速度 <code>U<sub>max</sub></code> を求めよ。',
    hint:'つり合い: mgsinθ = μA(U_max/δ)\n→ U_max = δmgsinθ/(μA)',
    reveal:['U_max = δmgsinθ/(μA)','= (0.020×10⁻³ × 40 × 9.81 × sin30°) / (0.020 × 0.04)','= (2.0×10⁻⁵ × 196.2) / 8.0×10⁻⁴ = 4.91 m/s'],
    parts:[{label:'', unit:'m/s', ans:4.905, isAngle:false}]
  },
  {
    no:4, ch:'第2章', chN:2, tag:'静水圧',
    q:'水面下 <code>h = 12 m</code> における水の圧力を求めよ。ただし大気圧 <code>P₀ = 101 kPa</code> とする。',
    hint:'ゲージ圧: p = ρgh\n絶対圧: P = P₀ + p',
    reveal:['p = 1000 × 9.81 × 12 = 117 720 Pa ≈ 117.7 kPa','P = 101 + 117.7 = 218.7 kPa ≈ 219 kPa'],
    parts:[
      {label:'(1) ゲージ圧 p', unit:'kPa', ans:117.7, isAngle:false},
      {label:'(2) 絶対圧 P',   unit:'kPa', ans:218.7, isAngle:false}
    ]
  },
  {
    no:5, ch:'第2章', chN:2, tag:'パスカルの原理',
    q:'小ピストン直径 <code>d₁ = 20 mm</code> に <code>F₁ = 10 N</code> を加えた。液体の圧力 <code>P</code> と大ピストン直径 <code>d₂ = 80 mm</code> に生じる力 <code>F₂</code> を求めよ。',
    hint:'P = F₁/A₁ = 4F₁/(πd₁²)\nF₂ = (d₂/d₁)² × F₁',
    reveal:['P = 4×10/(π×0.02²) = 31 831 Pa ≈ 31.8 kPa','F₂ = (80/20)² × 10 = 16 × 10 = 160 N'],
    parts:[
      {label:'(1) 圧力 P', unit:'kPa', ans:31.83, isAngle:false},
      {label:'(2) 力 F₂',  unit:'N',   ans:160,   isAngle:false}

  {
    no:6, ch:'第2章', chN:2, tag:'レバー付きパスカル',
    q:'レバーのA端（アーム長 <code>l₁ = 150 mm</code>）に <code>f = 300 N</code> を加えたとき、B端（アーム長 <code>l₂ = 50 mm</code>）の小ピストン（<code>d₁ = 40 mm</code>）に力が伝わる。大ピストン（<code>d₂ = 160 mm</code>）に生じる力 <code>F₂</code> を求めよ。',
    hint:'① てこ: F₁ = f × l₁/l₂\n② パスカル: F₂ = (d₂/d₁)² × F₁',
    reveal:['F₁ = 300 × 150/50 = 900 N','F₂ = (160/40)² × 900 = 16 × 900 = 14 400 N = 14.4 kN'],
    parts:[{label:'', unit:'kN', ans:14.4, isAngle:false}]
  },
  {
    no:7, ch:'第2章', chN:2, tag:'U字管マノメータ',
    q:'U字管マノメータで、両腕の液体は水（<code>ρ = 1000 kg/m³</code>）、底部の液体は水銀（<code>ρ\' = 13 600 kg/m³</code>）。各高さは <code>h = 0.50 m</code>、<code>y₁ = 0.80 m</code>、<code>y₂ = 0.30 m</code>。圧力差 <code>P₁ − P₂</code> を求めよ。',
    hint:'基準面Aで等値:\nP_A = P₁ + ρgy₁　（左）\nP_A = P₂ + ρgy₂ + ρ\'gh　（右）\n→ P₁−P₂ = ρg(y₂−y₁) + ρ\'gh',
    reveal:["P₁−P₂ = 1000×9.81×(0.30−0.80) + 13600×9.81×0.50","= 9810×(−0.50) + 66708 = −4905 + 66708 = 61 803 Pa ≈ 61.8 kPa"],
    parts:[{label:'', unit:'kPa', ans:61.8, isAngle:false}]
  },
  {
    no:8, ch:'第2章', chN:2, tag:'逆U字管マノメータ',
    q:'逆U字管マノメータで、両腕は水（<code>ρ = 1000 kg/m³</code>）、上部は軽い液体（<code>ρ\' = 800 kg/m³</code>）。<code>h = 0.20 m</code>、<code>y₁ = 0.70 m</code>、<code>y₂ = 0.30 m</code>。圧力差 <code>P₁ − P₂</code> を求めよ。',
    hint:'逆U字管の基準面Aで等値（上部液体で−）:\nP₁−P₂ = ρ₁gy₁ − ρ\'gh − ρ₂gy₂',
    reveal:['P₁−P₂ = 1000×9.81×0.70 − 800×9.81×0.20 − 1000×9.81×0.30','= 9.81×(700 − 160 − 300) = 9.81×240 = 2354 Pa ≈ 2.35 kPa'],
    parts:[{label:'', unit:'kPa', ans:2.354, isAngle:false}]
  },
  {
    no:9, ch:'第2章', chN:2, tag:'平面板への力',
    q:'水面に対して垂直な円板（直径 <code>d = 1.0 m</code>）が、図心深さ <code>h_G = 1.5 m</code> の位置にある。この板に作用する合力 <code>F</code> を求めよ。',
    hint:'F = ρg h_G A　（A = πd²/4）',
    reveal:['A = π×1.0²/4 = 0.7854 m²','F = 1000×9.81×1.5×0.7854 = 11 554 N ≈ 11.6 kN'],
    parts:[{label:'', unit:'kN', ans:11.55, isAngle:false}]
  },
  {
    no:10, ch:'第2章', chN:2, tag:'曲面板',
    q:'タンクの壁面 AB が半径 <code>r = 0.8 m</code>、幅 <code>b = 1.5 m</code> の 1/4 円筒面。水面から A までの深さ <code>h = 0.5 m</code>。壁面 AB に作用する力の水平分力 <code>F<sub>x</sub></code>・鉛直分力 <code>F<sub>y</sub></code>・合力 <code>F</code>・方向角 <code>α</code> を求めよ。',
    hint:'Fx = ρg(h + r/2)×br　（鉛直投影面への静水圧）\nFy = ρg(πr²/4 + hr)×b　（上部液体の重量）\nF = √(Fx²+Fy²)、α = arctan(Fy/Fx)',
    reveal:[
      'Fx = 1000×9.81×(0.5+0.4)×1.5×0.8 = 9810×0.9×1.2 = 10 595 N ≈ 10.6 kN',
      'Fy = 1000×9.81×(π×0.8²/4 + 0.5×0.8)×1.5 = 9810×(0.5027+0.4)×1.5 = 13 283 N ≈ 13.3 kN',
      'F = √(10.6²+13.3²) = √(112.4+176.9) = √289.3 ≈ 17.0 kN',
      'α = arctan(13.3/10.6) ≈ 51.4°'
    ],
    parts:[
      {label:'(1) F<sub>x</sub>', unit:'kN', ans:10.595, isAngle:false},
      {label:'(2) F<sub>y</sub>', unit:'kN', ans:13.283, isAngle:false},
      {label:'(3) F',            unit:'kN', ans:16.99,  isAngle:false},
      {label:'(4) α',            unit:'°',  ans:51.4,   isAngle:true}
    ]
  },
  {
    no:11, ch:'第2章', chN:2, tag:'浮力',
    q:'密度 <code>ρ = 800 kg/m³</code>、一辺 <code>L = 0.40 m</code> の立方体の木材が水（<code>ρ<sub>w</sub> = 1000 kg/m³</code>）に浮いている。水面下に沈んでいる深さ <code>h</code> を求めよ。',
    hint:'浮力 = 重力：ρ_w × g × L² × h = ρ_wood × g × L³\n→ h = ρ_wood × L / ρ_w',
    reveal:['h = ρ_wood × L / ρ_w = 800 × 0.40 / 1000 = 0.320 m'],
    parts:[{label:'', unit:'m', ans:0.320, isAngle:false}]
  },
  {
    no:12, ch:'第3章', chN:3, tag:'連続の式',
    q:'内径 <code>d₁ = 120 mm</code> の管を平均流速 <code>u₁ = 2.0 m/s</code> で流れる水が、内径 <code>d₂ = 40 mm</code> に縮小した。断面②での流速 <code>u₂</code> を求めよ。',
    hint:'u₂ = (d₁/d₂)² × u₁',
    reveal:['u₂ = (120/40)² × 2.0 = 9 × 2.0 = 18.0 m/s'],
    parts:[{label:'', unit:'m/s', ans:18.0, isAngle:false}]
  },
  {
    no:13, ch:'第3章', chN:3, tag:'分岐管',
    q:'内径 <code>d₁ = 80 mm</code> の管を流速 <code>u₁ = 4.0 m/s</code> で流れる水が、<code>d₂ = 60 mm</code>（管②）と <code>d₃ = 40 mm</code>（管③）に等量分岐する。流量 <code>Q₁</code>、管②の流速 <code>u₂</code>、管③の流速 <code>u₃</code> を求めよ。',
    hint:'Q₁ = A₁u₁　　Q₂=Q₃=Q₁/2\nu₂=Q₂/A₂、u₃=Q₃/A₃',
    reveal:[
      'Q₁ = π×0.08²/4 × 4.0 = 0.005027×4.0 = 2.01×10⁻² m³/s',
      'Q₂ = Q₃ = 1.005×10⁻² m³/s',
      'u₂ = Q₂/(π×0.06²/4) = 0.01005/0.002827 = 3.56 m/s',
      'u₃ = Q₃/(π×0.04²/4) = 0.01005/0.001257 = 8.00 m/s'
    ],
    parts:[
      {label:'(1) Q₁', unit:'×10⁻² m³/s', ans:2.011,  isAngle:false, mult:1e-2},
      {label:'(2) u₂', unit:'m/s',          ans:3.556, isAngle:false},
      {label:'(3) u₃', unit:'m/s',          ans:8.00,  isAngle:false}
    ]
  },
  {
    no:14, ch:'第4章', chN:4, tag:'ベルヌーイ（2点間）',

      'u₂ = (60/30)² × 3.0 = 4 × 3.0 = 12.0 m/s',
      'p₂ = 180 000 + 1000×(3.0²−12.0²)/2',
      '= 180 000 + 1000×(9−144)/2 = 180 000 − 67 500 = 112 500 Pa = 112.5 kPa'
    ],
    parts:[
      {label:'(1) u₂', unit:'m/s', ans:12.0,  isAngle:false},
      {label:'(2) p₂', unit:'kPa', ans:112.5, isAngle:false}

  {

    q:'十分大きいタンクの液面から <code>H = 5.0 m</code> 下の小孔からの噴出速度 <code>u</code> を求めよ。（液面速度は無視してよい）',

    reveal:['u = √(2 × 9.81 × 5.0) = √98.1 = 9.90 m/s'],
    parts:[{label:'', unit:'m/s', ans:9.904, isAngle:false}]
  },
  /* ── 演習JPG 追加問題 ── */
  {
    no:16, ch:'第1章', chN:1, tag:'密度・比容積・粘性係数',
    q:'動粘度 <code>ν = 2.00×10⁻⁵ m²/s</code> の油の体積が <code>V = 30×10⁻³ m³</code>、質量が <code>m = 24.0 kg</code> である。密度 <code>ρ</code>、比容積 <code>v</code>（= V/m）、粘性係数 <code>μ</code> を求めよ。',

/* ── スコア管理 ── */
const TOTAL = PROBS.reduce((s,p)=>s+p.parts.length, 0);
const correct = {}; // 'probNo-partIdx': true/false

function countOk(){
  return Object.values(correct).filter(v=>v).length;
}
function updateScore(){
  const c = countOk();
  document.getElementById('score-fill').style.width = (c/TOTAL*100)+'%';
  document.getElementById('score-num').textContent = c+' / '+TOTAL;
}

/* ── 採点 ── */
function checkPart(no, idx){
  const prob = PROBS.find(p=>p.no===no);
  const part = prob.parts[idx];
  const inp  = document.getElementById('inp-'+no+'-'+idx);
  const fb   = document.getElementById('fb-'+no+'-'+idx);
  let val = parseFloat(inp.value);
  if(isNaN(val)){ inp.style.borderColor='#f44336'; return; }

  /* ×10⁻² 単位の場合は実際の値に換算 */
  if(part.mult) val = val * part.mult;

  let ok;
  if(part.isAngle){
    ok = Math.abs(val - part.ans) <= 2;
  } else {
    ok = Math.abs(val - part.ans) / Math.abs(part.ans) <= 0.02;
  }
  correct[no+'-'+idx] = ok;
  fb.className = 'part-fb ' + (ok ? 'ok' : 'ng');
  fb.textContent = ok ? '✓ 正解' : '✗ もう一度';
  inp.style.borderColor = ok ? '#4caf50' : '#f44336';

  /* カード全体のボーダー更新 */
  const card = document.getElementById('prob-'+no);
  const allOk  = prob.parts.every((_,i)=> correct[no+'-'+i] === true);
  const hasNg  = prob.parts.some((_,i)=> correct[no+'-'+i] === false);
  card.className = 'prob' + (allOk ? ' all-ok' : hasNg ? ' has-ng' : '');

  updateScore();
}

function toggleHint(no){
  document.getElementById('hint-'+no).classList.toggle('show');
}
function showReveal(no){
  document.getElementById('reveal-'+no).classList.add('show');
}
function resetAll(){
  Object.keys(correct).forEach(k=>delete correct[k]);
  PROBS.forEach(p=>{
    p.parts.forEach((_,i)=>{
      const inp = document.getElementById('inp-'+p.no+'-'+i);
      if(inp){ inp.value=''; inp.style.borderColor=''; }
      const fb = document.getElementById('fb-'+p.no+'-'+i);
      if(fb){ fb.className='part-fb'; fb.textContent=''; }
    });
    document.getElementById('hint-'+p.no)?.classList.remove('show');
    document.getElementById('reveal-'+p.no)?.classList.remove('show');
    document.getElementById('prob-'+p.no).className='prob';
  });
  updateScore();
}

/* ── レンダリング ── */
const BADGE = {1:'b1',2:'b2',3:'b3',4:'b4'};

function render(){
  document.getElementById('main').innerHTML = PROBS.map(p=>`
    <div class="prob" id="prob-${p.no}">
      <div class="prob-head">
        <span class="prob-no">問${p.no}</span>
        <span class="badge ${BADGE[p.chN]}">${p.ch}</span>
        <span class="prob-tag">${p.tag}</span>
      </div>
      <div class="prob-body">
        <div class="prob-q">${p.q}</div>
        ${p.parts.map((pt,i)=>`
          <div class="part">
            ${pt.label ? `<div class="part-label">${pt.label}</div>` : ''}
            <div class="input-row">
              <input class="ans-input" id="inp-${p.no}-${i}" type="number" step="any" placeholder="答え"
                onkeydown="if(event.key==='Enter')checkPart(${p.no},${i})">
              <span class="unit">${pt.unit}</span>
              <button class="chk-btn" onclick="checkPart(${p.no},${i})">確認</button>
            </div>
            <div class="part-fb" id="fb-${p.no}-${i}"></div>
          </div>
        `).join('')}
        <div class="prob-actions">
          <button class="hint-btn" onclick="toggleHint(${p.no})">💡 ヒント</button>
          <button class="reveal-btn" onclick="showReveal(${p.no})">解答を見る</button>
        </div>
        <div class="hint-box" id="hint-${p.no}">${p.hint.replace(/\n/g,'<br>')}</div>
        <div class="ans-box" id="reveal-${p.no}">${p.reveal.join('<br>')}</div>
      </div>
    </div>
  `).join('');
}

render();
updateScore();
</script>
