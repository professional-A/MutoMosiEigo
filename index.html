<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武藤模試</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1626; --bg2:#0e1d33; --card:#15263f;
  --line:#27406a; --ink:#e7eef7; --muted:#8aa1c0; --dim:#5f7c9c;
  --teal:#46d6c4;
  --amber:#f6b352;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Outfit","Noto Sans JP",sans-serif;
  background:
    radial-gradient(1100px 600px at 80% -8%, rgba(70,214,196,.10), transparent 55%),
    radial-gradient(900px 500px at 5% 5%, rgba(246,179,82,.07), transparent 50%),
    var(--bg);
  color:var(--ink); line-height:1.6; -webkit-font-smoothing:antialiased;
  min-height:100vh; padding-bottom:80px;
}
.wrap{max-width:920px;margin:0 auto;padding:0 18px}

/* Header */
header{
  padding:46px 0 30px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--bg2),transparent);
}
.eyebrow{
  font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;
  color:var(--teal);font-weight:600;margin-bottom:10px;
}
h1{
  font-family:"Fraunces",serif;font-weight:600;
  font-size:clamp(2rem,6vw,3rem);line-height:1.04;
}
.sub{color:var(--muted);margin-top:10px;font-size:1rem}

/* Filters */
.filters{
  padding:22px 0 8px;
  display:flex;flex-direction:column;gap:12px;
  border-bottom:1px solid var(--line);
  margin-bottom:32px;
}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{
  font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dim);font-weight:600;min-width:36px;
}
.fbtn{
  font-size:.82rem;padding:5px 14px;border-radius:99px;border:1px solid var(--line);
  background:var(--card);color:var(--muted);cursor:pointer;
  font-family:inherit;transition:all .15s;
}
.fbtn:hover{border-color:var(--teal);color:var(--teal)}
.fbtn.active{background:var(--teal);border-color:var(--teal);color:#0a1626;font-weight:600}

/* Groups */
.group{margin-bottom:40px}
.group-title{
  font-size:.78rem;letter-spacing:.28em;text-transform:uppercase;
  color:var(--dim);font-weight:600;margin-bottom:16px;
  padding-bottom:8px;border-bottom:1px solid var(--line);
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
}

/* Cards */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:20px;display:flex;flex-direction:column;gap:10px;
  text-decoration:none;color:inherit;
  transition:border-color .15s,transform .15s;
}
.card:hover{border-color:var(--teal);transform:translateY(-2px)}
.card-exam{font-size:.75rem;color:var(--dim);letter-spacing:.04em}
.card-subject{font-size:1.05rem;font-weight:600;color:var(--ink)}
.progress-bar-wrap{background:var(--bg2);border-radius:99px;height:6px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;background:var(--teal);transition:width .3s}
.progress-text{font-size:.78rem;color:var(--muted)}
.progress-text.untouched{color:var(--dim)}
.card-arrow{
  margin-top:4px;font-size:.82rem;color:var(--teal);
  display:flex;align-items:center;gap:4px;
}

/* Empty state */
.empty{
  text-align:center;padding:60px 0;
  color:var(--dim);font-size:.95rem;
}

/* Filter button containers */
#subject-filters,#exam-filters{display:flex;flex-wrap:wrap;gap:8px}

/* Hidden */
[hidden]{display:none!important}

/* Auth bar */
.auth-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(10,22,38,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:8px 18px;display:flex;align-items:center;justify-content:flex-end;gap:10px;
  font-size:.82rem;
}
.auth-bar span{color:var(--muted)}
.auth-bar strong{color:var(--teal)}
.auth-btn{
  font-size:.8rem;padding:4px 14px;border-radius:99px;border:1px solid var(--line);
  background:var(--card);color:var(--muted);cursor:pointer;font-family:inherit;transition:.15s;
}
.auth-btn:hover{border-color:var(--teal);color:var(--teal)}
.auth-btn.primary{background:var(--teal);color:#0a1626;border-color:var(--teal);font-weight:600}
body{padding-top:38px}

/* Modal */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--line);border-radius:16px;
  padding:28px;width:min(360px,90vw);
}
.modal h2{font-size:1.1rem;margin-bottom:16px}
.modal input{
  display:block;width:100%;padding:9px 12px;margin-bottom:10px;
  background:var(--bg);border:1px solid var(--line);border-radius:8px;
  color:var(--ink);font-family:inherit;font-size:.9rem;
}
.modal input:focus{outline:none;border-color:var(--teal)}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.modal-btns button{flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:600}
.modal-msg{font-size:.82rem;margin-top:10px;min-height:1.2em}

/* Ranking */
.ranking-section{margin-top:48px;padding-top:32px;border-top:1px solid var(--line)}
.ranking-section h2{font-size:.78rem;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);font-weight:600;margin-bottom:16px}
.ranking-table{width:100%;border-collapse:collapse}
.ranking-table th,.ranking-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--line);font-size:.88rem}
.ranking-table th{color:var(--dim);font-weight:600;font-size:.75rem;letter-spacing:.1em}
.ranking-table tr:last-child td{border-bottom:none}
.rank-num{color:var(--dim);font-weight:700;width:40px}
.rank-num.top{color:var(--amber)}
.rank-name{color:var(--ink);font-weight:600}
.rank-score{color:var(--teal);font-weight:700}
.rank-pct{color:var(--muted);font-size:.8rem}
.ranking-login-note{color:var(--dim);font-size:.85rem;padding:20px 0}

/* Avatar */
.avatar{display:inline-flex;align-items:center;justify-content:center;font-size:1.2rem;width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--line);cursor:pointer;flex-shrink:0}
.avatar:hover{border-color:var(--teal)}
.avatar-lg{font-size:2.4rem;width:56px;height:56px;border:2px solid var(--teal);margin:0 auto 12px}
.avatar-grid{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;max-height:200px;overflow-y:auto}
.avatar-opt{font-size:1.5rem;width:40px;height:40px;border-radius:50%;border:2px solid transparent;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.avatar-opt:hover{border-color:var(--teal)}
.avatar-opt.selected{border-color:var(--teal);background:var(--bg2)}
</style>
</head>
<body>

<!-- ログインバー（画面上部固定） -->
<div class="auth-bar" id="auth-bar">
  <span id="auth-status">ログインしていません</span>
  <div class="avatar" id="auth-avatar" style="display:none" onclick="openAvatarModal()" title="アイコン変更">🐸</div>
  <button class="auth-btn primary" id="auth-open-btn" onclick="openModal()">ログイン / 登録</button>
</div>

<!-- アバター選択モーダル -->
<div class="modal-bg" id="avatar-modal-bg">
  <div class="modal">
    <h2>アイコンを選ぶ</h2>
    <div class="avatar avatar-lg" id="avatar-preview">🐸</div>
    <div class="avatar-grid" id="avatar-grid"></div>
    <div class="modal-btns">
      <button onclick="saveAvatar()" style="background:var(--teal);color:#0a1626">保存</button>
      <button onclick="closeAvatarModal()" style="background:transparent;color:var(--dim);border:1px solid var(--line)">閉じる</button>
    </div>
    <div class="modal-msg" id="avatar-msg"></div>
  </div>
</div>

<!-- ログインモーダル -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2 id="modal-title">ログイン</h2>
    <input id="m-user" placeholder="ユーザー名" autocomplete="username" />
    <input id="m-pass" type="password" placeholder="パスワード" autocomplete="current-password" />
    <div class="modal-btns">
      <button onclick="doLogin()" style="background:var(--teal);color:#0a1626">ログイン</button>
      <button onclick="doRegister()" style="background:var(--card);color:var(--ink);border:1px solid var(--line)">新規登録</button>
      <button onclick="closeModal()" style="background:transparent;color:var(--dim);border:1px solid var(--line)">閉じる</button>
    </div>
    <div class="modal-msg" id="modal-msg"></div>
  </div>
</div>

<header>
  <div class="wrap">
    <div class="eyebrow">Study Portal</div>
    <h1>武藤模試</h1>
    <p class="sub">科目・試験を選んで対策しよう</p>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
      <a href="docs/kakougaku/" style="
        display:inline-flex;align-items:center;gap:6px;
        font-size:.85rem;font-weight:600;
        background:rgba(70,214,196,.12);
        border:1px solid var(--teal);
        color:var(--teal);
        padding:7px 16px;border-radius:99px;
        text-decoration:none;transition:.15s;
      " onmouseover="this.style.background='rgba(70,214,196,.22)'" onmouseout="this.style.background='rgba(70,214,196,.12)'">
        📋 資料 — 加工学
      </a>
    </div>

    <details style="margin-top:20px" id="contact-details">
      <summary style="
        display:inline-flex;align-items:center;gap:6px;
        font-size:.85rem;font-weight:600;
        background:rgba(246,179,82,.12);
        border:1px solid var(--amber);
        color:var(--amber);
        padding:7px 16px;border-radius:99px;
        cursor:pointer;list-style:none;transition:.15s;
        user-select:none;
      " onmouseover="this.style.background='rgba(246,179,82,.22)'" onmouseout="this.style.background='rgba(246,179,82,.12)'">
        ✉ お問い合わせ
      </summary>
      <div style="margin-top:14px;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:var(--card)">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSca8BM5U9QxZnrkOcmamOadbXOPGfsrf8MU4dQ5KTDBeYDLdA/viewform?embedded=true"
          width="100%" height="520" frameborder="0" marginheight="0" marginwidth="0"
          style="display:block">読み込んでいます…</iframe>
      </div>
    </details>
  </div>
</header>

<div class="wrap">
  <div class="filters">
    <div class="filter-row">
      <span class="filter-label">科目</span>
      <div id="subject-filters"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">試験</span>
      <div id="exam-filters"></div>
    </div>
  </div>
  <div id="groups"></div>

  <!-- ランキング -->
  <div class="ranking-section">
    <h2>みんなの進捗ランキング</h2>
    <div id="ranking-content"><p class="ranking-login-note">ログインするとランキングが表示されます</p></div>
  </div>
</div>

<script>
const EXAM_ORDER = ["前期中間試験","前期末試験","後期中間試験","学年末試験"];

let tests = [];
let activeSubject = "すべて";
let activeExam = "すべて";

function getProgress(storageKey, totalItems) {
  try {
    const state = JSON.parse(localStorage.getItem(storageKey) || "{}");
    const done = Object.values(state).filter(v => v === 1 || (v && v.done)).length;
    return { done, total: totalItems };
  } catch {
    return { done: 0, total: totalItems };
  }
}

function renderFilters() {
  const subjects = ["すべて", ...new Set(tests.map(t => t.subject))];
  const exams = ["すべて", ...EXAM_ORDER.filter(e => tests.some(t => t.exam === e))];

  document.getElementById("subject-filters").innerHTML =
    subjects.map(s =>
      `<button class="fbtn${s === activeSubject ? " active" : ""}" data-val="${s.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}">${s}</button>`
    ).join("");

  document.getElementById("exam-filters").innerHTML =
    exams.map(e =>
      `<button class="fbtn${e === activeExam ? " active" : ""}" data-val="${e.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}">${e}</button>`
    ).join("");
}

function filtered() {
  return tests.filter(t =>
    (activeSubject === "すべて" || t.subject === activeSubject) &&
    (activeExam === "すべて" || t.exam === activeExam)
  );
}

function renderGroups() {
  const list = filtered();
  const groupMap = new Map();
  list.forEach(t => {
    const key = `${t.year}年度 ${t.grade}年生`;
    if (!groupMap.has(key)) groupMap.set(key, []);
    groupMap.get(key).push(t);
  });

  const sortedKeys = [...groupMap.keys()].sort((a, b) => b.localeCompare(a));

  if (sortedKeys.length === 0) {
    document.getElementById("groups").innerHTML =
      `<div class="empty">該当する模試がありません</div>`;
    return;
  }

  document.getElementById("groups").innerHTML = sortedKeys.map(key => {
    const cards = groupMap.get(key).map(t => {
      const { done, total } = getProgress(t.storageKey, t.totalItems);
      const pct = total ? Math.round(done / total * 100) : 0;
      const untouched = done === 0;
      return `
        <a class="card" href="${t.path}">
          <div class="card-exam">${t.year}年度 ${t.grade}年 ${t.exam}</div>
          <div class="card-subject">${t.title || t.subject}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" style="width:${pct}%"></div>
          </div>
          <div class="progress-text${untouched ? " untouched" : ""}">
            ${untouched ? "未着手" : `${done} / ${total} 問`}
          </div>
          <div class="card-arrow">開く →</div>
        </a>`;
    }).join("");
    return `<div class="group">
      <div class="group-title">${key}</div>
      <div class="grid">${cards}</div>
    </div>`;
  }).join("");
}

function setSubject(s) { activeSubject = s; renderFilters(); renderGroups(); }
function setExam(e) { activeExam = e; renderFilters(); renderGroups(); }

document.getElementById("subject-filters").addEventListener("click", e => {
  const btn = e.target.closest("[data-val]");
  if (btn) setSubject(btn.dataset.val);
});
document.getElementById("exam-filters").addEventListener("click", e => {
  const btn = e.target.closest("[data-val]");
  if (btn) setExam(btn.dataset.val);
});

fetch("tests.json")
  .then(r => r.json())
  .then(data => {
    tests = data;
    renderFilters();
    renderGroups();
  })
  .catch(() => {
    document.getElementById("groups").innerHTML =
      `<div class="empty">模試データを読み込めませんでした。<br>tests.json が存在するか確認してください。</div>`;
  });
</script>
<script>
// ── 絵文字アイコン一覧 ──────────────────────────────────
const AVATARS = [
  '🐸','🐙','🦑','🪲','🦠','🧟','👁️','🫠','🤡','💀',
  '👾','🫀','🧠','🪳','🦷','🐛','🫁','🤢','🕷️','🦂',
  '🐊','🐀','🧌','👽','🫦','🦴','🩸','🧛','🧜','🧝',
  '🎃','🪄','🌑','🌪️','🫧','🕯️','🪦','🩻','🧿','🫐',
  '🔥','💎','👑','⚡','🌙','☠️','🎭','🗿','🌊','🍄'
];

// ── 認証 ──────────────────────────────────────────────
let authToken  = localStorage.getItem('muto_token');
let authUser   = localStorage.getItem('muto_user');
let authAvatar = localStorage.getItem('muto_avatar') || '🐸';
let selectedAvatar = authAvatar;

function updateAuthBar() {
  const bar    = document.getElementById('auth-status');
  const btn    = document.getElementById('auth-open-btn');
  const avEl   = document.getElementById('auth-avatar');
  if (authToken) {
    bar.innerHTML = `<strong>${authUser}</strong> さん`;
    avEl.textContent = authAvatar;
    avEl.style.display = 'inline-flex';
    btn.textContent = 'ログアウト';
    btn.classList.remove('primary');
    btn.onclick = doLogout;
    loadRanking();
  } else {
    bar.textContent = 'ログインしていません';
    avEl.style.display = 'none';
    btn.textContent = 'ログイン / 登録';
    btn.classList.add('primary');
    btn.onclick = openModal;
    document.getElementById('ranking-content').innerHTML =
      '<p class="ranking-login-note">ログインするとランキングが表示されます</p>';
  }
}

function openModal()  { document.getElementById('modal-bg').classList.add('open'); document.getElementById('m-user').focus(); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); document.getElementById('modal-msg').textContent = ''; }

function modalMsg(text, ok) {
  const el = document.getElementById('modal-msg');
  el.textContent = text;
  el.style.color = ok ? 'var(--teal)' : '#f87171';
}

async function doRegister() {
  const username = document.getElementById('m-user').value.trim();
  const password = document.getElementById('m-pass').value;
  if (!username || !password) return modalMsg('名前とパスワードを入力してね');
  const res = await fetch('/api/register', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (data.ok) modalMsg('登録できた！次はログインして', true);
  else modalMsg(data.error);
}

async function doLogin() {
  const username = document.getElementById('m-user').value.trim();
  const password = document.getElementById('m-pass').value;
  if (!username || !password) return modalMsg('名前とパスワードを入力してね');
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (data.token) {
    authToken  = data.token;
    authUser   = data.username;
    authAvatar = data.avatar || '🐸';
    localStorage.setItem('muto_token',  authToken);
    localStorage.setItem('muto_user',   authUser);
    localStorage.setItem('muto_avatar', authAvatar);
    closeModal();
    updateAuthBar();
  } else {
    modalMsg(data.error);
  }
}

function doLogout() {
  authToken = null; authUser = null; authAvatar = '🐸';
  localStorage.removeItem('muto_token');
  localStorage.removeItem('muto_user');
  localStorage.removeItem('muto_avatar');
  updateAuthBar();
}

// ── アバター選択 ─────────────────────────────────────────
function openAvatarModal() {
  selectedAvatar = authAvatar;
  document.getElementById('avatar-preview').textContent = selectedAvatar;
  const grid = document.getElementById('avatar-grid');
  grid.innerHTML = AVATARS.map(e =>
    `<div class="avatar-opt${e === selectedAvatar ? ' selected' : ''}" onclick="selectAvatar('${e}')">${e}</div>`
  ).join('');
  document.getElementById('avatar-modal-bg').classList.add('open');
}

function closeAvatarModal() {
  document.getElementById('avatar-modal-bg').classList.remove('open');
  document.getElementById('avatar-msg').textContent = '';
}

function selectAvatar(emoji) {
  selectedAvatar = emoji;
  document.getElementById('avatar-preview').textContent = emoji;
  document.querySelectorAll('.avatar-opt').forEach(el => {
    el.classList.toggle('selected', el.textContent === emoji);
  });
}

async function saveAvatar() {
  const res = await fetch('/api/avatar', {
    method: 'PUT',
    headers: {'Content-Type':'application/json','Authorization':authToken},
    body: JSON.stringify({ avatar: selectedAvatar })
  });
  const data = await res.json();
  if (data.ok) {
    authAvatar = selectedAvatar;
    localStorage.setItem('muto_avatar', authAvatar);
    document.getElementById('auth-avatar').textContent = authAvatar;
    const el = document.getElementById('avatar-msg');
    el.textContent = '保存した！'; el.style.color = 'var(--teal)';
    setTimeout(closeAvatarModal, 800);
    loadRanking();
  }
}

document.getElementById('avatar-modal-bg').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAvatarModal();
});

// ── ランキング ───────────────────────────────────────────
async function loadRanking() {
  const res  = await fetch('/api/ranking');
  const data = await res.json();
  const el   = document.getElementById('ranking-content');
  if (!data.length) {
    el.innerHTML = '<p class="ranking-login-note">まだ誰もスコアを登録していません</p>';
    return;
  }
  el.innerHTML = `<table class="ranking-table">
    <thead><tr><th>順位</th><th>名前</th><th>スコア</th><th>達成率</th></tr></thead>
    <tbody>${data.map((r, i) => {
      const pct = r.total ? Math.round(r.score / r.total * 100) : 0;
      const isMe = r.username === authUser;
      return `<tr${isMe ? ' style="background:rgba(70,214,196,.06)"' : ''}>
        <td class="rank-num${i < 3 ? ' top' : ''}">${i + 1}</td>
        <td class="rank-name"><span style="margin-right:6px">${r.avatar || '🐸'}</span>${r.username}${isMe ? ' 👈' : ''}</td>
        <td class="rank-score">${r.score} / ${r.total}</td>
        <td class="rank-pct">${pct}%</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// モーダル外クリックで閉じる
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

updateAuthBar();
