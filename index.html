<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武藤模試</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0a1626; --bg2:#0e1d33; --card:#15263f;
  --line:#27406a; --ink:#e7eef7; --muted:#8aa1c0; --dim:#5f7c9c;
  --teal:#46d6c4;
  --amber:#f6b352;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Outfit","Noto Sans JP",sans-serif;
  background:
    radial-gradient(1100px 600px at 80% -8%, rgba(70,214,196,.10), transparent 55%),
    radial-gradient(900px 500px at 5% 5%, rgba(246,179,82,.07), transparent 50%),
    var(--bg);
  color:var(--ink); line-height:1.6; -webkit-font-smoothing:antialiased;
  min-height:100vh; padding-bottom:80px;
}
.wrap{max-width:920px;margin:0 auto;padding:0 18px}

/* Header */
header{
  padding:46px 0 30px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--bg2),transparent);
}
.eyebrow{
  font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;
  color:var(--teal);font-weight:600;margin-bottom:10px;
}
h1{
  font-family:"Fraunces",serif;font-weight:600;
  font-size:clamp(2rem,6vw,3rem);line-height:1.04;
}
.sub{color:var(--muted);margin-top:10px;font-size:1rem}

/* Filters */
.filters{
  padding:22px 0 8px;
  display:flex;flex-direction:column;gap:12px;
  border-bottom:1px solid var(--line);
  margin-bottom:32px;
}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{
  font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dim);font-weight:600;min-width:36px;
}
.fbtn{
  font-size:.82rem;padding:5px 14px;border-radius:99px;border:1px solid var(--line);
  background:var(--card);color:var(--muted);cursor:pointer;
  font-family:inherit;transition:all .15s;
}
.fbtn:hover{border-color:var(--teal);color:var(--teal)}
.fbtn.active{background:var(--teal);border-color:var(--teal);color:#0a1626;font-weight:600}

/* Groups */
.group{margin-bottom:40px}
.group-title{
  font-size:.78rem;letter-spacing:.28em;text-transform:uppercase;
  color:var(--dim);font-weight:600;margin-bottom:16px;
  padding-bottom:8px;border-bottom:1px solid var(--line);
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
}

/* Cards */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:20px;display:flex;flex-direction:column;gap:10px;
  text-decoration:none;color:inherit;
  transition:border-color .15s,transform .15s;
}
.card:hover{border-color:var(--teal);transform:translateY(-2px)}
.card-exam{font-size:.75rem;color:var(--dim);letter-spacing:.04em}
.card-subject{font-size:1.05rem;font-weight:600;color:var(--ink)}
.progress-bar-wrap{background:var(--bg2);border-radius:99px;height:6px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;background:var(--teal);transition:width .3s}
.progress-text{font-size:.78rem;color:var(--muted)}
.progress-text.untouched{color:var(--dim)}
.card-arrow{
  margin-top:4px;font-size:.82rem;color:var(--teal);
  display:flex;align-items:center;gap:4px;
}

/* Empty state */
.empty{
  text-align:center;padding:60px 0;
  color:var(--dim);font-size:.95rem;
}

/* Filter button containers */
#subject-filters,#exam-filters{display:flex;flex-wrap:wrap;gap:8px}

/* Hidden */
[hidden]{display:none!important}

/* Auth bar */
.auth-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(10,22,38,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:8px 18px;display:flex;align-items:center;gap:10px;
  font-size:.82rem;
}
.auth-bar-left{margin-right:auto;display:flex;align-items:center;gap:8px}

/* お知らせ */
.notif-btn{
  position:relative;background:none;border:none;cursor:pointer;
  font-size:1.1rem;padding:2px 4px;line-height:1;
}
.notif-badge{
  position:absolute;top:-2px;right:-4px;
  background:#f87171;color:#fff;font-size:.6rem;font-weight:700;
  width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.notif-panel{
  display:none;position:fixed;top:46px;left:18px;z-index:200;
  background:var(--bg2);border:1px solid var(--line);border-radius:12px;
  width:min(340px,90vw);max-height:400px;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.notif-panel.open{display:block}
.notif-header{padding:14px 16px 10px;font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-weight:600;border-bottom:1px solid var(--line)}
.notif-item{padding:14px 16px;border-bottom:1px solid var(--line);cursor:default}
.notif-item:last-child{border-bottom:none}
.notif-item-date{font-size:.72rem;color:var(--dim);margin-bottom:4px}
.notif-item-title{font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.notif-item-body{font-size:.82rem;color:var(--muted);line-height:1.5}
.notif-new .notif-item-title::before{content:'NEW ';color:var(--teal);font-size:.7rem;font-weight:700}
.auth-bar span{color:var(--muted)}
.auth-bar strong{color:var(--teal)}
.auth-btn{
  font-size:.8rem;padding:4px 14px;border-radius:99px;border:1px solid var(--line);
  background:var(--card);color:var(--muted);cursor:pointer;font-family:inherit;transition:.15s;
}
.auth-btn:hover{border-color:var(--teal);color:var(--teal)}
.auth-btn.primary{background:var(--teal);color:#0a1626;border-color:var(--teal);font-weight:600}
body{padding-top:38px}

/* Modal */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--line);border-radius:16px;
  padding:28px;width:min(360px,90vw);
}
.modal h2{font-size:1.1rem;margin-bottom:16px}
.modal input{
  display:block;width:100%;padding:9px 12px;margin-bottom:10px;
  background:var(--bg);border:1px solid var(--line);border-radius:8px;
  color:var(--ink);font-family:inherit;font-size:.9rem;
}
.modal input:focus{outline:none;border-color:var(--teal)}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.modal-btns button{flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:600}
.modal-msg{font-size:.82rem;margin-top:10px;min-height:1.2em}

/* Ranking */
.ranking-section{margin-top:48px;padding-top:32px;border-top:1px solid var(--line)}
.ranking-section h2{font-size:.78rem;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);font-weight:600;margin-bottom:16px}
.ranking-table{width:100%;border-collapse:collapse}
.ranking-table th,.ranking-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--line);font-size:.88rem}
.ranking-table th{color:var(--dim);font-weight:600;font-size:.75rem;letter-spacing:.1em}
.ranking-table tr:last-child td{border-bottom:none}
.rank-num{color:var(--dim);font-weight:700;width:40px}
.rank-num.top{color:var(--amber)}
.rank-name{color:var(--ink);font-weight:600}
.rank-score{color:var(--teal);font-weight:700}
.rank-pct{color:var(--muted);font-size:.8rem}
.ranking-login-note{color:var(--dim);font-size:.85rem;padding:20px 0}

/* Avatar */
.avatar{display:inline-flex;align-items:center;justify-content:center;font-size:1.5rem;width:38px;height:38px;border-radius:50%;background:var(--bg2);border:2px solid var(--line);cursor:pointer;flex-shrink:0;transition:.15s}
.avatar:hover{transform:scale(1.1)}
.avatar-lg{font-size:2.8rem;width:68px;height:68px;margin:0 auto 16px}
.avatar-grid{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;max-height:180px;overflow-y:auto}
.avatar-opt{font-size:1.5rem;width:42px;height:42px;border-radius:50%;border:2px solid transparent;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.avatar-opt:hover{border-color:var(--teal)}
.avatar-opt.selected{border-color:var(--teal);background:var(--bg2)}

/* Frames */
.frame-section{margin-top:14px}
.frame-section h3{font-size:.78rem;color:var(--dim);letter-spacing:.1em;margin-bottom:8px}
.frame-grid{display:flex;flex-wrap:wrap;gap:8px}
.frame-opt{width:42px;height:42px;border-radius:50%;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:.15s;position:relative}
.frame-opt.selected::after{content:'✓';position:absolute;bottom:-4px;right:-4px;font-size:.6rem;background:var(--teal);color:#0a1626;border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center}

/* フレームスタイル定義 */
.frame-default{border:2px solid var(--line)}
.frame-silver {border:2px solid #a0a0a0;box-shadow:0 0 6px #a0a0a060}
.frame-gold   {border:2px solid #f6b352;box-shadow:0 0 8px #f6b35260}
.frame-teal   {border:2px solid #46d6c4;box-shadow:0 0 8px #46d6c460}
.frame-red    {border:2px solid #f87171;box-shadow:0 0 8px #f8717160}
.frame-purple {border:2px solid #a78bfa;box-shadow:0 0 8px #a78bfa60}
.frame-rainbow{border:3px solid transparent;background:linear-gradient(var(--bg2),var(--bg2)) padding-box,linear-gradient(135deg,#f87171,#f6b352,#46d6c4,#a78bfa) border-box}
</style>

<script>
const EXAM_ORDER = ["前期中間試験","前期末試験","後期中間試験","学年末試験"];

let tests = [];
let activeSubject = "すべて";
let activeExam = "すべて";

function getProgress(storageKey, totalItems) {
  try {
    const state = JSON.parse(localStorage.getItem(storageKey) || "{}");
    const done = Object.values(state).filter(v => v === 1 || (v && v.done)).length;
    return { done, total: totalItems };
  } catch {
    return { done: 0, total: totalItems };
  }
}

function renderFilters() {
  const subjects = ["すべて", ...new Set(tests.map(t => t.subject))];
  const exams = ["すべて", ...EXAM_ORDER.filter(e => tests.some(t => t.exam === e))];

  document.getElementById("subject-filters").innerHTML =
    subjects.map(s =>
      `<button class="fbtn${s === activeSubject ? " active" : ""}" data-val="${s.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}">${s}</button>`
    ).join("");

  document.getElementById("exam-filters").innerHTML =
    exams.map(e =>
      `<button class="fbtn${e === activeExam ? " active" : ""}" data-val="${e.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}">${e}</button>`
    ).join("");
}

function filtered() {
  return tests.filter(t =>
    (activeSubject === "すべて" || t.subject === activeSubject) &&
    (activeExam === "すべて" || t.exam === activeExam)
  );
}

function renderGroups() {
  const list = filtered();
  const groupMap = new Map();
  list.forEach(t => {
    const key = `${t.year}年度 ${t.grade}年生`;
    if (!groupMap.has(key)) groupMap.set(key, []);
    groupMap.get(key).push(t);
  });

  const sortedKeys = [...groupMap.keys()].sort((a, b) => b.localeCompare(a));

  if (sortedKeys.length === 0) {
    document.getElementById("groups").innerHTML =
      `<div class="empty">該当する模試がありません</div>`;
    return;
  }

  document.getElementById("groups").innerHTML = sortedKeys.map(key => {
    const cards = groupMap.get(key).map(t => {
      const { done, total } = getProgress(t.storageKey, t.totalItems);
      const pct = total ? Math.round(done / total * 100) : 0;
      const untouched = done === 0;
      return `
        <a class="card" href="${t.path}">
          <div class="card-exam">${t.year}年度 ${t.grade}年 ${t.exam}</div>
          <div class="card-subject">${t.title || t.subject}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" style="width:${pct}%"></div>
          </div>
          <div class="progress-text${untouched ? " untouched" : ""}">
            ${untouched ? "未着手" : `${done} / ${total} 問`}
          </div>
          <div class="card-arrow">開く →</div>
        </a>`;
    }).join("");
    return `<div class="group">
      <div class="group-title">${key}</div>
      <div class="grid">${cards}</div>
    </div>`;
  }).join("");
}

function setSubject(s) { activeSubject = s; renderFilters(); renderGroups(); }
function setExam(e) { activeExam = e; renderFilters(); renderGroups(); }

document.getElementById("subject-filters").addEventListener("click", e => {
  const btn = e.target.closest("[data-val]");
  if (btn) setSubject(btn.dataset.val);
});
document.getElementById("exam-filters").addEventListener("click", e => {
  const btn = e.target.closest("[data-val]");
  if (btn) setExam(btn.dataset.val);
});

fetch("tests.json")
  .then(r => r.json())
  .then(data => {
    tests = data;
    renderFilters();
    renderGroups();
  })
  .catch(() => {
    document.getElementById("groups").innerHTML =
      `<div class="empty">模試データを読み込めませんでした。<br>tests.json が存在するか確認してください。</div>`;
  });
</script>

    btn.textContent = 'ログアウト';
    btn.classList.remove('primary');
    btn.onclick = doLogout;
    document.getElementById('admin-btn').style.display = authEmail === 'kabu6113450@gmail.com' ? 'inline-block' : 'none';
    loadRanking();
  } else {
    bar.textContent = 'ログインしていません';
    avEl.style.display = 'none';
    btn.textContent = 'Googleでログイン';
    btn.classList.add('primary');
    btn.onclick = loginWithGoogle;
    document.getElementById('admin-btn').style.display = 'none';
    document.getElementById('ranking-content').innerHTML =
      '<p class="ranking-login-note">ログインするとランキングが表示されます</p>';
  }
}

async function loginWithGoogle() {
  await supabaseClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin }
  });
}

async function doLogout() {
  await supabaseClient.auth.signOut();
  authToken = null; authUser = null; authEmail = null;
  authAvatar = '🐸'; authFrame = 'default';
  localStorage.removeItem('muto_avatar');
  localStorage.removeItem('muto_frame');
  updateAuthBar();
}

async function syncUser(token) {
  const res = await fetch('/api/sync-user', { method: 'POST', headers: { 'Authorization': token } });
  const data = await res.json();
  if (data.username) {
    authUser   = data.username;
    authEmail  = data.email;
    authAvatar = data.avatar || '🐸';
    authFrame  = data.frame  || 'default';
    localStorage.setItem('muto_avatar', authAvatar);
    localStorage.setItem('muto_frame',  authFrame);
  }
}

// ── アバター選択 ─────────────────────────────────────────
function openAvatarModal() {
  selectedAvatar = authAvatar;
  selectedFrame  = authFrame;
  const prev = document.getElementById('avatar-preview');
  prev.textContent = selectedAvatar;
  applyFrame(prev, selectedFrame);

  document.getElementById('avatar-grid').innerHTML = AVATARS.map(e =>
    `<div class="avatar-opt${e === selectedAvatar ? ' selected' : ''}" onclick="selectAvatar('${e}')">${e}</div>`
  ).join('');

  renderFrameGrid();
  document.getElementById('avatar-modal-bg').classList.add('open');
}

function renderFrameGrid() {
  const el = document.getElementById('frame-grid');
  if (!el) return;
  el.innerHTML = FRAMES.map(f =>
    `<div class="frame-opt frame-${f.id}${f.id === selectedFrame ? ' selected' : ''}"
      onclick="selectFrame('${f.id}')" title="${f.name}">
      <span style="font-size:1.1rem">😀</span>
    </div>`
  ).join('');
}

function selectFrame(id) {
  selectedFrame = id;
  const prev = document.getElementById('avatar-preview');
  applyFrame(prev, id);
  renderFrameGrid();
}

function closeAvatarModal() {
  document.getElementById('avatar-modal-bg').classList.remove('open');
  document.getElementById('avatar-msg').textContent = '';
}

function selectAvatar(emoji) {
  selectedAvatar = emoji;
  document.getElementById('avatar-preview').textContent = emoji;
  document.querySelectorAll('.avatar-opt').forEach(el => {
    el.classList.toggle('selected', el.textContent === emoji);
  });
}

async function saveAvatar() {
  const res = await fetch('/api/avatar', {
    method: 'PUT',
    headers: {'Content-Type':'application/json','Authorization':authToken},
    body: JSON.stringify({ avatar: selectedAvatar, frame: selectedFrame })
  });
  const data = await res.json();
  if (data.ok) {
    authAvatar = selectedAvatar;
    authFrame  = selectedFrame;
    localStorage.setItem('muto_avatar', authAvatar);
    localStorage.setItem('muto_frame',  authFrame);
    const avEl = document.getElementById('auth-avatar');
    avEl.textContent = authAvatar;
    applyFrame(avEl, authFrame);
    const el = document.getElementById('avatar-msg');
    el.textContent = '保存した！'; el.style.color = 'var(--teal)';
    setTimeout(closeAvatarModal, 800);
    loadRanking();
  }
}

document.getElementById('avatar-modal-bg').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAvatarModal();
});

// ── ランキング ───────────────────────────────────────────
async function loadRanking() {
  const res  = await fetch('/api/ranking');
  const data = await res.json();
  const el   = document.getElementById('ranking-content');
  if (!data.length) {
    el.innerHTML = '<p class="ranking-login-note">まだ誰もスコアを登録していません</p>';
    return;
  }
  el.innerHTML = `<table class="ranking-table">
    <thead><tr><th>順位</th><th>名前</th><th>スコア</th><th>達成率</th></tr></thead>
    <tbody>${data.map((r, i) => {
      const pct = r.total ? Math.round(r.score / r.total * 100) : 0;
      const isMe = r.username === authUser;
      return `<tr${isMe ? ' style="background:rgba(70,214,196,.06)"' : ''}>
        <td class="rank-num${i < 3 ? ' top' : ''}">${i + 1}</td>
        <td class="rank-name"><span class="avatar frame-${r.frame||'default'}" style="width:28px;height:28px;font-size:1rem;margin-right:8px;vertical-align:middle">${r.avatar||'🐸'}</span>${r.username}${isMe ? ' 👈' : ''}</td>
        <td class="rank-score">${r.score} / ${r.total}</td>
        <td class="rank-pct">${pct}%</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// モーダル外クリックで閉じる
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ── 管理者 ──────────────────────────────────────────────
async function openAdminModal() {
  document.getElementById('admin-modal-bg').classList.add('open');
  const el = document.getElementById('admin-content');
  el.innerHTML = '読み込み中...';
  const res  = await fetch('/api/admin/users', { headers: { 'Authorization': authToken } });
  const data = await res.json();
  if (!Array.isArray(data)) { el.innerHTML = 'エラー'; return; }
  el.innerHTML = `
    <p style="color:var(--muted);margin-bottom:10px">登録人数：<strong style="color:var(--teal)">${data.length}人</strong></p>
    <table class="ranking-table">
      <thead><tr><th>#</th><th>名前</th><th>スコア</th><th>登録日</th></tr></thead>
      <tbody>${data.map((u, i) => `
        <tr>
          <td class="rank-num">${i + 1}</td>
          <td class="rank-name">
            <span class="avatar frame-${u.frame||'default'}" style="width:24px;height:24px;font-size:.9rem;margin-right:6px;vertical-align:middle">${u.avatar||'🐸'}</span>
            ${u.username}
          </td>
          <td class="rank-score">${u.score != null ? `${u.score} / ${u.total}` : '—'}</td>
          <td style="color:var(--dim);font-size:.78rem">${u.created_at ? u.created_at.slice(0,10) : '—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}
function closeAdminModal() {
  document.getElementById('admin-modal-bg').classList.remove('open');
}
document.getElementById('admin-modal-bg').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAdminModal();
});

// ── お知らせ ────────────────────────────────────────────
const NOTIF_KEY = 'muto_notif_read';
function toggleNotif() {
  const panel = document.getElementById('notif-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    localStorage.setItem(NOTIF_KEY, '1');
    document.getElementById('notif-badge').style.display = 'none';
  }
}
// 既読なら初期表示でバッジ非表示
if (localStorage.getItem(NOTIF_KEY)) {
  document.getElementById('notif-badge').style.display = 'none';
}
// パネル外クリックで閉じる
document.addEventListener('click', e => {
  const panel = document.getElementById('notif-panel');
  if (!panel.contains(e.target) && !e.target.closest('.notif-btn')) {
    panel.classList.remove('open');
  }
});

// ── Supabase Auth 初期化 ─────────────────────────────────
supabaseClient.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    authToken = session.access_token;
    await syncUser(authToken);
  } else {
    authToken = null; authUser = null; authEmail = null;
  }
  updateAuthBar();
});

supabaseClient.auth.getSession().then(async ({ data: { session } }) => {
  if (session) {
    authToken = session.access_token;
    await syncUser(authToken);
  }
  updateAuthBar();
});
</script>
<script>if("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");</script>
