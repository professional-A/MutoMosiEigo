<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加工学 塑性加工 確認テスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1626; --bg2:#0e1d33; --card:#15263f; --card2:#1b2f4d;
  --line:#27406a; --ink:#e7eef7; --muted:#8aa1c0; --dim:#5f7c9c;
  --teal:#46d6c4; --teal-d:#1f9e90;
  --amber:#f6b352; --rose:#f06b8e; --good:#5fe0a8; --bad:#f06b8e;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Outfit","Noto Sans JP",sans-serif;
  background:radial-gradient(1100px 600px at 80% -8%,rgba(70,214,196,.10),transparent 55%),
             radial-gradient(900px 500px at 5% 5%,rgba(246,179,82,.07),transparent 50%),
             var(--bg);
  color:var(--ink); line-height:1.6; padding-bottom:80px;
}
.wrap{max-width:880px;margin:0 auto;padding:0 18px}
header{padding:46px 0 30px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--bg2),transparent)}
.eyebrow{font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:10px}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(2rem,6vw,3rem);line-height:1.04}
.sub{color:var(--muted);margin-top:12px;font-size:1rem;max-width:600px}
.scoreboard{position:sticky;top:0;z-index:50;background:rgba(10,22,38,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.scoreboard .wrap{display:flex;align-items:center;gap:14px;padding:11px 18px;flex-wrap:wrap}
.scorenum{font-family:"JetBrains Mono",monospace;font-size:1.05rem;color:var(--teal);font-weight:500}
.scorelbl{color:var(--muted);font-size:.85rem}
.bar{flex:1;min-width:120px;height:7px;background:var(--card2);border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal-d),var(--teal));border-radius:99px;transition:width .5s ease}
.resetbtn{font-family:inherit;font-size:.78rem;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;cursor:pointer;transition:.2s}
.resetbtn:hover{color:var(--ink);border-color:var(--teal-d)}
nav.toc{display:flex;gap:8px;flex-wrap:wrap;padding:22px 0 6px}
nav.toc a{font-size:.82rem;color:var(--muted);text-decoration:none;padding:7px 13px;border:1px solid var(--line);border-radius:99px;background:var(--card);transition:.2s;white-space:nowrap}
nav.toc a:hover{color:var(--ink);border-color:var(--teal-d);transform:translateY(-1px)}
section{margin-top:44px;scroll-margin-top:64px}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}
.sec-no{font-family:"JetBrains Mono",monospace;font-size:.9rem;color:var(--teal);letter-spacing:.05em}
.sec-head h2{font-family:"Fraunces",serif;font-weight:600;font-size:1.5rem}
.sec-score{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:.82rem;color:var(--muted);white-space:nowrap;align-self:center}
.q{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:18px 18px 16px;margin-bottom:14px;transition:border-color .25s}
.q.correct{border-color:var(--teal-d)}
.q.wrong{border-color:var(--rose)}
.q-top{display:flex;gap:12px;align-items:flex-start}
.qn{font-family:"JetBrains Mono",monospace;font-size:.78rem;color:var(--teal);background:rgba(70,214,196,.1);border:1px solid var(--line);border-radius:7px;padding:3px 8px;flex-shrink:0;margin-top:2px;min-width:34px;text-align:center}
.q-body{flex:1}
.prompt{font-size:1.02rem;margin-bottom:4px}
.opts{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
.opt{font-family:inherit;font-size:.95rem;color:var(--ink);background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer;transition:.16s;text-align:left}
.opt:hover:not(:disabled){border-color:var(--teal-d);transform:translateY(-1px)}
.opt:disabled{cursor:default}
.opt.pick-correct{background:rgba(95,224,168,.16);border-color:var(--good);color:#cdfbe5}
.opt.pick-wrong{background:rgba(240,107,142,.14);border-color:var(--bad);color:#ffd6e1}
.opt.reveal{border-color:var(--good);color:#cdfbe5}
.btn{font-family:inherit;font-size:.9rem;font-weight:500;color:var(--bg);background:var(--teal);border:none;border-radius:10px;padding:10px 16px;cursor:pointer;transition:.2s}
.btn:hover{background:#5fe6d6}
.btn.ghost{background:none;color:var(--muted);border:1px solid var(--line)}
.btn.ghost:hover{color:var(--ink);border-color:var(--teal-d)}
.fb{margin-top:10px;font-size:.9rem;display:none}
.fb.show{display:block}
.fb .verdict{font-weight:600}
.fb .verdict.g{color:var(--good)}
.fb .verdict.b{color:var(--bad)}
.note{color:var(--muted);margin-top:4px;font-size:.88rem}
.tip{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:10px;padding:12px 15px;margin-bottom:18px;font-size:.9rem;color:var(--muted)}
.tip b{color:var(--amber)}
footer{margin-top:60px;padding-top:24px;border-top:1px solid var(--line);color:var(--dim);font-size:.82rem;text-align:center}
@media(max-width:560px){.q-top{flex-direction:column;gap:7px}}
</style>
</head>
<body>

<div class="scoreboard">
  <div class="wrap">
    <span class="scorenum" id="sNum">0 / 0</span>
    <span class="scorelbl">正解</span>
    <div class="bar"><i id="sBar"></i></div>
    <button class="resetbtn" onclick="resetAll()">リセット</button>
  </div>
</div>

<header>
  <div class="wrap">
    <div class="eyebrow">加工学 ・ 章別確認テスト</div>
    <h1>塑性加工 確認テスト<br><span style="font-size:.55em;color:var(--teal)">基礎 / 加工法 / プレス・計算・解析</span></h1>
    <p class="sub">塑性加工の基礎から計算問題まで全16問。数値計算問題も含む。試験直前の最終チェックに。</p>
  </div>
</header>

<div class="wrap">
<nav class="toc" id="toc"></nav>
<div class="tip" style="margin-top:18px">
  <b>使い方：</b>選択肢をタップすると即判定。解説は判定後に表示される。計算問題はしっかり手を動かして確認しよう。
</div>
<div id="app"></div>
<footer>加工学 塑性加工 確認テスト ｜ 基礎5問・各種加工法5問・プレス・計算・解析6問 計16問</footer>
</div>

<script>
const STORAGE_KEY = "kakougaku_sosei_v1";

const SECTIONS = [

{id:"s1", no:"01", title:"塑性加工の基礎・熱間と冷間", qs:[

{type:"single",
 q:"塑性加工の最大の特徴として正しいものを選べ",
 opts:["材料を溶融して成形するため複雑形状が得意","固体のまま塑性変形させるため材料の無駄が少なく加工硬化で強度向上","型に流し込むため中空形状が容易","切削で材料を除去するため精度が高い","熱で材料を軟化させてから成形する"],
 ans:"固体のまま塑性変形させるため材料の無駄が少なく加工硬化で強度向上",
 note:"塑性加工は固体のまま変形させるため歩留まり◎。さらに加工硬化により成形後に強度が向上する点が大きな特徴。"},

{type:"single",
 q:"熱間加工（hot working）の特徴として正しいものを選べ",
 opts:["加工による強化（加工硬化）が大きい","寸法精度が高い","大きな変形が可能で連続加工に向いている","表面にスケールが生じない","スプリングバックが大きい"],
 ans:"大きな変形が可能で連続加工に向いている",
 note:"熱間加工は再結晶温度以上で行うため変形抵抗が小さく大変形可・連続加工可。ただし寸法精度は低く、スケール（酸化膜）が生じる。"},

{type:"single",
 q:"冷間加工（cold working）の長所として正しいものを選べ",
 opts:["大きな変形が可能","連続して長尺材を成形できる","再結晶温度以上で行う","高い寸法精度と加工による強化が得られる","表面にスケールが生じにくいが精度は低い"],
 ans:"高い寸法精度と加工による強化が得られる",
 note:"冷間加工は室温付近で行うため寸法精度◎・加工硬化による強化◎。ただし大変形には向かず、スプリングバックが大きい。"},

{type:"single",
 q:"塑性加工において、被加工材（ワーク材）に求められる特性として正しいものを選べ",
 opts:["高い耐摩耗性","高い耐熱性","大きな塑性変形量と小さい加工硬化","高い硬さ","大きな加工硬化"],
 ans:"大きな塑性変形量と小さい加工硬化",
 note:"被加工材は大きく変形できる（塑性変形量大）かつ加工中に硬くなりにくい（加工硬化小）ことが望ましい。耐摩耗性・耐熱性は金型材料に必要な特性。"},

{type:"single",
 q:"結晶構造と加工性の関係について、冷間加工に最も向いている結晶構造を選べ",
 opts:["体心立方格子（BCC）のみ","六方最密充填構造（HCP）","面心立方格子（FCC）","体心正方格子（BCT）","正方格子"],
 ans:"面心立方格子（FCC）",
 note:"FCC構造（Al, Cu, Niなど）はすべり系が多く延性が高いため冷間加工に向く。HCP（Ti, Mgなど）はすべり系が少なく加工困難。"},

]},

{id:"s2", no:"02", title:"各種加工法（圧延・押出し・引抜き・曲げ）", qs:[

{type:"single",
 q:"圧延（rolling）においてバックアップロールを設ける主な目的を選べ",
 opts:["圧延速度を上げるため","板材の幅を広げるため","ワークロールのたわみを防止するため","材料を加熱するため","材料表面の酸化膜を除去するため"],
 ans:"ワークロールのたわみを防止するため",
 note:"バックアップロールはワークロール（直接板材に接するロール）の背面を支え、大きな圧延力によるたわみを防止する。4段圧延機に多く使用される。"},

{type:"single",
 q:"圧延において入口速度v₀、入口板厚t₀、出口板厚t₁（t₁ < t₀）のとき、出口速度v₁はどうなるか",
 opts:["v₁ = v₀（変わらない）","v₁ < v₀（遅くなる）","v₁ > v₀（速くなる）","v₁ = v₀ × t₁（板厚に比例）","v₁ = v₀ / t₁（板厚に反比例）"],
 ans:"v₁ > v₀（速くなる）",
 note:"体積保存則：t₀v₀ = t₁v₁ より v₁ = v₀(t₀/t₁)。t₁ < t₀ なので v₁ > v₀。出口では板が薄くなる分だけ速度が上がる。"},

{type:"single",
 q:"押出し加工（extrusion）と引き抜き加工（drawing）を比較したとき、引き抜き加工の特徴として正しいものを選べ",
 opts:["大きな変形量を一度に得られる","主に熱間加工で行われる","高い寸法精度が得られ、冷間加工による強化が起きる","円形断面以外には使えない","ダイの前方から材料を押し込む"],
 ans:"高い寸法精度が得られ、冷間加工による強化が起きる",
 note:"引き抜き（Drawing）は主に冷間で行い、高い寸法精度と加工硬化による強化が得られる。一方、押出し（Extrusion）は大変形可で主に熱間。"},

{type:"single",
 q:"曲げ加工におけるスプリングバック（springback）を大きくする材料特性を選べ",
 opts:["縦弾性係数（ヤング率）Eが小さい","降伏応力が低い","延性が高い","縦弾性係数（ヤング率）Eが大きい","塑性変形量が大きい"],
 ans:"縦弾性係数（ヤング率）Eが大きい",
 note:"スプリングバックは弾性回復による戻り変形。縦弾性係数Eが大きいほど弾性回復量が大きくなり、スプリングバックが大きくなる。"},

{type:"single",
 q:"深絞り（deep drawing）において、板材がしわになる（しわ発生）のを防ぐためにはどうすればよいか",
 opts:["ブランクホルダー力（BHF）を下げる","ブランクホルダー力（BHF）を上げる","パンチの速度を上げる","ダイのクリアランスを大きくする","ブランク径を大きくする"],
 ans:"ブランクホルダー力（BHF）を上げる",
 note:"BHFを上げるとしわの発生を抑制できる。ただしBHFを上げすぎると材料が割れる。しわと割れはトレードオフの関係。"},

]},

{id:"s3", no:"03", title:"プレス・計算・解析", qs:[

{type:"single",
 q:"ファインブランキング（fine blanking）の特徴として正しいものを選べ",
 opts:["普通のせん断加工より端面精度が低い","逆力・反力・板押さえを同時に付加して端面精度を高める打抜き加工","レーザを使った精密切断加工","板厚方向に押出して成形する加工","電気化学的に材料を溶解して切り出す加工"],
 ans:"逆力・反力・板押さえを同時に付加して端面精度を高める打抜き加工",
 note:"ファインブランキングは板押さえ・逆力（ノックアウト）・反力（カウンターフォース）を同時付加し、ダイクリアランスをほぼゼロにすることで端面精度◎を実現。"},

{type:"single",
 q:"せん断荷重Pの計算式として正しいものを選べ（τs：せん断抵抗、L：切断線長さ、t：板厚）",
 opts:["P = τs / (L × t)","P = τs + L + t","P = τs × L × t","P = τs × L / t","P = L × t / τs"],
 ans:"P = τs × L × t",
 note:"せん断荷重 P = τs × L × t [N]。例：円形d=100mm、t=5mm、τs=300MPaのとき L=π×100=314mm、P=300×314×5≒471,000N≒471kN"},

{type:"single",
 q:"真ひずみ（true strain）εの計算式として正しいものを選べ（L₀：初期長さ、L：変形後長さ、e：公称ひずみ）",
 opts:["ε = (L - L₀) / L₀","ε = ln(L / L₀) = ln(1 + e)","ε = L / L₀ - 1","ε = e + 1","ε = L₀ / L"],
 ans:"ε = ln(L / L₀) = ln(1 + e)",
 note:"真ひずみ ε = ln(L/L₀) = ln(1+e)。同じ変形量なら常に ε < e（真ひずみ < 公称ひずみ）。例：e=0.05なら ε=ln(1.05)≒0.0488。"},

{type:"single",
 q:"トレスカ（Tresca）降伏条件の式として正しいものを選べ（σ₁>σ₂>σ₃、Y：降伏応力）",
 opts:["σ₁ × σ₃ = Y²","σ₁ + σ₃ = Y","σ₁ - σ₃ = Y","(σ₁-σ₂)²+(σ₂-σ₃)²+(σ₃-σ₁)² = 2Y²","σ₁/σ₃ = Y"],
 ans:"σ₁ - σ₃ = Y",
 note:"トレスカ条件：最大主応力と最小主応力の差が降伏応力Yに達したとき降伏。σ₁ - σ₃ = Y。ミーゼス条件は(σ₁-σ₂)²+(σ₂-σ₃)²+(σ₃-σ₁)²=2Y²で、シミュレーションに多用される。"},

{type:"single",
 q:"入口板厚t₀=10mm、入口速度v₀=2m/s、出口板厚t₁=5mmのとき、出口速度v₁はいくらか",
 opts:["1 m/s","2 m/s","4 m/s","5 m/s","10 m/s"],
 ans:"4 m/s",
 note:"体積保存則：t₀v₀ = t₁v₁ より v₁ = v₀×(t₀/t₁) = 2×(10/5) = 4 m/s。"},

{type:"single",
 q:"初期長さL₀=100mm、変形後長さL=150mmのとき、公称ひずみeと真ひずみεの関係として正しいものを選べ",
 opts:["e = 0.5、ε ≒ 0.405（ε < e）","e = 0.5、ε ≒ 0.693（ε > e）","e = ε = 0.5（両者は等しい）","e = 1.5、ε ≒ 0.405","e = 0.405、ε = 0.5（ε > e）"],
 ans:"e = 0.5、ε ≒ 0.405（ε < e）",
 note:"公称ひずみ e = (150-100)/100 = 0.5。真ひずみ ε = ln(150/100) = ln(1.5) ≒ 0.405。常に真ひずみ ε < 公称ひずみ e。"},

]},

];/* end SECTIONS */

let state = {};
try{ state = JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); }catch(e){}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); if(window.progressSave) progressSave(STORAGE_KEY, state); }

function computeScore(){
  let done=0, total=0;
  SECTIONS.forEach(sec=>{ sec.qs.forEach((q,qi)=>{ total++; if(state[`${sec.id}_${qi}`]===1) done++; }); });
  return {done,total};
}
function updateScore(){
  const {done,total}=computeScore();
  document.getElementById("sNum").textContent=`${done} / ${total}`;
  document.getElementById("sBar").style.width= total?`${done/total*100}%`:"0%";
}
function resetAll(){
  if(!confirm("進捗をリセットしますか？")) return;
  state={}; save(); location.reload();
}
function norm(s){ return s.replace(/[　\s]/g,"").toLowerCase().replace(/[，,。．.、]/g,""); }
function matchInput(val,answers){
  const n=norm(val);
  if(!Array.isArray(answers)) answers=[answers];
  return answers.some(a=>norm(a)===n||n.includes(norm(a))||norm(a).includes(n));
}

function renderAll(){
  const app=document.getElementById("app");
  const toc=document.getElementById("toc");
  toc.innerHTML=""; app.innerHTML="";
  SECTIONS.forEach(sec=>{
    const a=document.createElement("a");
    a.href=`#${sec.id}`; a.textContent=`${sec.no} ${sec.title}`;
    toc.appendChild(a);
    const el=document.createElement("section");
    el.id=sec.id;
    let secDone=0;
    sec.qs.forEach((_,qi)=>{ if(state[`${sec.id}_${qi}`]===1) secDone++; });
    el.innerHTML=`<div class="sec-head"><span class="sec-no">${sec.no}</span><h2>${sec.title}</h2><span class="sec-score" id="ss_${sec.id}">${secDone}/${sec.qs.length}</span></div>`;
    sec.qs.forEach((q,qi)=>{ el.appendChild(buildQuestion(q,qi,`${sec.id}_${qi}`,sec.id)); });
    app.appendChild(el);
  });
  updateScore();
}

function buildQuestion(q,qi,key,secId){
  const div=document.createElement("div");
  div.className="q"+(state[key]===1?" correct":state[key]===-1?" wrong":"");
  div.id=`q_${key}`;
  const qn=qi+1;
  let inner=`<div class="q-top"><span class="qn">Q${qn}</span><div class="q-body"><div class="prompt">${q.q}</div>`;
  if(q.type==="single"){
    inner+=`<div class="opts">`;
    q.opts.forEach((o,oi)=>{
      let cls="opt";
      if(state[key]!==undefined){
        if(o===q.ans) cls+=" reveal";
        if(state[key+"_pick"]===o && o!==q.ans) cls+=" pick-wrong";
        if(state[key+"_pick"]===o && o===q.ans) cls+=" pick-correct";
      }
      const dis=state[key]!==undefined?"disabled":"";
      inner+=`<button class="${cls}" ${dis} onclick="pickSingle('${key}','${secId}',this,'${escQ(o)}','${escQ(q.ans)}')">${labelChar(oi)} ${o}</button>`;
    });
    inner+=`</div>`;
  }
  const fbShow=state[key]!==undefined?"show":"";
  const verdictLabel=state[key]===1?"✓ 正解":"✗ 不正解";
  const verdictCls=state[key]===1?"g":"b";
  inner+=`<div class="fb ${fbShow}" id="fb_${key}"><span class="verdict ${verdictCls}">${verdictLabel}</span>${q.note?`<div class="note">${q.note}</div>`:""}</div>`;
  inner+=`</div></div>`;
  div.innerHTML=inner;
  return div;
}

function labelChar(i){ return String.fromCharCode(65+i)+"."; }
function escQ(s){ return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }

function pickSingle(key,secId,btn,chosen,ans){
  state[key]=chosen===ans?1:-1;
  state[key+"_pick"]=chosen;
  save(); refreshQ(key,secId);
}

function refreshQ(key,secId){
  const parts=key.split("_");
  const sIdx=SECTIONS.findIndex(s=>s.id===secId);
  if(sIdx<0) return;
  const sec=SECTIONS[sIdx];
  const qi=parseInt(parts[1]);
  const q=sec.qs[qi];
  const old=document.getElementById("q_"+key);
  if(!old) return;
  const newCard=buildQuestion(q,qi,key,secId);
  old.replaceWith(newCard);
  let done=0;
  sec.qs.forEach((_,i)=>{ if(state[`${secId}_${i}`]===1) done++; });
  const ss=document.getElementById("ss_"+secId);
  if(ss) ss.textContent=`${done}/${sec.qs.length}`;
  updateScore();
}

renderAll();
window._quizSync = async function() {
  const s = await progressLoad(STORAGE_KEY);
  if (!s || !Object.keys(s).length) return;
  let chg = false;
  for (const k in s) { if (s[k] && !state[k]) { state[k] = s[k]; chg = true; } }
  if (chg) { save(); renderAll(); }
};
</script>
