<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>制御工学Ⅰ 中間対策テスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<style>
:root{
  --bg:#0a1626; --bg2:#0e1d33; --card:#15263f; --card2:#1b2f4d;
  --line:#27406a; --ink:#e7eef7; --muted:#8aa1c0; --dim:#5f7c9c;
  --teal:#46d6c4; --teal-d:#1f9e90;
  --amber:#f6b352; --rose:#f06b8e; --good:#5fe0a8; --bad:#f06b8e;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Outfit","Noto Sans JP",sans-serif;
  background:radial-gradient(1100px 600px at 80% -8%,rgba(70,214,196,.10),transparent 55%),
             radial-gradient(900px 500px at 5% 5%,rgba(246,179,82,.07),transparent 50%),
             var(--bg);
  color:var(--ink); line-height:1.6; padding-bottom:80px;
}
.wrap{max-width:880px;margin:0 auto;padding:0 18px}
header{padding:46px 0 30px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--bg2),transparent)}
.eyebrow{font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:10px}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(2rem,6vw,3rem);line-height:1.04}
.sub{color:var(--muted);margin-top:12px;font-size:1rem;max-width:600px}
.scoreboard{position:sticky;top:0;z-index:50;background:rgba(10,22,38,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.scoreboard .wrap{display:flex;align-items:center;gap:14px;padding:11px 18px;flex-wrap:wrap}
.scorenum{font-family:"JetBrains Mono",monospace;font-size:1.05rem;color:var(--teal);font-weight:500}
.scorelbl{color:var(--muted);font-size:.85rem}
.bar{flex:1;min-width:120px;height:7px;background:var(--card2);border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal-d),var(--teal));border-radius:99px;transition:width .5s ease}
.resetbtn{font-family:inherit;font-size:.78rem;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;cursor:pointer;transition:.2s}
.resetbtn:hover{color:var(--ink);border-color:var(--teal-d)}
nav.toc{display:flex;gap:8px;flex-wrap:wrap;padding:22px 0 6px}
nav.toc a{font-size:.82rem;color:var(--muted);text-decoration:none;padding:7px 13px;border:1px solid var(--line);border-radius:99px;background:var(--card);transition:.2s;white-space:nowrap}
nav.toc a:hover{color:var(--ink);border-color:var(--teal-d);transform:translateY(-1px)}
section{margin-top:44px;scroll-margin-top:64px}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}
.sec-no{font-family:"JetBrains Mono",monospace;font-size:.9rem;color:var(--teal);letter-spacing:.05em}
.sec-head h2{font-family:"Fraunces",serif;font-weight:600;font-size:1.5rem}
.sec-desc{color:var(--muted);font-size:.92rem;margin-bottom:18px}
.sec-score{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:.82rem;color:var(--muted);white-space:nowrap;align-self:center}
.q{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:18px 18px 16px;margin-bottom:14px;transition:border-color .25s}
.q.correct{border-color:var(--teal-d)}
.q.wrong{border-color:var(--rose)}
.q-top{display:flex;gap:12px;align-items:flex-start}
.qn{font-family:"JetBrains Mono",monospace;font-size:.78rem;color:var(--teal);background:rgba(70,214,196,.1);border:1px solid var(--line);border-radius:7px;padding:3px 8px;flex-shrink:0;margin-top:2px;min-width:34px;text-align:center}
.q-body{flex:1}
.prompt{font-size:1.02rem;margin-bottom:4px}
.opts{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
.opt{font-family:inherit;font-size:.95rem;color:var(--ink);background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer;transition:.16s;text-align:left}
.opt:hover:not(:disabled){border-color:var(--teal-d);transform:translateY(-1px)}
.opt:disabled{cursor:default}
.opt.pick-correct{background:rgba(95,224,168,.16);border-color:var(--good);color:#cdfbe5}
.opt.pick-wrong{background:rgba(240,107,142,.14);border-color:var(--bad);color:#ffd6e1}
.opt.reveal{border-color:var(--good);color:#cdfbe5}
.opt .lab{font-family:"JetBrains Mono",monospace;color:var(--teal);margin-right:7px;font-size:.85rem}
.opt.multi-selected{background:rgba(70,214,196,.18);border-color:var(--teal-d)}
.multi-submit{margin-top:8px}
.sort-bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;padding:10px;background:var(--bg2);border:1px dashed var(--line);border-radius:10px;min-height:40px}
.sort-slot{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.sort-item{font-family:inherit;font-size:.88rem;color:var(--ink);background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:7px 12px;cursor:pointer;transition:.16s}
.sort-item:hover{border-color:var(--teal-d)}
.sort-item.placed{background:rgba(70,214,196,.1);border-color:var(--teal-d)}
.sort-answer{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.sort-answer .slot{font-size:.85rem;padding:6px 10px;background:var(--bg2);border:1px dashed var(--line);border-radius:8px;color:var(--muted);min-height:34px;cursor:pointer}
.sort-answer .slot.filled{color:var(--ink);border-color:var(--teal-d);background:rgba(70,214,196,.08)}
.inrow{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.inrow input{flex:1;min-width:180px;font-family:inherit;font-size:.98rem;color:var(--ink);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 13px;outline:none;transition:.2s}
.inrow input:focus{border-color:var(--teal-d)}
.inrow input.ok{border-color:var(--good);background:rgba(95,224,168,.08)}
.inrow input.ng{border-color:var(--bad);background:rgba(240,107,142,.07)}
.btn{font-family:inherit;font-size:.9rem;font-weight:500;color:var(--bg);background:var(--teal);border:none;border-radius:10px;padding:10px 16px;cursor:pointer;transition:.2s}
.btn:hover{background:#5fe6d6}
.btn.ghost{background:none;color:var(--muted);border:1px solid var(--line)}
.btn.ghost:hover{color:var(--ink);border-color:var(--teal-d)}
.fb{margin-top:10px;font-size:.9rem;display:none}
.fb.show{display:block}
.fb .verdict{font-weight:600}
.fb .verdict.g{color:var(--good)}
.fb .verdict.b{color:var(--bad)}
.note{color:var(--muted);margin-top:4px;font-size:.88rem}
.note .ans{color:var(--teal);font-weight:600}
.tip{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:10px;padding:12px 15px;margin-bottom:18px;font-size:.9rem;color:var(--muted)}
.tip b{color:var(--amber)}
footer{margin-top:60px;padding-top:24px;border-top:1px solid var(--line);color:var(--dim);font-size:.82rem;text-align:center}
.katex{font-size:1.04em}
.opt .katex,.prompt .katex{color:inherit}
@media(max-width:560px){.q-top{flex-direction:column;gap:7px}}
</style>
</head>
<body>

<div class="scoreboard">
  <div class="wrap">
    <span class="scorenum" id="sNum">0 / 0</span>
    <span class="scorelbl">正解</span>
    <div class="bar"><i id="sBar"></i></div>
    <button class="resetbtn" onclick="resetAll()">リセット</button>
  </div>
</div>

<header>
  <div class="wrap">
    <div class="eyebrow">制御工学Ⅰ ・ 前期中間 対策テスト</div>
    <h1>制御工学Ⅰ 模試<br><span style="font-size:.5em;color:var(--teal)">序論 / ブロック線図 / ラプラス変換</span></h1>
    <p class="sub">2025年度 前期中間試験の出題範囲（第1〜5回講義）に対応した自習テスト。制御の定義・システム・ブロック線図・制御系の分類・等価変換・複素数・ラプラス変換まで全範囲をカバー。試験直前の総チェックに。</p>
  </div>
</header>

<div class="wrap">
<nav class="toc" id="toc"></nav>
<div class="tip" style="margin-top:18px">
  <b>使い方：</b>選択式はタップで即判定。複数選択は全部選んでから「採点」ボタン。並べ替えは順番に選んでいく。入力式はEnterか「採点」で判定。解説は判定後に表示。数式はKaTeXで表示。
</div>
<div id="app"></div>
<footer>制御工学Ⅰ 前期中間 対策テスト ｜ 全11セクション・計74問</footer>
</div>

<script>
const STORAGE_KEY = "seigyo1_chukan_v1";

/* =====================================================================
   問題データ
   type: "single" | "multi" | "sort" | "input"
   single: opts[], ans (string)
   multi:  opts[], ans (string[], すべて選択必須)
   sort:   items[], ans (正順の string[])
   input:  ans (string または string[]), hint
   数式は KaTeX 記法（$...$ で囲む）で記述。
===================================================================== */
const SECTIONS = [

// ──────────────────────────────────────────────
{id:"s1", no:"01", title:"序論：制御・自動化・ロボット", qs:[

{type:"single",
 q:"「制御」を説明したものとして最も適切なものを選べ",
 opts:[
   "システムを構成する要素を分解して個別に分析すること",
   "システムの状態をある目的に沿って適切に変化させるための手段",
   "外乱を完全に取り除くための技術",
   "目標値を時間とともに変化させること",
 ],
 ans:"システムの状態をある目的に沿って適切に変化させるための手段",
 note:"制御＝「目的の動作をさせるために各要素を上手く連携させる技術」「システムの状態をある目的に沿って適切に変化させるための手段」。"},

{type:"single",
 q:"「自動制御」を説明したものとして最も適切なものを選べ",
 opts:[
   "人間が常に監視しながら手動で目標値に合わせる技術",
   "ある量を目標値と一致させるために、量を検出して比較し、訂正動作を自動的に実行する技術",
   "あらかじめ決めた順序で機械を動かすだけの技術",
   "システムの構造を数式モデルで明らかにする技術",
 ],
 ans:"ある量を目標値と一致させるために、量を検出して比較し、訂正動作を自動的に実行する技術",
 note:"自動制御＝物体・プロセス等のある量を目標値と一致させるため、量を検出し目標値と比較し、それに応じて訂正動作を自動的に実行する技術。"},

{type:"multi",
 q:"オートメーション（自動化）に関する略語の説明として正しいものを全て選べ",
 opts:[
   "FA は Factory Automation（工場の自動化）",
   "HA は Home Automation（家庭の自動化）",
   "OA は Office Automation（事務の自動化）",
   "RPA は Robot Process Automation",
   "FA は Fast Automation（高速自動化）",
 ],
 ans:[
   "FA は Factory Automation（工場の自動化）",
   "HA は Home Automation（家庭の自動化）",
   "OA は Office Automation（事務の自動化）",
   "RPA は Robot Process Automation",
 ],
 note:"FA=Factory、HA=Home、OA=Office、RPA=Robot Process Automation。オートメーションは人間の労働・制御・管理をおおむね除去する高度な自動生産方式。"},

{type:"single",
 q:"アシモフの「ロボット三原則」の第1条として正しいものを選べ",
 opts:[
   "ロボットは人間に危害を加えてはならず、また危険を見過ごすことで人間に危害を及ぼしてはならない",
   "ロボットは人間が与える命令に服従しなければならない",
   "ロボットは自己（自分）をまもらなければならない",
   "ロボットは他のロボットと協調しなければならない",
 ],
 ans:"ロボットは人間に危害を加えてはならず、また危険を見過ごすことで人間に危害を及ぼしてはならない",
 note:"第1条=危害（人間に危害を加えない／危険を見過ごさない）、第2条=服従（命令に従う、ただし第1条に反する場合を除く）、第3条=自己保存（第1・2条に反しない限り自己を守る）。"},

{type:"single",
 q:"大規模企業向けFA（Factory Automation）の従来からの一般的な利点（メリット）に該当しないものを選べ",
 opts:["大量生産","生産速度の向上","品質の向上と均一化","多品種少量生産","労働者の削減（省力化）"],
 ans:"多品種少量生産",
 note:"従来型FAの利点は大量生産・速度向上・品質均一化・省力化。多品種少量生産は近年のフレキシブル生産の特長で、従来型FAのメリットには該当しない。"},

]},

// ──────────────────────────────────────────────
{id:"s2", no:"02", title:"システムとブロック線図", qs:[

{type:"single",
 q:"「システム（系）」を説明したものとして最も適切なものを選べ",
 opts:[
   "種々の機能を有する幾つかの要素が、何らかの相互作用で結ばれている集合体",
   "一つの機能だけを持つ単独の部品",
   "入力と出力の関係を持たない静的な装置",
   "外部から完全に独立した閉じた箱",
 ],
 ans:"種々の機能を有する幾つかの要素が、何らかの相互作用で結ばれている集合体",
 note:"システム（系）＝種々の機能を有する幾つかの要素が相互作用で結ばれている集合（体）。その一部となっているものをサブシステム（副系）という。"},

{type:"single",
 q:"「ブロック線図」を説明したものとして最も適切なものを選べ",
 opts:[
   "システムの外観を写実的に描いた図",
   "システムに生じる相互作用の因果関係を、原因（入力）－結果（出力）の関係から方向付けをして表した線図",
   "部品の寸法を正確に表した設計図",
   "電気回路の配線をそのまま描いた回路図",
 ],
 ans:"システムに生じる相互作用の因果関係を、原因（入力）－結果（出力）の関係から方向付けをして表した線図",
 note:"ブロック線図は因果関係（入力→出力）を方向付けして表す。制御系における各要素の関係を表すのに用いられる。"},

{type:"single",
 q:"ブロック線図において「引き出し点（信号の分岐点）」を表す記号として正しいものを選べ",
 opts:["□（四角の枠）","●（黒丸）","○（白丸）","→（矢印）"],
 ans:"●（黒丸）",
 note:"引き出し点（分岐点）は●（黒丸）。加え合わせ点は○（白丸）。要素は□、信号は→（矢印）で表す。"},

{type:"single",
 q:"ブロック線図において「加え合わせ点（信号の加減算）」を表す記号として正しいものを選べ",
 opts:["□（四角の枠）","●（黒丸）","○（白丸、±符号付き）","→（矢印）"],
 ans:"○（白丸、±符号付き）",
 note:"加え合わせ点は○（白丸）に±符号をつけて表す。引き出し点（●黒丸）と混同しないこと。"},

{type:"multi",
 q:"ブロック線図の構成要素として正しいものを全て選べ",
 opts:["要素（□）","信号（→ 矢印）","引き出し点（●）","加え合わせ点（○）","座標軸（縦軸・横軸）"],
 ans:["要素（□）","信号（→ 矢印）","引き出し点（●）","加え合わせ点（○）"],
 note:"構成要素は、要素（□）・信号（→）・引き出し点（●）・加え合わせ点（○）の4つ。"},

{type:"single",
 q:"引き出し点から信号が2つに分かれている場合の説明として正しいものを選べ",
 opts:[
   "分岐すると信号の値は半分になる",
   "分岐すると信号の値は2倍になる",
   "引き出し点の前後で信号の値は変わらない",
   "分岐した側の信号は0になる",
 ],
 ans:"引き出し点の前後で信号の値は変わらない",
 note:"引き出し点は同じ信号を分岐させるだけなので、前後および分岐先の信号の値はすべて等しい（変わらない）。"},

]},

// ──────────────────────────────────────────────
{id:"s3", no:"03", title:"システムの性質・制御系の特性", qs:[

{type:"single",
 q:"「制御工学」の講義で取り扱うシステムの性質に該当しないものを選べ",
 opts:["線形性","静特性","時不変性","因果性"],
 ans:"静特性",
 note:"システムの性質は 因果性・時不変性・線形性 の3つ。静特性は「制御系の特性の把握」で扱う用語であり、システムの性質には該当しない。"},

{type:"single",
 q:"システムの「因果性（Causality）」の説明として正しいものを選べ",
 opts:[
   "原因より先に結果が生じない性質",
   "システムの性質が時間原点の選び方に無関係である性質",
   "重ね合わせの原理が成立する性質",
   "外乱に対して強い性質",
 ],
 ans:"原因より先に結果が生じない性質",
 note:"因果性＝原因より先に結果が生じない性質。"},

{type:"single",
 q:"システムの「時不変性（Time Invariant）」の説明として正しいものを選べ",
 opts:[
   "原因より先に結果が生じない性質",
   "システムの性質が時間原点の選び方に無関係（時間でずれても変わらない）である性質",
   "重ね合わせの原理が成立する性質",
   "入出力が時間関数に依存しない性質",
 ],
 ans:"システムの性質が時間原点の選び方に無関係（時間でずれても変わらない）である性質",
 note:"時不変性＝システムの性質が時間原点の選び方に無関係（時間でずれても変わらない）性質。"},

{type:"single",
 q:"システムの「線形性（Linearity）」の説明として正しいものを選べ",
 opts:[
   "原因より先に結果が生じない性質",
   "時間原点の選び方に無関係である性質",
   "重ね合わせの原理が成立する性質",
   "外部から内部状況を把握できる性質",
 ],
 ans:"重ね合わせの原理が成立する性質",
 note:"線形性＝重ね合わせの原理が成立する性質。"},

{type:"single",
 q:"「線形化（Linearization）」の説明として最も適切なものを選べ",
 opts:[
   "非線形な性質を、本質的な性質を失うことなく範囲を限定（狭く）して線形に扱う処理",
   "線形なシステムをわざと非線形に変える処理",
   "システムをすべて1次方程式に置き換えて精度を上げる処理",
   "外乱をすべて無視する処理",
 ],
 ans:"非線形な性質を、本質的な性質を失うことなく範囲を限定（狭く）して線形に扱う処理",
 note:"線形化＝非線形特性を、本質的な性質を失うことなく範囲を限定して線形（線形として扱う）にする処理。"},

{type:"single",
 q:"制御系としてのシステムの「最良の動作」であることを意味する用語を選べ",
 opts:["同定","可制御","可観測","規範","ロバスト（堅牢）"],
 ans:"規範",
 note:"規範＝制御系としてのシステムの最良な動作であることを表す特性。"},

{type:"single",
 q:"「可制御」の説明として正しいものを選べ",
 opts:[
   "制御系が入力操作により制御し得るか否かの特性",
   "制御系の状態を外部状況のみから把握し得るか否かの特性",
   "システムの構成を明らかにすること",
   "外乱や検出誤差に対して強い特性",
 ],
 ans:"制御系が入力操作により制御し得るか否かの特性",

/* =====================================================================
   STATE / STORAGE
===================================================================== */
let state = {};
try{ state = JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); }catch(e){}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); if(window.progressSave) progressSave(STORAGE_KEY, state); }

/* lookup helper（key = "<secId>_<qi>"） */
function getQ(secId,key){
  const sec=SECTIONS.find(s=>s.id===secId);
  if(!sec) return null;
  const qi=parseInt(key.split("_")[1]);
  return sec.qs[qi];
}

/* =====================================================================
   KaTeX 数式描画
===================================================================== */
window.KATEX_OPTS={delimiters:[
  {left:"$$",right:"$$",display:true},
  {left:"$",right:"$",display:false},
  {left:"\\(",right:"\\)",display:false},
  {left:"\\[",right:"\\]",display:true}
],throwOnError:false};
function typeset(el){ if(window.renderMathInElement && el){ try{ renderMathInElement(el, window.KATEX_OPTS); }catch(e){} } }

/* =====================================================================
   SCORE
===================================================================== */
function computeScore(){
  let done=0, total=0;
  SECTIONS.forEach(sec=>{
    sec.qs.forEach((q,qi)=>{
      total++;
      const k=`${sec.id}_${qi}`;
      if(state[k]===1) done++;
    });
  });
  return {done,total};
}
function updateScore(){
  const {done,total}=computeScore();
  document.getElementById("sNum").textContent=`${done} / ${total}`;
  document.getElementById("sBar").style.width= total?`${done/total*100}%`:"0%";
}
function resetAll(){
  if(!confirm("進捗をリセットしますか？")) return;
  state={};
  save();
  location.reload();
}

/* =====================================================================
   NORM (for input matching)
===================================================================== */
function norm(s){ return s.replace(/[　\s]/g,"").toLowerCase().replace(/[，,。．.、]/g,""); }
function matchInput(val,answers){
  const n=norm(val);
  if(!Array.isArray(answers)) answers=[answers];
  return answers.some(a=>norm(a)===n || n.includes(norm(a)) || norm(a).includes(n));
}

/* =====================================================================
   RENDER
===================================================================== */
function renderAll(){
  const app=document.getElementById("app");
  const toc=document.getElementById("toc");
  toc.innerHTML="";
  app.innerHTML="";

  SECTIONS.forEach(sec=>{
    const a=document.createElement("a");
    a.href=`#${sec.id}`; a.textContent=`${sec.no} ${sec.title}`;
    toc.appendChild(a);

    const el=document.createElement("section");
    el.id=sec.id;

    let secDone=0, secTotal=sec.qs.length;
    sec.qs.forEach((q,qi)=>{
      const k=`${sec.id}_${qi}`;
      if(state[k]===1) secDone++;
    });

    el.innerHTML=`
      <div class="sec-head">
        <span class="sec-no">${sec.no}</span>
        <h2>${sec.title}</h2>
        <span class="sec-score" id="ss_${sec.id}">${secDone}/${secTotal}</span>
      </div>`;

    sec.qs.forEach((q,qi)=>{
      const k=`${sec.id}_${qi}`;
      const card=buildQuestion(q, qi, k, sec.id);
      el.appendChild(card);
    });

    app.appendChild(el);
  });

  updateScore();
  typeset(app);
}

function buildQuestion(q, qi, key, secId){
  const div=document.createElement("div");
  div.className="q"+(state[key]===1?" correct":state[key]===-1?" wrong":"");
  div.id=`q_${key}`;

  const qn=qi+1;
  let inner=`<div class="q-top"><span class="qn">Q${qn}</span><div class="q-body">
    <div class="prompt">${q.q}</div>`;

  if(q.type==="single"){
    inner+=`<div class="opts">`;
    q.opts.forEach((o,oi)=>{
      let cls="opt";
      if(state[key]!==undefined){
        if(o===q.ans) cls+=" reveal";
        if(state[key+"_pick"]===o && o!==q.ans) cls+=" pick-wrong";
        if(state[key+"_pick"]===o && o===q.ans) cls+=" pick-correct";
      }
      const dis=state[key]!==undefined?"disabled":"";
      inner+=`<button class="${cls}" ${dis} onclick="pickSingle('${key}','${secId}',${oi})"><span class="lab">${labelChar(oi)}</span>${o}</button>`;
    });
    inner+=`</div>`;

  }else if(q.type==="multi"){
    inner+=`<div class="opts" id="mopts_${key}">`;
    q.opts.forEach((o,oi)=>{
      let cls="opt";
      const sel=state[key+"_sel"] && state[key+"_sel"].includes(o);
      if(sel) cls+=" multi-selected";
      if(state[key]!==undefined){
        if(q.ans.includes(o)) cls+=" reveal";
        if(sel && !q.ans.includes(o)) cls+=" pick-wrong";
        if(sel && q.ans.includes(o)) cls+=" pick-correct";
      }
      const dis=state[key]!==undefined?"disabled":"";
      inner+=`<button class="${cls}" ${dis} onclick="toggleMulti('${key}','${secId}',${oi})"><span class="lab">${labelChar(oi)}</span>${o}</button>`;
    });
    inner+=`</div>`;
    if(state[key]===undefined){
      inner+=`<div class="multi-submit"><button class="btn" onclick="submitMulti('${key}','${secId}')">採点</button></div>`;
    }

  }else if(q.type==="sort"){
    const placed=state[key+"_placed"]||[];
    inner+=`<div class="sort-bank" id="sbank_${key}">`;
    q.items.forEach((item,ii)=>{
      if(placed.includes(item)) return;
      inner+=`<button class="sort-item" onclick="placeSortItem('${key}','${secId}',${ii})">${item}</button>`;
    });
    inner+=`</div>`;
    inner+=`<div class="sort-answer" id="sans_${key}">`;
    q.items.forEach((_,ii)=>{
      const filledWith=placed[ii]||"";
      const slotCls="slot"+(filledWith?" filled":"");
      inner+=`<div class="${slotCls}" onclick="removeSortItem('${key}','${secId}',${ii})">${ii+1}. ${filledWith||"ここをタップして削除"}</div>`;
    });
    inner+=`</div>`;
    if(placed.length===q.items.length && state[key]===undefined){
      inner+=`<div class="multi-submit"><button class="btn" onclick="submitSort('${key}','${secId}')">採点</button></div>`;
    }

  }else if(q.type==="input"){
    const val=state[key+"_val"]||"";
    const inputCls=state[key]===1?"ok":state[key]===-1?"ng":"";
    const dis=state[key]!==undefined?"disabled":"";
    inner+=`<div class="inrow">
      <input id="inp_${key}" type="text" value="${val.replace(/"/g,'&quot;')}" ${dis} class="${inputCls}" placeholder="答えを入力"
        onkeydown="if(event.key==='Enter')submitInput('${key}','${secId}')">
      ${state[key]===undefined?`<button class="btn" onclick="submitInput('${key}','${secId}')">採点</button>`:""}
      ${state[key]!==undefined && state[key]!==1?`<button class="btn ghost" onclick="revealInput('${key}','${secId}')">答えを見る</button>`:""}
    </div>`;
    if(q.hint && state[key]===undefined){
      inner+=`<div class="note" style="margin-top:6px">💡 ヒント: ${q.hint}</div>`;
    }
  }

  const fbShow=state[key]!==undefined?"show":"";
  const verdictLabel=state[key]===1?"✓ 正解":"✗ 不正解";
  const verdictCls=state[key]===1?"g":"b";
  inner+=`<div class="fb ${fbShow}" id="fb_${key}">
    <span class="verdict ${verdictCls}">${verdictLabel}</span>
    ${q.note?`<div class="note">${q.note}</div>`:""}
  </div>`;

  inner+=`</div></div>`;
  div.innerHTML=inner;
  return div;
}

function labelChar(i){ return String.fromCharCode(65+i)+"."; }

/* =====================================================================
   INTERACTIONS（選択肢はインデックスで受け渡し → 数式LaTeXが壊れない）
===================================================================== */
function pickSingle(key,secId,oi){
  const q=getQ(secId,key); if(!q) return;
  const chosen=q.opts[oi], ans=q.ans;
  if(state[key]===undefined && chosen===ans && window.addPoints) addPoints(100);
  state[key]=chosen===ans?1:-1;
  state[key+"_pick"]=chosen;
  save(); refreshQ(key,secId);
}

function toggleMulti(key,secId,oi){
  const q=getQ(secId,key); if(!q) return;
  const opt=q.opts[oi];
  if(!state[key+"_sel"]) state[key+"_sel"]=[];
  const idx=state[key+"_sel"].indexOf(opt);
  if(idx>-1) state[key+"_sel"].splice(idx,1);
  else state[key+"_sel"].push(opt);
  save(); refreshQ(key,secId);
}

function submitMulti(key,secId){
  const q=getQ(secId,key); if(!q) return;
  const sel=state[key+"_sel"]||[]; const ans=q.ans;
  const correct=sel.length===ans.length && ans.every(a=>sel.includes(a));
  if(state[key]===undefined && correct && window.addPoints) addPoints(100);
  state[key]=correct?1:-1;
  save(); refreshQ(key,secId);
}

function placeSortItem(key,secId,ii){
  const q=getQ(secId,key); if(!q) return;
  if(state[key]!==undefined) return;
  const item=q.items[ii];
  if(!state[key+"_placed"]) state[key+"_placed"]=[];
  if(state[key+"_placed"].includes(item)) return;
  state[key+"_placed"].push(item);
  save(); refreshQ(key,secId);
}

function removeSortItem(key,secId,idx){
  if(state[key]!==undefined) return;
  if(!state[key+"_placed"]) return;
  state[key+"_placed"].splice(idx,1);
  save(); refreshQ(key,secId);
}

function submitSort(key,secId){
  const q=getQ(secId,key); if(!q) return;
  const ans=q.ans;
  const placed=state[key+"_placed"]||[];
  const correct=ans.every((a,i)=>placed[i]===a);
  if(state[key]===undefined && correct && window.addPoints) addPoints(100);
  state[key]=correct?1:-1;
  save(); refreshQ(key,secId);
}

function submitInput(key,secId){
  const q=getQ(secId,key); if(!q) return;
  const ans=q.ans;
  const val=document.getElementById("inp_"+key).value.trim();
  state[key+"_val"]=val;
  const correct=matchInput(val,ans);
  if(state[key]===undefined && correct && window.addPoints) addPoints(100);
  state[key]=correct?1:-1;
  save(); refreshQ(key,secId);
}

function revealInput(key,secId){
  const q=getQ(secId,key); if(!q) return;
  const ans=q.ans;
  const ansDisplay=Array.isArray(ans)?ans[0]:ans;
  state[key+"_val"]=ansDisplay;
  state[key]=-1;
  save(); refreshQ(key,secId);
}

function refreshQ(key,secId){
  const sec=SECTIONS.find(s=>s.id===secId);
  if(!sec) return;
  const qi=parseInt(key.split("_")[1]);
  const q=sec.qs[qi];
  const old=document.getElementById("q_"+key);
  if(!old) return;
  const newCard=buildQuestion(q,qi,key,secId);
  old.replaceWith(newCard);
  typeset(newCard);

  let done=0;
  sec.qs.forEach((_,i)=>{ if(state[`${secId}_${i}`]===1) done++; });
  const ss=document.getElementById("ss_"+secId);
  if(ss) ss.textContent=`${done}/${sec.qs.length}`;

  updateScore();
}

/* ===== INIT ===== */
renderAll();
window._quizSync = async function() {
  const s = await progressLoad(STORAGE_KEY);
  if (!s || !Object.keys(s).length) return;
  let chg = false;
  for (const k in s) { if (s[k] && !state[k]) { state[k] = s[k]; chg = true; } }
  if (chg) { save(); renderAll(); }
};
