<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 2 熟語 — 科学技術英語Ⅰ Unit 1 &amp; 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c1117; --bg2:#121823; --card:#172230; --card2:#1f2d3d;
  --line:#2c3d52; --ink:#eef3f9; --muted:#93a6bd; --dim:#647688;
  --accent:#3dd7c4; --accent2:#2bb8d4;
  --u1:#3dd7c4; --u2:#b08cff;
  --good:#54e0a0; --bad:#ff6b8a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:"Outfit","Noto Sans JP",sans-serif; background:var(--bg); color:var(--ink);
  line-height:1.55; -webkit-font-smoothing:antialiased; min-height:100vh;
  background:
    radial-gradient(900px 500px at 90% -10%, rgba(43,184,212,.12), transparent 55%),
    radial-gradient(700px 400px at -5% 0%, rgba(176,140,255,.07), transparent 50%),
    var(--bg);
}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 50px}
header{padding:26px 0 14px}
.step-tag{font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);font-weight:700}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:1.7rem;margin-top:6px;display:flex;align-items:baseline;gap:9px}
h1 .n{font-family:"JetBrains Mono",monospace;font-size:1rem;color:var(--muted)}
.sub{color:var(--muted);font-size:.9rem;margin-top:5px}

.prog{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px}
.prog .row{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:var(--muted)}
.prog b{color:var(--accent);font-family:"JetBrains Mono",monospace;font-size:1.05rem}
.pbar{height:8px;background:var(--card2);border-radius:99px;margin-top:9px;overflow:hidden}
.pbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width .5s}

.tabs{display:flex;gap:8px;margin-top:18px}
.tab{flex:1;font-family:inherit;font-size:.95rem;font-weight:600;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px;cursor:pointer;transition:.18s}
.tab.on{background:var(--accent);color:#04201d;border-color:var(--accent)}
.filters{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
.fchip{font-family:inherit;font-size:.8rem;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:99px;padding:6px 13px;cursor:pointer;transition:.16s}
.fchip.on{color:var(--ink);border-color:var(--accent)}
.fchip.u1.on{border-color:var(--u1);color:var(--u1)}
.fchip.u2.on{border-color:var(--u2);color:var(--u2)}

/* card */
#cardView{margin-top:18px}
.counter{text-align:center;color:var(--muted);font-size:.85rem;font-family:"JetBrains Mono",monospace;margin-bottom:10px}
.flip{perspective:1400px;cursor:pointer;height:300px;margin-bottom:16px}
.flip-in{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.flip.flipped .flip-in{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;border:1px solid var(--line);background:linear-gradient(160deg,var(--card2),var(--card));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center}
.face.back{transform:rotateY(180deg)}
.unitpill{position:absolute;top:14px;left:14px;font-size:.68rem;font-weight:700;letter-spacing:.05em;padding:3px 9px;border-radius:99px}
.unitpill.u1{background:rgba(61,215,196,.15);color:var(--u1)}
.unitpill.u2{background:rgba(176,140,255,.15);color:var(--u2)}
.phrase{font-family:"Fraunces",serif;font-size:2.1rem;font-weight:600;letter-spacing:-.01em}
.tap-hint{position:absolute;bottom:16px;font-size:.72rem;color:var(--dim)}
.jp-big{font-family:"Noto Sans JP",sans-serif;font-size:1.55rem;font-weight:700;margin-bottom:14px}
.ex-en{color:var(--muted);font-size:.92rem;font-style:italic;max-width:400px}
.ex-en b{color:var(--accent);font-style:normal}
.known-flag{position:absolute;bottom:14px;font-size:.74rem;color:var(--good);font-weight:600;display:none}
.flip.isknown .known-flag{display:block}

.cardbtns{display:flex;gap:9px;align-items:center}
.navb{font-family:inherit;font-size:1.3rem;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:13px;width:54px;height:50px;cursor:pointer;transition:.16s;flex-shrink:0}
.navb:active{transform:scale(.95)}
.knowb{flex:1;font-family:inherit;font-size:.95rem;font-weight:700;height:50px;border-radius:13px;cursor:pointer;border:1px solid var(--line);background:var(--card2);color:var(--muted);transition:.16s}
.knowb.yes{background:rgba(84,224,160,.16);color:var(--good);border-color:var(--good)}
.toolrow{display:flex;gap:9px;margin-top:11px}
.toolrow button{flex:1;font-family:inherit;font-size:.82rem;color:var(--muted);background:none;border:1px solid var(--line);border-radius:10px;padding:9px;cursor:pointer;transition:.16s}
.toolrow button:hover{color:var(--ink);border-color:var(--accent)}

/* quiz */
#quizView{margin-top:18px;display:none}
.qhead{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:.85rem;font-family:"JetBrains Mono",monospace;margin-bottom:12px}
.phasebar{display:flex;gap:6px;margin-bottom:12px}
.phasebar .ph{flex:1;text-align:center;font-size:.74rem;font-weight:700;padding:6px;border-radius:8px;background:var(--card);color:var(--dim);border:1px solid var(--line)}
.phasebar .ph.on{background:rgba(61,215,196,.14);color:var(--accent);border-color:var(--accent)}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 18px}
.qmode{font-size:.74rem;color:var(--accent);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}
.qprompt{font-size:1.3rem;margin-bottom:5px;font-family:"Fraunces",serif;font-weight:600}
.qsentence{font-size:1.05rem;line-height:1.6;margin-bottom:6px}
.qsentence .blank{color:var(--accent);font-weight:700;font-family:"JetBrains Mono",monospace}
.qsmall{color:var(--muted);font-size:.82rem;margin-bottom:14px}
.qsmall.jp{font-family:"Noto Sans JP",sans-serif}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.qopt{font-family:"Noto Sans JP",sans-serif;font-size:.98rem;font-weight:500;color:var(--ink);background:var(--bg2);border:2px solid var(--line);border-radius:13px;padding:12px 11px;cursor:pointer;transition:.16s;text-align:center}
.qopt.en{font-family:"JetBrains Mono",monospace;font-size:.95rem}
.qopt:hover:not(:disabled){border-color:var(--accent)}
.qopt:disabled{cursor:default}
.qopt.ok{border-color:var(--good);background:rgba(84,224,160,.12);color:var(--good)}
.qopt.ng{border-color:var(--bad);background:rgba(255,107,138,.1);color:var(--bad)}
.qfb{margin-top:13px;font-size:.93rem;min-height:22px}
.qfb .v{font-weight:700}
.qfb .v.g{color:var(--good)} .qfb .v.b{color:var(--bad)}
.qfb .corr{color:var(--accent);font-weight:700}
.qfb .jp{font-family:"Noto Sans JP",sans-serif;color:var(--muted);font-size:.85rem;display:block;margin-top:4px}
.qbtns{display:flex;gap:9px;margin-top:16px}
.qnext{flex:1;font-family:inherit;font-size:.98rem;font-weight:700;height:48px;border-radius:13px;cursor:pointer;border:1px solid var(--line);background:var(--card2);color:var(--ink);display:none}

.done-banner{background:linear-gradient(135deg,rgba(84,224,160,.16),rgba(61,215,196,.1));border:1px solid var(--good);border-radius:18px;padding:24px;text-align:center;display:none}
.done-banner h3{font-family:"Fraunces",serif;font-size:1.5rem;color:var(--good);margin-bottom:8px}
.done-banner p{color:var(--muted);font-size:.92rem}
.done-banner .jp{font-family:"Noto Sans JP",sans-serif}
footer{text-align:center;color:var(--dim);font-size:.8rem;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="step-tag">Step 2 / 4 ・ 熟語</div>
  <h1>熟語アプリ <span class="n">phrasal verbs</span></h1>
  <p class="sub">章末 Key Phrases ＋ 本文の重要句動詞。意味を覚えて、文の中で使えるように。</p>
</header>

<div class="prog">
  <div class="row"><span>覚えた熟語</span><span><b id="knownN">0</b> / <span id="totalN">0</span></span></div>
  <div class="pbar"><i id="knownBar"></i></div>
</div>

<div class="tabs">
  <button class="tab on" id="tabCard" onclick="setView('card')">📇 カード</button>
  <button class="tab" id="tabQuiz" onclick="setView('quiz')">✏️ テスト</button>
</div>

<div class="filters" id="filters">
  <button class="fchip on" id="fAll" onclick="setFilter('all')">ぜんぶ</button>
  <button class="fchip u1" id="fU1" onclick="setFilter('U1')">Unit 1</button>
  <button class="fchip u2" id="fU2" onclick="setFilter('U2')">Unit 2</button>
  <button class="fchip" id="fUnknown" onclick="setFilter('unknown')">まだのみ</button>
</div>

<!-- card -->
<div id="cardView">
  <div class="counter" id="cardCounter">1 / 0</div>
  <div class="flip" id="flip" onclick="flipCard()">
    <div class="flip-in">
      <div class="face front">
        <span class="unitpill" id="fpUnit">U1</span>
        <div class="phrase" id="fpPhrase">phrase</div>
        <div class="known-flag">✓ 覚えた</div>
        <div class="tap-hint">タップで意味を見る</div>
      </div>
      <div class="face back">
        <span class="unitpill" id="bpUnit">U1</span>
        <div class="jp-big" id="bpJp">日本語</div>
        <div class="ex-en" id="bpEx">example</div>
        <div class="tap-hint">タップで戻る</div>
      </div>
    </div>
  </div>
  <div class="cardbtns">
    <button class="navb" onclick="prevCard()">‹</button>
    <button class="knowb" id="knowBtn" onclick="toggleKnown(event)">覚えた？</button>
    <button class="navb" onclick="nextCard()">›</button>
  </div>
  <div class="toolrow">
    <button onclick="shuffleCards()">🔀 シャッフル</button>
    <button onclick="resetKnown()">↺ 覚えたをリセット</button>
  </div>
</div>

<!-- quiz -->
<div id="quizView">
  <div class="phasebar">
    <div class="ph on" id="ph1">① 熟語 → 意味</div>
    <div class="ph" id="ph2">② 文完成</div>
  </div>
  <div class="qhead"><span id="qProgress">0 問正解</span><span id="qRemain"></span></div>
  <div class="qcard" id="qCard">
    <div class="qmode" id="qMode"></div>
    <div id="qPromptWrap"></div>
    <div class="qsmall" id="qSmall"></div>
    <div class="qopts" id="qOpts"></div>
    <div class="qfb" id="qFb"></div>
    <div class="qbtns"><button class="qnext" id="qNext">次へ ›</button></div>
  </div>
  <div class="done-banner" id="doneBanner">
    <h3>🎉 熟語クリア</h3>
    <p class="jp">意味も文完成も完璧。<b>「熟語OK」</b>って送って Step 3（文法）へ！</p>
  </div>
</div>

<footer>Step 2 熟語 ／ Key Phrases ＋ 本文句動詞</footer>
</div>

<script>
/* [phrase, jp, exampleHTML(<b>で熟語強調), unit] */
const PHRASES=[
 ["fight off","撃退する・追い払う","make it harder for sparrows to <b>fight off</b> West Nile virus","U1"],
 ["focus on","焦点を当てる・集中する","stop <b>focusing on</b> unimportant details","U1"],
 ["interact with","関わり合う・相互作用する","how life in the oceans <b>interacts with</b> the environment","U1"],
 ["start with","〜から始める／始まる","Smyth <b>started with</b> a world atlas","U1"],
 ["vary from","〜によって異なる","these factors <b>vary from</b> place to place","U1"],
 ["mess up","台無しにする・混乱させる","too much light can <b>mess up</b> their usual patterns","U1"],
 ["stretch over","〜の上に広がる","haloes of light that <b>stretch over</b> the ocean","U1"],
 ["be safe from","〜から安全だ","Not even the sea is <b>safe from</b> the glare","U1"],
 ["be known to do","〜することで知られる","Artificial lights are <b>known to</b> affect land dwellers","U1"],
 ["a key part of","〜の重要な一部","copepods are <b>a key part of</b> ocean food webs","U1"],
 ["seek safety from","〜から安全を求める","<b>seeking safety from</b> surface predators","U1"],
 ["tune out","〜を無視する","why teens <b>tune out</b> their mom's voice","U2"],
 ["tune in to","〜に耳を傾ける","kids' brains are <b>tuned in to</b> their mothers' voices","U2"],
 ["morph into","〜に姿を変える","as kids <b>morph into</b> teens","U2"],
 ["pay attention to","〜に注意を払う","brains <b>pay more attention to</b> the wider world","U2"],
 ["respond to","〜に反応する","brains <b>respond</b> more <b>to</b> unfamiliar voices","U2"],
 ["adapt to","〜に適応する","the brain seems to <b>adapt to</b> new needs","U2"],
 ["come with","〜と共に生じる","new needs that <b>come with</b> adolescence","U2"],
 ["carry out","実施する・成し遂げる","she <b>carried out</b> that 2011 study","U2"],
 ["depend on","〜に頼る","our survival <b>depends on</b> maternal support","U2"],
 ["rely on","〜に頼る","we <b>rely</b> more <b>on</b> our peers","U2"],
 ["stress out","(ストレスで)疲れさせる","<b>stressed-out</b> girls heard their moms' voices","U2"],
 ["in the midst of","〜の最中で","in the <b>midst of</b> puberty","U2"],
 ["in times of","〜の時に","especially <b>in times of</b> stress","U2"],
 ["a reflection of","〜の反映","just purely <b>a reflection of</b> this","U2"],
 ["be frustrated by","〜にイライラする","feel <b>frustrated by</b> missed messages","U2"],
];

/* 文完成（章末 Key Phrases）: sentence, opts(5), ans(原形), disp(語形), note, unit */
const COMPLETE=[
 {s:"The entrance ceremony last April ___ a speech made by the president.",opts:["fight off","focus on","interact with","start with","vary from"],ans:"start with",disp:"started with",note:"主語が単数の過去 → started with",u:"U1"},
 {s:"The budget provided by the company will ___ project to project.",opts:["fight off","focus on","interact with","start with","vary from"],ans:"vary from",disp:"vary from",note:"will の後で原形。vary from A to A=AごとにAへと異なる",u:"U1"},
 {s:"The vaccine ___ another drug and resulted in a deadly side effect.",opts:["fight off","focus on","interact with","start with","vary from"],ans:"interact with",disp:"interacted with",note:"resulted と並ぶ過去形 → interacted with",u:"U1"},
 {s:"We need to stop ___ unimportant details or we'll never move forward.",opts:["fight off","focus on","interact with","start with","vary from"],ans:"focus on",disp:"focusing on",note:"stop +動名詞 → focusing on",u:"U1"},
 {s:"Some insects succeed in ___ their predators by emitting chemicals.",opts:["fight off","focus on","interact with","start with","vary from"],ans:"fight off",disp:"fighting off",note:"succeed in +動名詞 → fighting off",u:"U1"},
 {s:"___ her doctor's advice led to her ruining her health.",opts:["adapt to","carry out","come with","respond to","tune out"],ans:"tune out",disp:"Tuning out",note:"文頭の主語＝動名詞、大文字 → Tuning out",u:"U2"},
 {s:"The researchers expected the microbe to ___ moisture.",opts:["adapt to","carry out","come with","respond to","tune out"],ans:"respond to",disp:"respond to",note:"to の後で原形 → respond to",u:"U2"},
 {s:"Some refugees have serious difficulties in ___ a new environment.",opts:["adapt to","carry out","come with","respond to","tune out"],ans:"adapt to",disp:"adapting to",note:"difficulty in +動名詞 → adapting to",u:"U2"},
 {s:"We need to respect the knowledge and experiences that ___ age.",opts:["adapt to","carry out","come with","respond to","tune out"],ans:"come with",disp:"come with",note:"先行詞は複数 → come with（三単現sなし）",u:"U2"},
 {s:"To get accurate data, we will ___ pre- and post-surveys of the experiment.",opts:["adapt to","carry out","come with","respond to","tune out"],ans:"carry out",disp:"carry out",note:"will の後で原形 → carry out",u:"U2"},
];

let known={}; try{known=JSON.parse(localStorage.getItem("idiom_known_u12")||"{}");}catch(e){known={};}
function saveKnown(){try{localStorage.setItem("idiom_known_u12",JSON.stringify(known));}catch(e){}}
const keyOf=p=>p[0]+"|"+p[3];

let filter="all", order=[], idx=0, view="card";
function pool(){
  if(filter==="all") return PHRASES.map((_,i)=>i);
  if(filter==="unknown") return PHRASES.map((_,i)=>i).filter(i=>!known[keyOf(PHRASES[i])]);
  return PHRASES.map((_,i)=>i).filter(i=>PHRASES[i][3]===filter);
}
function rebuild(){ order=pool(); if(order.length===0)order=[0]; idx=0; }

function setView(v){
  view=v;
  document.getElementById("tabCard").classList.toggle("on",v==="card");
  document.getElementById("tabQuiz").classList.toggle("on",v==="quiz");
  document.getElementById("cardView").style.display=v==="card"?"block":"none";
  document.getElementById("quizView").style.display=v==="quiz"?"block":"none";
  document.getElementById("filters").style.display=v==="card"?"flex":"none";
  if(v==="card"){ rebuild(); renderCard(); } else startQuiz();
}
function setFilter(f){
  filter=f;
  ["fAll","fU1","fU2","fUnknown"].forEach(id=>document.getElementById(id).classList.remove("on"));
  document.getElementById({all:"fAll",U1:"fU1",U2:"fU2",unknown:"fUnknown"}[f]).classList.add("on");
  rebuild(); renderCard();
}

/* cards */
function renderCard(){
  const p=PHRASES[order[idx]], f=document.getElementById("flip");
  f.classList.remove("flipped");
  f.classList.toggle("isknown", !!known[keyOf(p)]);
  document.getElementById("cardCounter").textContent=(idx+1)+" / "+order.length;
  const up=p[3].toLowerCase();
  document.getElementById("fpUnit").textContent=p[3]; document.getElementById("fpUnit").className="unitpill "+up;
  document.getElementById("bpUnit").textContent=p[3]; document.getElementById("bpUnit").className="unitpill "+up;
  document.getElementById("fpPhrase").textContent=p[0];
  document.getElementById("bpJp").textContent=p[1];
  document.getElementById("bpEx").innerHTML="“"+p[2]+"”";
  const kb=document.getElementById("knowBtn");
  if(known[keyOf(p)]){kb.classList.add("yes");kb.textContent="✓ 覚えた";}
  else{kb.classList.remove("yes");kb.textContent="覚えた？";}
}
function flipCard(){ document.getElementById("flip").classList.toggle("flipped"); }
function nextCard(){ idx=(idx+1)%order.length; renderCard(); }
function prevCard(){ idx=(idx-1+order.length)%order.length; renderCard(); }
function toggleKnown(e){
  e.stopPropagation();
  const p=PHRASES[order[idx]], k=keyOf(p);
  if(known[k]) delete known[k]; else known[k]=1;
  saveKnown(); updateProg(); renderCard();
  if(known[k]) setTimeout(()=>{ if(view==="card") nextCard(); },250);
}
function shuffleCards(){ for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];} idx=0; renderCard(); }
function resetKnown(){ if(!confirm("「覚えた」を全部リセットする？"))return; known={}; saveKnown(); updateProg(); rebuild(); renderCard(); }
function updateProg(){
  const n=PHRASES.filter(p=>known[keyOf(p)]).length;
  document.getElementById("knownN").textContent=n;
  document.getElementById("knownBar").style.width=(n/PHRASES.length*100)+"%";
}

/* quiz: phase1 meaning(全PHRASES), phase2 complete(COMPLETE) */
let qItems=[], qi=0, qCorrect=0, qRetry=[];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(){
  const meaning=shuffle(PHRASES.map((_,i)=>({t:"m",i})));
  const comp=shuffle(COMPLETE.map((_,i)=>({t:"c",i})));
  qItems=meaning.concat(comp);
  qi=0; qCorrect=0; qRetry=[];
  document.getElementById("doneBanner").style.display="none";
  document.getElementById("qCard").style.display="block";
  showQ();
}
function showQ(){
  if(qi>=qItems.length){
    if(qRetry.length){ qItems=shuffle(qRetry.slice()); qRetry=[]; qi=0; }
    else { finishQuiz(); return; }
  }
  const it=qItems[qi];
  document.getElementById("ph1").classList.toggle("on", it.t==="m");
  document.getElementById("ph2").classList.toggle("on", it.t==="c");
  const fb=document.getElementById("qFb"); fb.innerHTML="";
  const next=document.getElementById("qNext"); next.style.display="none";
  const opts=document.getElementById("qOpts"); delete opts.dataset.locked;
  const pw=document.getElementById("qPromptWrap");
  const mEl=document.getElementById("qMode"), sEl=document.getElementById("qSmall");

  if(it.t==="m"){
    const p=PHRASES[it.i];
    mEl.textContent="熟語 → 意味";
    pw.innerHTML=`<div class="qprompt">${p[0]}</div>`;
    sEl.className="qsmall"; sEl.textContent=p[3];
    const uniq=[...new Set(PHRASES.filter(x=>x[1]!==p[1]).map(x=>x[1]))];
    shuffle(uniq);
    const choices=shuffle([p[1], ...uniq.slice(0,3)]);
    opts.innerHTML=choices.map(c=>`<button class="qopt" onclick="pick(this,${c===p[1]?1:0},'${p[1].replace(/'/g,"\\'")}','${p[0].replace(/'/g,"\\'")}','${p[1].replace(/'/g,"\\'")}')">${c}</button>`).join("");
  } else {
    const c=COMPLETE[it.i];
    mEl.textContent="文完成（語形に注意）";
    pw.innerHTML=`<div class="qsentence">${c.s.replace("___",'<span class="blank">______</span>')}</div>`;
    sEl.className="qsmall jp"; sEl.textContent="語群から選ぶ ・ "+c.u;
    const choices=c.opts.slice();
    opts.innerHTML=choices.map(o=>`<button class="qopt en" onclick="pick(this,${o===c.ans?1:0},'${c.ans.replace(/'/g,"\\'")}','${c.disp.replace(/'/g,"\\'")}','${c.note.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">${o}</button>`).join("");
  }
  updateHead();
}
function pick(btn, ok, ansText, corrShow, extra){
  const opts=document.getElementById("qOpts");
  if(opts.dataset.locked) return;
  opts.dataset.locked="1";
  const it=qItems[qi];
  [...opts.children].forEach(b=>{
    b.disabled=true;
    const isAns = it.t==="m" ? (b.textContent===ansText) : (b.textContent===ansText);
    if(isAns) b.classList.add("ok");
  });
  if(!ok) btn.classList.add("ng");
  const fb=document.getElementById("qFb");
  if(ok){
    qCorrect++;
    if(it.t==="m"){ known[keyOf(PHRASES[it.i])]=1; saveKnown(); updateProg(); }
    fb.innerHTML=`<span class="v g">◎ 正解</span> <span class="corr">${corrShow}</span>`+(it.t==="c"?`<span class="jp">${extra}</span>`:"");
  } else {
    qRetry.push(it);
    fb.innerHTML=`<span class="v b">✕</span> 答え: <span class="corr">${corrShow}</span>`+(it.t==="c"?`<span class="jp">${extra}</span>`:`<span class="jp">＝ ${ansText}</span>`);
  }
  const next=document.getElementById("qNext");
  next.style.display="block"; next.onclick=()=>{qi++;showQ();};
  updateHead();
}
function updateHead(){
  document.getElementById("qProgress").textContent=qCorrect+" 問正解";
  document.getElementById("qRemain").textContent="残り "+Math.max(0,qItems.length-qi)+(qRetry.length?(" +復習"+qRetry.length):"");
}
function finishQuiz(){
  document.getElementById("qCard").style.display="none";
  document.getElementById("doneBanner").style.display="block";
  document.getElementById("ph1").classList.remove("on"); document.getElementById("ph2").classList.remove("on");
  document.getElementById("qRemain").textContent="完了";
}

document.getElementById("totalN").textContent=PHRASES.length;
rebuild(); renderCard(); updateProg();
</script>
</body>
