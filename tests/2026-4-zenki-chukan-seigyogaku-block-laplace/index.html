<script>
const STORAGE_KEY = "seigyo_block_laplace_v2";

/* =====================================================================
   問題データ
   type: "single"
   single: opts[], ans (string)
===================================================================== */
const SECTIONS = [

// ──────────────────────────────────────────────
{id:"s1", no:"01", title:"ブロック線図の等価変換 変換1〜5", qs:[

/* --- 変換1: 伝達要素の入れ換え --- */
{type:"single",
 q:"等価変換1「伝達要素の入れ換え」の説明として正しいものを選べ",
 opts:[
   "直列接続した $G_1(s)$ と $G_2(s)$ の順序を入れ換えると出力 $C(s)$ が変化する",
   "直列接続した $G_1(s)$ と $G_2(s)$ の順序を入れ換えても入出力関係は等価のままである",
   "順序を入れ換えると合成伝達関数が $G_1(s)+G_2(s)$ になる",
   "要素の入れ換えはフィードバック系でのみ成立する",
 ],
 ans:"直列接続した $G_1(s)$ と $G_2(s)$ の順序を入れ換えても入出力関係は等価のままである",
 note:"乗算は交換可能なので $G_1 \\cdot G_2 = G_2 \\cdot G_1$。直列要素の順序は自由に入れ換えられる（等価変換1）。"},

{type:"single",
 q:"$R(s) \\to [G_1(s)] \\to [G_2(s)] \\to C(s)$ と等価な直列構成はどれか",
 opts:[
   "$R(s) \\to [G_2(s)] \\to [G_1(s)] \\to C(s)$",
   "$R(s) \\to [G_1(s)+G_2(s)] \\to C(s)$",
   "$R(s) \\to \\left[\\dfrac{G_1(s)}{G_2(s)}\\right] \\to C(s)$",
   "等価な構成は存在しない",
 ],
 ans:"$R(s) \\to [G_2(s)] \\to [G_1(s)] \\to C(s)$",
 note:"等価変換1：直列要素の順序は入れ換えても等価。$C(s)=G_1 G_2 R = G_2 G_1 R$。"},

{type:"single",
 q:"「直列接続した2つの伝達要素の順序を入れ換える」のは表3.2の何番の等価変換か",
 opts:[
   "変換1（伝達要素の入れ換え）",
   "変換2（伝達関数の合成）",
   "変換3（分岐点の入れ換え）",
   "変換8（並列接続）",
 ],
 ans:"変換1（伝達要素の入れ換え）",
 note:"変換1「伝達要素の入れ換え」は直列2要素の順序交換。変換2は2要素を1ブロックに合成する変換で異なる。"},

/* --- 変換2: 伝達関数の合成 --- */
{type:"single",
 q:"等価変換2「伝達関数の合成」において、$G_1(s)$ と $G_2(s)$ が直列接続のとき合成伝達関数はどれか",
 opts:[
   "$G_1(s) + G_2(s)$",
   "$G_1(s) \\cdot G_2(s)$",
   "$\\dfrac{G_1(s)}{G_2(s)}$",
   "$G_1(s) - G_2(s)$",
 ],
 ans:"$G_1(s) \\cdot G_2(s)$",
 note:"直列接続の合成伝達関数は積：$G_1(s) \\cdot G_2(s)$。2つのブロックを1つにまとめられる。"},

{type:"single",
 q:"$G_1(s)=\\dfrac{1}{s+1}$、$G_2(s)=\\dfrac{s}{s+3}$ を直列接続したときの合成伝達関数はどれか",
 opts:[
   "$\\dfrac{s}{(s+1)(s+3)}$",
   "$\\dfrac{1}{s+1}+\\dfrac{s}{s+3}$",
   "$\\dfrac{s+1}{s(s+3)}$",
   "$\\dfrac{(s+1)(s+3)}{s}$",
 ],
 ans:"$\\dfrac{s}{(s+1)(s+3)}$",
 note:"$G_1 \\cdot G_2 = \\dfrac{1}{s+1} \\cdot \\dfrac{s}{s+3} = \\dfrac{s}{(s+1)(s+3)}$（等価変換2）。"},

/* --- 変換3: 分岐点の入れ換え --- */
{type:"single",
 q:"等価変換3「分岐点の入れ換え」として正しいものを選べ",
 opts:[
   "2つの引き出し点（●）は順序を入れ換えても等価である",
   "引き出し点を入れ換えると信号値が変化する",
   "引き出し点の順序交換は系を不安定にする恐れがある",
   "引き出し点は1箇所にしか置けないため入れ換えはできない",
 ],
 ans:"2つの引き出し点（●）は順序を入れ換えても等価である",
 note:"引き出し点●は信号を分岐させるだけで値を変えない。よって隣接する2つの引き出し点の順序は等価に交換できる。"},

{type:"single",
 q:"ブロック線図で引き出し点（●）の前後・各分岐先では信号の値はどうなるか",
 opts:[
   "分岐先の信号値は元の信号の半分になる",
   "分岐先の信号値は元の信号と同じ値である",
   "分岐先の信号値の合計が元の信号値に等しい",
   "引き出し点の数に応じて信号値が変化する",
 ],
 ans:"分岐先の信号値は元の信号と同じ値である",
 note:"引き出し点●は同一信号を複数の経路に分岐させるだけ。前後・分岐先すべての信号値は等しい。これが分岐点の順序交換（変換3）を可能にする根拠。"},

/* --- 変換4: 加え合わせ点の入れ換え --- */
{type:"single",
 q:"等価変換4「加え合わせ点の入れ換え」の説明として正しいものを選べ",
 opts:[
   "複数の加え合わせ点（○）の順序を入れ換えると出力が変わる",
   "複数の加え合わせ点（○）の順序を入れ換えても等価である",
   "加え合わせ点の入れ換えは同符号（すべて正）の場合にのみ成立する",
   "加え合わせ点は最大2つまでしか順序交換できない",
 ],
 ans:"複数の加え合わせ点（○）の順序を入れ換えても等価である",
 note:"加え合わせ点は加算・減算を行うだけ。数学の加法の交換法則と同様に、順序を変えても等価（変換4）。"},

{type:"single",
 q:"「3つの入力 $R_1,R_2,R_3$ の加え合わせ順序を変更する」のは表3.2の何番の変換か",
 opts:[
   "変換4（加え合わせ点の入れ換え）",
   "変換1（伝達要素の入れ換え）",
   "変換6（加え合わせ点と引き出し点との入れ換え）",
   "変換8（並列接続）",
 ],
 ans:"変換4（加え合わせ点の入れ換え）",
 note:"変換4「加え合わせ点の入れ換え」。$(R_1+R_2)+R_3 = R_1+(R_2+R_3)$ は等価（加法の結合法則）。"},

/* --- 変換5: 加え合わせ点と伝達関数との入れ換え --- */
{type:"single",
 q:"等価変換5で、$R \\to [G(s)] \\to $ 加え合わせ点（$+U$）$\\to C$ の加え合わせ点を $G(s)$ の前に移した場合、$U$ の経路に追加する等価要素はどれか",
 opts:[
   "$G(s)$",
   "$\\dfrac{1}{G(s)}$",
   "$G^2(s)$",
   "追加不要（変化なし）",
 ],
 ans:"$\\dfrac{1}{G(s)}$",
 note:"加え合わせ点を $G(s)$ の後から前へ移すと $U$ 側に $\\dfrac{1}{G(s)}$ を追加。$C=G(R+\\frac{U}{G})=GR+U$ となり等価。"},

{type:"single",
 q:"等価変換5で、$R \\to $ 加え合わせ点（$+U$）$\\to [G(s)] \\to C$ の加え合わせ点を $G(s)$ の後に移した場合、$U$ の経路に追加する等価要素はどれか",
 opts:[
   "$G(s)$",
   "$\\dfrac{1}{G(s)}$",
   "$G^2(s)$",
   "追加不要",
 ],
 ans:"$G(s)$",
 note:"加え合わせ点を $G(s)$ の前から後へ移すと $U$ 側に $G(s)$ を追加。$C=G \\cdot R + G \\cdot U$ となり等価。"},

{type:"single",
 q:"等価変換5の正式名称はどれか",
 opts:[
   "加え合わせ点と伝達関数との入れ換え",
   "加え合わせ点と引き出し点との入れ換え",
   "引き出し点と伝達関数との入れ換え",
   "フィードバックループの取り外し",
 ],
 ans:"加え合わせ点と伝達関数との入れ換え",
 note:"変換5「加え合わせ点と伝達関数との入れ換え」。変換6は○と●の入れ換え、変換7は●と$G(s)$の入れ換えで異なる。"},

]},

// ──────────────────────────────────────────────
{id:"s2", no:"02", title:"ブロック線図の等価変換 変換6〜10", qs:[

/* --- 変換6: 加え合わせ点と引き出し点との入れ換え --- */
{type:"single",
 q:"等価変換6「加え合わせ点と引き出し点との入れ換え」の説明として正しいものを選べ",
 opts:[
   "加え合わせ点（○）と引き出し点（●）は等価な形に位置を入れ換えることができる",
   "加え合わせ点と引き出し点は必ず隣接して配置しなければならない",
   "引き出し点を加え合わせ点の前に移すと系が不安定になる",
   "この変換はフィードバック系にのみ適用できる",
 ],
 ans:"加え合わせ点（○）と引き出し点（●）は等価な形に位置を入れ換えることができる",
 note:"変換6：○と●の位置を入れ換えても、適切に信号経路を再構成することで入出力関係を保てる。"},

{type:"single",
 q:"変換6「加え合わせ点と引き出し点との入れ換え」に最も近い説明はどれか",
 opts:[
   "加え合わせ点（○）の直後にある引き出し点（●）の位置関係を変換する",
   "2つの直列伝達要素を1ブロックに合成する",
   "フィードバックループを1つの前向き伝達関数にまとめる",
   "並列接続した2要素を和にまとめる",
 ],
 ans:"加え合わせ点（○）の直後にある引き出し点（●）の位置関係を変換する",
 note:"変換6は○と●が隣接している場合の位置交換。信号の流れの整理・変換に用いられる。"},

{type:"single",
 q:"ブロック線図の等価変換において、変換の前後で必ず保たれるものはどれか",
 opts:[
   "信号経路の長さ（ブロック数）",
   "入力と出力の間の信号の関係（入出力関係・伝達関数）",
   "フィードバックゲインの値",
   "引き出し点の個数",
 ],
 ans:"入力と出力の間の信号の関係（入出力関係・伝達関数）",
 note:"等価変換の本質：変換の前後で入出力関係（伝達関数）は変わらない。これはすべての等価変換（変換1〜10）に共通する。"},

/* --- 変換7: 引き出し点と伝達関数との入れ換え --- */
{type:"single",
 q:"等価変換7で、$G(s)$ の後ろにある引き出し点（●）を $G(s)$ の前に移す場合、分岐路に追加する等価要素はどれか",
 opts:[
   "$G(s)$",
   "$\\dfrac{1}{G(s)}$",
   "$G^2(s)$",
   "追加不要",
 ],
 ans:"$G(s)$",
 note:"引き出し点を $G(s)$ の後から前に移動すると、分岐路に $G(s)$ を追加する。$C=GR$ を保つため、前に移した分岐路で $G(s) \\cdot R$ を取り出す必要がある。"},

{type:"single",
 q:"等価変換7で、$G(s)$ の前にある引き出し点（●）を $G(s)$ の後に移す場合、分岐路に追加する等価要素はどれか",
 opts:[
   "$G(s)$",
   "$\\dfrac{1}{G(s)}$",
   "$G^2(s)$",
   "追加不要",
 ],
 ans:"$\\dfrac{1}{G(s)}$",
 note:"引き出し点を $G(s)$ の前から後に移動すると、分岐路に $\\dfrac{1}{G(s)}$ を追加する。$R = \\dfrac{C}{G(s)}$ を保つように補正。"},

{type:"single",
 q:"変換5・6・7の区別として正しいものはどれか",
 opts:[
   "変換5：加え合わせ点と伝達関数、変換6：加え合わせ点と引き出し点、変換7：引き出し点と伝達関数の入れ換え",
   "変換5：加え合わせ点と引き出し点、変換6：伝達関数の合成、変換7：フィードバックの取り外し",
   "変換5：伝達関数の合成、変換6：並列接続、変換7：引き出し点の入れ換え",
   "変換5・6・7はすべてフィードバック系の変換を指す",
 ],
 ans:"変換5：加え合わせ点と伝達関数、変換6：加え合わせ点と引き出し点、変換7：引き出し点と伝達関数の入れ換え",
 note:"変換5〜7は「○または●」と「$G(s)$」の3種の入れ換え。名称を正確に覚える。"},

/* --- 変換8: 並列接続 --- */
{type:"single",

/* =====================================================================
   STATE / STORAGE
===================================================================== */
let state = {};
try{ state = JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); }catch(e){}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); if(window.progressSave) progressSave(STORAGE_KEY, state); }

function getQ(secId,key){
  const sec=SECTIONS.find(s=>s.id===secId);
  if(!sec) return null;
  const qi=parseInt(key.split("_")[1]);
  return sec.qs[qi];
}

/* =====================================================================
   KaTeX
===================================================================== */
window.KATEX_OPTS={delimiters:[
  {left:"$$",right:"$$",display:true},
  {left:"$",right:"$",display:false},
  {left:"\\(",right:"\\)",display:false},
  {left:"\\[",right:"\\]",display:true}
],throwOnError:false};
function typeset(el){ if(window.renderMathInElement && el){ try{ renderMathInElement(el, window.KATEX_OPTS); }catch(e){} } }

/* =====================================================================
   SCORE
===================================================================== */
function computeScore(){
  let done=0, total=0;
  SECTIONS.forEach(sec=>{
    sec.qs.forEach((q,qi)=>{
      total++;
      const k=`${sec.id}_${qi}`;
      if(state[k]===1) done++;
    });
  });
  return {done,total};
}
function updateScore(){
  const {done,total}=computeScore();
  document.getElementById("sNum").textContent=`${done} / ${total}`;
  document.getElementById("sBar").style.width= total?`${done/total*100}%`:"0%";
}
function resetAll(){
  if(!confirm("進捗をリセットしますか？")) return;
  state={};
  localStorage.setItem(STORAGE_KEY, "{}");
  localStorage.setItem(STORAGE_KEY + '_reset', '1');
  if(window.progressSave) progressSave(STORAGE_KEY, state);
  location.reload();
}

/* =====================================================================
   RENDER
===================================================================== */
function renderAll(){
  const app=document.getElementById("app");
  const toc=document.getElementById("toc");
  toc.innerHTML="";
  app.innerHTML="";

  SECTIONS.forEach(sec=>{
    const a=document.createElement("a");
    a.href=`#${sec.id}`; a.textContent=`${sec.no} ${sec.title}`;
    toc.appendChild(a);

    const el=document.createElement("section");
    el.id=sec.id;

    let secDone=0, secTotal=sec.qs.length;
    sec.qs.forEach((q,qi)=>{
      const k=`${sec.id}_${qi}`;
      if(state[k]===1) secDone++;
    });

    el.innerHTML=`
      <div class="sec-head">
        <span class="sec-no">${sec.no}</span>
        <h2>${sec.title}</h2>
        <span class="sec-score" id="ss_${sec.id}">${secDone}/${secTotal}</span>
      </div>`;

    sec.qs.forEach((q,qi)=>{
      const k=`${sec.id}_${qi}`;
      const card=buildQuestion(q, qi, k, sec.id);
      el.appendChild(card);
    });

    app.appendChild(el);
  });

  updateScore();
  typeset(app);
}

function buildQuestion(q, qi, key, secId){
  const div=document.createElement("div");
  div.className="q"+(state[key]===1?" correct":state[key]===-1?" wrong":"");
  div.id=`q_${key}`;

  const qn=qi+1;
  let inner=`<div class="q-top"><span class="qn">Q${qn}</span><div class="q-body">
    <div class="prompt">${q.q}</div>`;

  inner+=`<div class="opts">`;
  q.opts.forEach((o,oi)=>{
    let cls="opt";
    if(state[key]!==undefined){
      if(o===q.ans) cls+=" reveal";
      if(state[key+"_pick"]===o && o!==q.ans) cls+=" pick-wrong";
      if(state[key+"_pick"]===o && o===q.ans) cls+=" pick-correct";
    }
    const dis=state[key]!==undefined?"disabled":"";
    inner+=`<button class="${cls}" ${dis} onclick="pickSingle('${key}','${secId}',${oi})"><span class="lab">${labelChar(oi)}</span>${o}</button>`;
  });
  inner+=`</div>`;

  const fbShow=state[key]!==undefined?"show":"";
  const verdictLabel=state[key]===1?"✓ 正解":"✗ 不正解";
  const verdictCls=state[key]===1?"g":"b";
  inner+=`<div class="fb ${fbShow}" id="fb_${key}">
    <span class="verdict ${verdictCls}">${verdictLabel}</span>
    ${q.note?`<div class="note">${q.note}</div>`:""}
  </div>`;

  inner+=`</div></div>`;
  div.innerHTML=inner;
  return div;
}

function labelChar(i){ return String.fromCharCode(65+i)+"."; }

/* =====================================================================
   INTERACTIONS
===================================================================== */
function pickSingle(key,secId,oi){
  const q=getQ(secId,key); if(!q) return;
  const chosen=q.opts[oi], ans=q.ans;
  if(state[key]===undefined && chosen===ans && window.addPoints) addPoints(100);
  state[key]=chosen===ans?1:-1;
  state[key+"_pick"]=chosen;
  save(); refreshQ(key,secId);
}

function refreshQ(key,secId){
  const sec=SECTIONS.find(s=>s.id===secId);
  if(!sec) return;
  const qi=parseInt(key.split("_")[1]);
  const q=sec.qs[qi];
  const old=document.getElementById("q_"+key);
  if(!old) return;
  const newCard=buildQuestion(q,qi,key,secId);
  old.replaceWith(newCard);
  typeset(newCard);

  let done=0;
  sec.qs.forEach((_,i)=>{ if(state[`${secId}_${i}`]===1) done++; });
  const ss=document.getElementById("ss_"+secId);
  if(ss) ss.textContent=`${done}/${sec.qs.length}`;

  updateScore();
}

/* ===== INIT ===== */
renderAll();
window._quizSync = async function() {
  if(localStorage.getItem(STORAGE_KEY + '_reset')){
    localStorage.removeItem(STORAGE_KEY + '_reset');
    return;
  }
  const s = await progressLoad(STORAGE_KEY);
  if (!s || !Object.keys(s).length) return;
  let chg = false;
  for (const k in s) { if (s[k] && !state[k]) { state[k] = s[k]; chg = true; } }
  if (chg) { save(); renderAll(); }
};

<!-- 参照画像フローティングパネル -->
<style>
#ref-panel{
  position:fixed; bottom:20px; right:16px; z-index:300;
  display:flex; flex-direction:column; align-items:flex-end; gap:6px;
}
#ref-toggle{
  background:rgba(10,22,38,.92); border:1px solid #46d6c4; color:#46d6c4;
  font-size:.78rem; font-weight:600; padding:6px 12px; border-radius:99px;
  cursor:pointer; backdrop-filter:blur(6px); white-space:nowrap;
  letter-spacing:.04em; user-select:none;
}
#ref-toggle:hover{ background:rgba(70,214,196,.15); }
#ref-img-wrap{
  background:rgba(10,22,38,.95); border:1px solid #27406a; border-radius:10px;
  overflow:hidden; backdrop-filter:blur(8px);
  transition:opacity .2s, transform .2s;
  max-height:70vh; overflow-y:auto;
}
#ref-img-wrap.hidden{ opacity:0; pointer-events:none; transform:translateY(8px); }
#ref-img-wrap img{
  display:block; width:160px; cursor:pointer;
  transition:width .2s;
}
#ref-img-wrap img.expanded{ width:min(360px, 90vw); }
</style>
<div id="ref-panel">
  <div id="ref-img-wrap" class="hidden">
    <img src="block-ref.jpg" alt="ブロック線図等価変換 参照" title="クリックで拡大/縮小"
         onclick="this.classList.toggle('expanded')">
  </div>
  <button id="ref-toggle" onclick="document.getElementById('ref-img-wrap').classList.toggle('hidden')">📋 変換表</button>
</div>
</body>
</html>
