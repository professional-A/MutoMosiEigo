let state = {};
const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
const load = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch(e){ return {}; } };

function updateScore(){
  let total=0, correct=0;
  const sects=[];
  SECTIONS.forEach(sec=>{
    let sc=0,tc=sec.data.length;
    sec.data.forEach((_,i)=>{
      total++;
      const k=`${sec.id}_q${i}`;
      if(state[k]==='correct'){correct++;sc++;}
    });
    sects.push(`<span style="margin-right:12px">${sec.no} ${sec.title.split('：')[0].replace('問','Q')}：${sc}/${tc}</span>`);
  });
  document.getElementById('score-num').textContent=`${correct} / ${TOTAL}`;
  document.getElementById('score-bar').style.width=`${Math.round(correct/TOTAL*100)}%`;
  document.getElementById('section-scores').innerHTML=sects.join('');
}

function pickOpt(secId, qi, chosen, correct){
  const k=`${secId}_q${qi}`;
  if(state[k]) return;
  state[k] = chosen===correct ? 'correct' : 'wrong';
  save();
  const card=document.getElementById(`card_${secId}_${qi}`);
  const btns=card.querySelectorAll('.opt-btn');
  btns.forEach((b,idx)=>{
    b.disabled=true;
    if(idx===chosen && chosen===correct) b.classList.add('selected-correct');
    else if(idx===chosen && chosen!==correct) b.classList.add('selected-wrong');
    else if(idx===correct) b.classList.add('reveal-correct');
  });
  card.classList.add(chosen===correct?'correct':'wrong');
  card.querySelector('.note').style.display='block';
  updateScore();
}

function restoreCard(secId, qi, result, correct){
  const card=document.getElementById(`card_${secId}_${qi}`);
  if(!card) return;
  const btns=card.querySelectorAll('.opt-btn');
  btns.forEach((b,idx)=>{
    b.disabled=true;
    if(result==='correct' && idx===correct) b.classList.add('selected-correct');
    else if(result==='wrong' && idx===correct) b.classList.add('reveal-correct');
  });
  card.classList.add(result==='correct'?'correct':'wrong');
  card.querySelector('.note').style.display='block';
}

function render(){
  state = load();
  const toc=document.getElementById('toc');
  toc.innerHTML='';
  const main=document.getElementById('main');
  main.innerHTML='';
  SECTIONS.forEach(sec=>{
    const li=document.createElement('li');
    li.innerHTML=`<a href="#${sec.id}">${sec.no} ${sec.title}</a>`;
    toc.appendChild(li);
    const div=document.createElement('div');
    div.className='section';
    div.id=sec.id;
    div.innerHTML=`<div class="section-hd"><div class="no">Section ${sec.no}</div><h2>${sec.title}</h2><p>${sec.desc}</p></div>`;
    sec.data.forEach((q,i)=>{
      const k=`${sec.id}_q${i}`;
      const done=state[k];
      const optsHtml=q.opts.map((o,idx)=>`<button class="opt-btn" onclick="pickOpt('${sec.id}',${i},${idx},${q.ans})" ${done?'disabled':''}>${o}</button>`).join('');
      const card=document.createElement('div');
      card.className='q-card';
      card.id=`card_${sec.id}_${i}`;
      card.innerHTML=`<div class="q-num">Q${String(i+1).padStart(2,'0')}</div><div class="q-text">${q.q}</div><div class="opts">${optsHtml}</div><div class="note" style="display:none">${q.note}</div>`;
      div.appendChild(card);
      if(done) restoreCard(sec.id, i, done, q.ans);
    });
    main.appendChild(div);
  });
  updateScore();
  if(typeof renderMathInElement==='function') renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});
}

function resetAll(){
  if(!confirm('全解答をリセットする？')) return;
  state={};
  save();
  localStorage.setItem(STORAGE_KEY+'_reset','1');
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

window._quizSync = async function(){
  if(localStorage.getItem(STORAGE_KEY+'_reset')){
    localStorage.removeItem(STORAGE_KEY+'_reset');
    return;
  }
  const s=await progressLoad(STORAGE_KEY);
  if(!s||!Object.keys(s).length) return;
  let chg=false;
  for(const k in s){ if(s[k]&&!state[k]){state[k]=s[k];chg=true;} }
  if(chg){save();render();}
};

window.addEventListener('load', render);
</script>
