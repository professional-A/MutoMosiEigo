<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>制御工学Ⅰ 用語＆ラプラス変換 単語テスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<style>
:root{
  --bg:#0f1117; --bg2:#171a24; --card:#1d212e; --card2:#252a3a;
  --line:#2f3548; --ink:#eef1f7; --muted:#9aa3b8; --dim:#697089;
  --accent:#ffd166; --accent2:#ff8c42;
  --u1:#3dd7c4; --u2:#b08cff;
  --good:#54e0a0; --bad:#ff6b8a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:"Outfit","Noto Sans JP",sans-serif; background:var(--bg); color:var(--ink);
  line-height:1.55; -webkit-font-smoothing:antialiased; min-height:100vh;
  background:
    radial-gradient(900px 500px at 90% -10%, rgba(255,140,66,.10), transparent 55%),
    radial-gradient(700px 400px at -5% 0%, rgba(176,140,255,.08), transparent 50%),
    var(--bg);
}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 40px}

header{padding:24px 0 12px}
.step-tag{font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);font-weight:700}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:1.6rem;margin-top:6px;display:flex;align-items:baseline;gap:9px}
h1 .n{font-family:"JetBrains Mono",monospace;font-size:.95rem;color:var(--muted)}
.sub{color:var(--muted);font-size:.88rem;margin-top:5px}

.prog{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 15px}
.prog .row{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:var(--muted)}
.prog b{color:var(--accent);font-family:"JetBrains Mono",monospace;font-size:1.05rem}
.pbar{height:8px;background:var(--card2);border-radius:99px;margin-top:9px;overflow:hidden}
.pbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width .5s}

.filters{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.fchip{font-family:inherit;font-size:.82rem;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:99px;padding:7px 14px;cursor:pointer;transition:.16s}
.fchip.on{color:#1a1205;background:var(--accent);border-color:var(--accent);font-weight:700}

#quizView{margin-top:18px}
.qhead{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:.85rem;font-family:"JetBrains Mono",monospace;margin-bottom:12px}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 18px}
.qmode{font-size:.74rem;color:var(--accent);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}
.qprompt{font-size:1.18rem;margin-bottom:16px;line-height:1.5}
.qopts{display:flex;flex-direction:column;gap:9px}
.qopt{font-family:"Noto Sans JP",sans-serif;font-size:1rem;font-weight:500;color:var(--ink);background:var(--bg2);border:2px solid var(--line);border-radius:13px;padding:13px 14px;cursor:pointer;transition:.16s;text-align:left;display:flex;gap:10px;align-items:flex-start}
.qopt .lab{font-family:"JetBrains Mono",monospace;color:var(--accent);font-size:.9rem;flex-shrink:0;margin-top:1px}
.qopt:hover:not(:disabled){border-color:var(--accent)}
.qopt:disabled{cursor:default}
.qopt.ok{border-color:var(--good);background:rgba(84,224,160,.12)}
.qopt.ok .lab{color:var(--good)}
.qopt.ng{border-color:var(--bad);background:rgba(255,107,138,.1)}
.qopt.ng .lab{color:var(--bad)}
.qfb{margin-top:13px;font-size:.92rem;min-height:20px}
.qfb .v{font-weight:700}
.qfb .v.g{color:var(--good)} .qfb .v.b{color:var(--bad)}
.qfb .note{color:var(--muted);font-size:.86rem;margin-top:5px;line-height:1.5}
.qbtns{display:flex;gap:9px;margin-top:16px}
.qbtns button{font-family:inherit;font-size:.98rem;font-weight:700;height:48px;border-radius:13px;cursor:pointer;border:none;transition:.16s}
.qnext{flex:1;background:var(--accent);color:#1a1205;display:none}
.qskip{flex:0 0 96px;background:none;color:var(--muted);border:1px solid var(--line) !important}

.done-banner{background:linear-gradient(135deg,rgba(84,224,160,.16),rgba(61,215,196,.1));border:1px solid var(--good);border-radius:18px;padding:24px;text-align:center;display:none}
.done-banner h3{font-family:"Fraunces",serif;font-size:1.4rem;color:var(--good);margin-bottom:8px}
.done-banner p{color:var(--muted);font-size:.9rem}
.done-banner button{margin-top:14px;font-family:inherit;font-size:.95rem;font-weight:700;color:#1a1205;background:var(--accent);border:none;border-radius:12px;padding:11px 22px;cursor:pointer}

.toolrow{display:flex;gap:9px;margin-top:12px}
.toolrow button{flex:1;font-family:inherit;font-size:.82rem;color:var(--muted);background:none;border:1px solid var(--line);border-radius:10px;padding:9px;cursor:pointer;transition:.16s}
.toolrow button:hover{color:var(--ink);border-color:var(--accent)}

footer{text-align:center;color:var(--dim);font-size:.8rem;margin-top:26px}
.katex{font-size:1.04em}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="step-tag">制御工学Ⅰ ・ 用語＆ラプラス変換</div>
  <h1>単語テスト <span class="n">64問</span></h1>
  <p class="sub">用語とラプラス変換表を1問ずつ選択式で確認。選択肢は毎回シャッフル。1項目を「用語→意味」「意味→用語」など両方向で出題。</p>
</header>

<div class="prog">
  <div class="row"><span>正解した問題</span><span><b id="knownN">0</b> / 64</span></div>
  <div class="pbar"><i id="knownBar"></i></div>
</div>

<div class="filters">
  <button class="fchip on" id="fAll" onclick="setFilter('all')">ぜんぶ</button>
  <button class="fchip" id="fVocab" onclick="setFilter('vocab')">用語</button>
  <button class="fchip" id="fLap" onclick="setFilter('laplace')">ラプラス変換</button>
  <button class="fchip" id="fUnknown" onclick="setFilter('unknown')">まだのみ</button>
</div>

<div id="quizView">
  <div class="qhead"><span id="qProgress">0 問正解</span><span id="qRemain">残り 0</span></div>
  <div class="qcard" id="qCard">
    <div class="qmode" id="qMode"></div>
    <div class="qprompt" id="qPrompt"></div>
    <div class="qopts" id="qOpts"></div>
    <div class="qfb" id="qFb"></div>
    <div class="qbtns">
      <button class="qskip" onclick="quizSkip()">スキップ</button>
      <button class="qnext" id="qNext" onclick="nextQ()">次へ ›</button>
    </div>
  </div>
  <div class="done-banner" id="doneBanner">
    <h3>🎉 この範囲クリア</h3>
    <p>お疲れさま。全部正解できたら完璧。<br>もう一周して定着させよう。</p>
    <button onclick="startQuiz()">もう一周する 🔁</button>
  </div>
  <div class="toolrow">
    <button onclick="startQuiz()">🔀 シャッフルして最初から</button>
    <button onclick="resetProgress()">↺ 進捗をリセット</button>
  </div>
</div>

<footer>制御工学Ⅰ 用語＆ラプラス変換表 ｜ 用語48問・ラプラス変換16問 計64問</footer>
</div>

<script>
const STORAGE_KEY = "seigyo1_vocab_v1";

/* =====================================================================
   問題データ（単一選択）。数式は KaTeX 記法（$...$）。
   ラプラス変換演算子はフラクトゥール体 \\mathfrak{L}。
===================================================================== */
const SECTIONS = [

{id:"s1", no:"01", title:"用語→意味①（序論・システム・性質）", qs:[

{q:"「自動制御」の意味として正しいものを選べ",

   "結果（出力）を原因に戻して比較する、フィードバック制御方式",
   "あらかじめ定められた順序・条件に従って各段階を進める制御",
   "入出力関係やパラメータを明らかにし、数式モデルを推定・構築する手法",
 ],
 ans:"ある量を目標値と一致させるため、量を検出・比較して訂正動作を自動的に実行する技術",
 note:"自動制御＝量を検出し目標値と比較、訂正動作を自動的に実行する技術。"},

{q:"「システム（系）」の意味として正しいものを選べ",
 opts:[
   "種々の機能を有する幾つかの要素が、相互作用で結ばれている集合体",
   "システムの一部を成す、より小さなシステム",
   "因果関係を入力→出力の向きで表した線図",
   "外部から完全に独立した閉じた箱",
 ],
 ans:"種々の機能を有する幾つかの要素が、相互作用で結ばれている集合体",
 note:"システム（系）＝要素が相互作用で結ばれた集合体。その一部はサブシステム（副系）。"},

{q:"「ブロック線図」の意味として正しいものを選べ",
 opts:[
   "システムの因果関係を、入力（原因）→出力（結果）の向きで表した線図",
   "要素が相互作用で結ばれている集合体",
   "部品の寸法を正確に表した設計図",
   "電気配線をそのまま描いた回路図",
 ],
 ans:"システムの因果関係を、入力（原因）→出力（結果）の向きで表した線図",
 note:"ブロック線図＝因果関係（入力→出力）を方向付けして表す線図。"},

{q:"「引き出し点」の意味として正しいものを選べ",
 opts:[
   "信号が分岐する点（記号は ● 黒丸。前後で信号の値は変わらない）",

   "伝達特性を持つ要素を表す □",

 ],
 ans:"信号が分岐する点（記号は ● 黒丸。前後で信号の値は変わらない）",

{q:"「加え合わせ点」の意味として正しいものを選べ",
 opts:[
   "信号の加減算を行う点（記号は ○ 白丸に ± 符号）",
   "信号が分岐する点（記号は ● 黒丸）",
   "伝達特性を持つ要素を表す □",
   "信号を増幅する点",
 ],
 ans:"信号の加減算を行う点（記号は ○ 白丸に ± 符号）",
 note:"加え合わせ点＝○（白丸＋符号）で信号を加減算。引き出し点（●）と混同しない。"},

{q:"「因果性（Causality）」の意味として正しいものを選べ",
 opts:[
   "原因より先に結果が生じない性質",
   "システムの性質が時間原点の選び方に無関係な性質",
   "重ね合わせの原理が成立する性質",
   "外乱や検出誤差に対して強い性質",
 ],
 ans:"原因より先に結果が生じない性質",
 note:"因果性＝原因より先に結果が生じない性質。"},

{q:"「時不変性（Time Invariant）」の意味として正しいものを選べ",
 opts:[
   "システムの性質が時間原点の選び方に無関係な性質",
   "原因より先に結果が生じない性質",
   "重ね合わせの原理が成立する性質",
   "制御系としての最良の動作を表す性質",
 ],
 ans:"システムの性質が時間原点の選び方に無関係な性質",
 note:"時不変性＝時間原点の選び方に無関係（時間でずれても変わらない）。"},

{q:"「線形性（Linearity）」の意味として正しいものを選べ",
 opts:[
   "重ね合わせの原理が成立する性質",
   "原因より先に結果が生じない性質",
   "時間原点の選び方に無関係な性質",
   "本質を失わず範囲を限定して線形に扱う処理",
 ],
 ans:"重ね合わせの原理が成立する性質",
 note:"線形性＝重ね合わせの原理が成立する性質。"},

]},

{id:"s2", no:"02", title:"用語→意味②（特性・制御方式・分類）", qs:[

{q:"「線形化（Linearization）」の意味として正しいものを選べ",

   "本質的な性質を失わず、範囲を限定して非線形系を線形に扱う処理",

   "線形なシステムをわざと非線形に変える処理",
   "入出力関係から数式モデルを構築する手法",
 ],

{q:"「同定（Identification）」の意味として正しいものを選べ",
 opts:[
   "入出力関係やパラメータを明らかにし、数式モデルを推定・構築する手法",
   "制御系としてのシステムの最良の動作を表す特性",
   "入力操作によって制御し得るか否かの特性",
   "本質を失わず範囲を限定して線形に扱う処理",
 ],
 ans:"入出力関係やパラメータを明らかにし、数式モデルを推定・構築する手法",
 note:"同定＝入出力関係・パラメータを明らかにし数式モデルを構築する手法。"},

{q:"「規範」の意味として正しいものを選べ",
 opts:[
   "制御系としてのシステムの最良の動作であることを表す特性",
   "外乱や検出誤差に対して強い特性",
   "入力操作によって制御し得るか否かの特性",
   "外部状況のみから内部状況を把握し得るか否かの特性",
 ],
 ans:"制御系としてのシステムの最良の動作であることを表す特性",
 note:"規範＝制御系としての最良の動作を表す特性。"},

{q:"「可制御」の意味として正しいものを選べ",
 opts:[
   "入力操作によって制御し得るか否かの特性",
   "外部状況のみから内部状況を把握し得るか否かの特性",
   "制御系としての最良の動作を表す特性",
   "外乱や検出誤差に対して強い特性",
 ],
 ans:"入力操作によって制御し得るか否かの特性",
 note:"可制御＝入力操作により制御し得るか否か。"},

{q:"「可観測」の意味として正しいものを選べ",
 opts:[
   "外部状況のみから内部状況を把握し得るか否かの特性",
   "入力操作によって制御し得るか否かの特性",
   "制御系としての最良の動作を表す特性",
   "入出力関係から数式モデルを構築する手法",
 ],
 ans:"外部状況のみから内部状況を把握し得るか否かの特性",
 note:"可観測＝外部状況のみから内部状況を把握し得るか否か。"},

{q:"「ロバスト（堅牢）」の意味として正しいものを選べ",
 opts:[
   "外乱や検出誤差に対して強い（影響を受けにくい）特性",
   "制御系としての最良の動作を表す特性",
   "原因より先に結果が生じない性質",
   "入力操作によって制御し得るか否かの特性",
 ],
 ans:"外乱や検出誤差に対して強い（影響を受けにくい）特性",
 note:"ロバスト（堅牢）＝外乱・検出誤差に対して強い特性。"},

{q:"「開ループ制御」の意味として正しいものを選べ",
 opts:[
   "結果（出力）が入力としての原因に影響を与えない制御方式",
   "結果（出力）を原因に戻して比較する制御方式",
   "出力を打ち消す向きに戻し偏差を縮める帰還",

{q:"「閉ループ制御」の意味として正しいものを選べ",
 opts:[
   "結果（出力）を原因に戻して比較する、フィードバック制御方式",
   "結果（出力）が原因に影響を与えない制御方式",
   "目標値が時間スケジュールに従って変化する制御",

 ],
 ans:"結果（出力）を原因に戻して比較する、フィードバック制御方式",
 note:"閉ループ制御＝結果を原因に戻すフィードバック制御。"},

]},

{id:"s3", no:"03", title:"用語→意味③（分類・伝達関数）", qs:[

{q:"「ネガティブ・フィードバック（負帰還）」の意味として正しいものを選べ",
 opts:[

{q:"「サーボ機構」の意味として正しいものを選べ",
 opts:[

   "電圧・電流・回転速度などを一定に保つ制御系",

 ],

{q:"「プロセス制御」の意味として正しいものを選べ",

 ],
 ans:"制御量が温度・圧力・流量・液位である制御系",
 note:"プロセス制御＝制御量が温度・圧力・流量・液位などのプロセス量。"},

{q:"「自動調整」の意味として正しいものを選べ",
 opts:[

{q:"「シーケンス制御」の意味として正しいものを選べ",
 opts:[

 ],

{q:"「プログラム制御」の意味として正しいものを選べ",

/* ===== flatten ===== */
function modeOf(id){
  if(id==="s1"||id==="s2"||id==="s3") return "用語 → 意味";
  if(id==="s4"||id==="s5") return "意味 → 用語";
  if(id==="s6") return "時間関数 f(t) → F(s)";
  if(id==="s7") return "F(s) → 時間関数 f(t)";
  return "";
}
const DECK=[];
SECTIONS.forEach(sec=>sec.qs.forEach((q,qi)=>{
  DECK.push({q:q.q,opts:q.opts,ans:q.ans,note:q.note||"",
    key:sec.id+"_"+qi, mode:modeOf(sec.id),
    cat:(sec.id==="s6"||sec.id==="s7")?"laplace":"vocab"});
}));
const TOTAL=DECK.length;

/* ===== state / storage ===== */
let state={}; try{state=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");}catch(e){state={};}
function save(){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){} if(window.progressSave) progressSave(STORAGE_KEY,state); }

/* ===== KaTeX ===== */
window.KATEX_OPTS={delimiters:[
  {left:"$$",right:"$$",display:true},
  {left:"$",right:"$",display:false},
  {left:"\\(",right:"\\)",display:false},
  {left:"\\[",right:"\\]",display:true}
],throwOnError:false};
function typeset(el){ if(window.renderMathInElement && el){ try{ renderMathInElement(el, window.KATEX_OPTS); }catch(e){} } }

/* ===== filter / deck ===== */
let filter="all";
function pool(){
  if(filter==="all") return DECK.slice();
  if(filter==="unknown") return DECK.filter(d=>state[d.key]!==1);
  return DECK.filter(d=>d.cat===filter);
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

let deck=[], pos=0, retry=[], curItem=null, curOpts=[], locked=false;

function setFilter(f){
  filter=f;
  ["fAll","fVocab","fLap","fUnknown"].forEach(id=>document.getElementById(id).classList.remove("on"));
  document.getElementById({all:"fAll",vocab:"fVocab",laplace:"fLap",unknown:"fUnknown"}[f]).classList.add("on");
  startQuiz();
}

function startQuiz(){
  deck=shuffle(pool());
  if(deck.length===0) deck=DECK.slice();
  pos=0; retry=[];
  document.getElementById("doneBanner").style.display="none";
  document.getElementById("qCard").style.display="block";
  showQ();
}

function showQ(){
  locked=false;
  if(pos>=deck.length){
    if(retry.length){ deck=shuffle(retry); retry=[]; pos=0; }
    else { finishQuiz(); return; }
  }
  curItem=deck[pos];
  curOpts=shuffle(curItem.opts.slice());   // ← 選択肢を毎回シャッフル
  document.getElementById("qMode").textContent=curItem.mode;
  document.getElementById("qPrompt").innerHTML=curItem.q;
  document.getElementById("qFb").innerHTML="";
  document.getElementById("qNext").style.display="none";
  const opts=document.getElementById("qOpts");
  opts.innerHTML=curOpts.map((o,i)=>
    `<button class="qopt" onclick="pickOpt(${i})"><span class="lab">${String.fromCharCode(65+i)}</span><span>${o}</span></button>`
  ).join("");
  typeset(document.getElementById("qCard"));
  updateHead();
}

function pickOpt(i){
  if(locked) return; locked=true;
  const chosen=curOpts[i], ans=curItem.ans, ok=(chosen===ans);
  const opts=document.getElementById("qOpts");
  [...opts.children].forEach((b,bi)=>{
    b.disabled=true;
    if(curOpts[bi]===ans) b.classList.add("ok");
  });
  if(!ok) opts.children[i].classList.add("ng");
  const fb=document.getElementById("qFb");
  if(ok){
    if(state[curItem.key]!==1 && window.addPoints) addPoints(100);
    state[curItem.key]=1; save();
    fb.innerHTML=`<span class="v g">◎ 正解</span>`+(curItem.note?`<div class="note">${curItem.note}</div>`:"");
  } else {
    if(state[curItem.key]!==1) state[curItem.key]=-1;
    save();
    retry.push(curItem);
    fb.innerHTML=`<span class="v b">✕ 不正解</span>`+(curItem.note?`<div class="note">${curItem.note}</div>`:"");
  }
  typeset(fb);
  document.getElementById("qNext").style.display="block";
  updateHead();
  updateProg();
}

function nextQ(){ pos++; showQ(); }
function quizSkip(){ if(!locked){ retry.push(curItem); } pos++; showQ(); }

function updateHead(){
  const n=DECK.filter(d=>state[d.key]===1).length;
  document.getElementById("qProgress").textContent=n+" 問正解";
  const remain=Math.max(0,deck.length-pos)+(retry.length?(" +復習"+retry.length):"");
  document.getElementById("qRemain").textContent="この回 残り "+remain;
}
function updateProg(){
  const n=DECK.filter(d=>state[d.key]===1).length;
  document.getElementById("knownN").textContent=n;
  document.getElementById("knownBar").style.width=(n/TOTAL*100)+"%";
}
function finishQuiz(){
  document.getElementById("qCard").style.display="none";
  document.getElementById("doneBanner").style.display="block";
  document.getElementById("qRemain").textContent="完了";
}
function resetProgress(){
  if(!confirm("進捗をリセットしますか？")) return;
  state={}; save(); updateProg(); startQuiz();
}

/* keyboard: 1-4 で選択、Enter / Space で次へ */
document.addEventListener("keydown",function(e){
  if(document.activeElement && document.activeElement.tagName==="INPUT") return;
  if(!locked){
    const n=parseInt(e.key);
    if(n>=1&&n<=curOpts.length){ e.preventDefault(); pickOpt(n-1); }
  } else if(e.key==="Enter"||e.key===" "){
    e.preventDefault();
    const nb=document.getElementById("qNext");
    if(nb.style.display!=="none") nextQ();
  }
});

/* init */
updateProg(); startQuiz();
window._quizSync = async function() {
  const s = await progressLoad(STORAGE_KEY);
  if (!s || !Object.keys(s).length) return;
  let chg=false;
  for(const k in s){ if(s[k]===1 && state[k]!==1){ state[k]=1; chg=true; } }
  if(chg){ save(); updateProg(); }
};
</script>
