<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武藤模試 — ハンドアウト演習 Unit 1 &amp; 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1626; --bg2:#0e1d33; --card:#15263f; --card2:#1b2f4d;
  --line:#27406a; --ink:#e7eef7; --muted:#8aa1c0; --dim:#5f7c9c;
  --muted2:#6f87a8;
  --teal:#46d6c4; --teal-d:#1f9e90;
  --amber:#f6b352; --rose:#f06b8e; --good:#5fe0a8; --bad:#f06b8e;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Outfit","Noto Sans JP",sans-serif;
  background:
    radial-gradient(1100px 600px at 80% -8%, rgba(70,214,196,.10), transparent 55%),
    radial-gradient(900px 500px at 5% 5%, rgba(246,179,82,.07), transparent 50%),
    var(--bg);
  color:var(--ink); line-height:1.6; -webkit-font-smoothing:antialiased;
  padding-bottom:80px;
}
.wrap{max-width:880px;margin:0 auto;padding:0 18px}

/* Header */
header{
  position:relative; overflow:hidden;
  padding:46px 0 30px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, var(--bg2), transparent);
}
.eyebrow{
  font-size:.72rem; letter-spacing:.34em; text-transform:uppercase;
  color:var(--teal); font-weight:600; margin-bottom:10px;
}
h1{
  font-family:"Fraunces",serif; font-weight:600;
  font-size:clamp(2.1rem,6vw,3.3rem); line-height:1.04; letter-spacing:-.01em;
}
h1 .jp{ font-family:"Noto Sans JP",sans-serif; font-weight:700; }
.sub{ color:var(--muted); margin-top:12px; font-size:1.02rem; max-width:600px }
.units{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap }
.utag{
  font-size:.8rem; padding:6px 13px; border:1px solid var(--line);
  border-radius:99px; color:var(--muted); background:var(--card);
}
.utag b{color:var(--ink);font-weight:600}

/* Scoreboard */
.scoreboard{
  position:sticky; top:0; z-index:50;
  background:rgba(10,22,38,.82); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.scoreboard .wrap{display:flex;align-items:center;gap:14px;padding:11px 18px;flex-wrap:wrap}
.scorenum{font-family:"JetBrains Mono",monospace;font-size:1.05rem;color:var(--teal);font-weight:500}
.scorelbl{color:var(--muted);font-size:.85rem}
.bar{flex:1;min-width:120px;height:7px;background:var(--card2);border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal-d),var(--teal));border-radius:99px;transition:width .5s ease}
.resetbtn{
  font-family:inherit;font-size:.78rem;color:var(--muted);background:none;
  border:1px solid var(--line);border-radius:8px;padding:5px 11px;cursor:pointer;transition:.2s
}
.resetbtn:hover{color:var(--ink);border-color:var(--teal-d)}

/* Nav */
nav.toc{display:flex;gap:8px;flex-wrap:wrap;padding:22px 0 6px}
nav.toc a{
  font-size:.82rem;color:var(--muted);text-decoration:none;
  padding:7px 13px;border:1px solid var(--line);border-radius:99px;
  background:var(--card);transition:.2s;white-space:nowrap
}
nav.toc a:hover{color:var(--ink);border-color:var(--teal-d);transform:translateY(-1px)}

/* Section */
section{margin-top:44px;scroll-margin-top:64px}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}
.sec-no{font-family:"JetBrains Mono",monospace;font-size:.9rem;color:var(--teal);letter-spacing:.05em}
.sec-head h2{font-family:"Fraunces",serif;font-weight:600;font-size:1.62rem;letter-spacing:-.01em}
.sec-desc{color:var(--muted);font-size:.92rem;margin-bottom:18px}
.sec-score{
  margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:.82rem;
  color:var(--muted);white-space:nowrap;align-self:center
}

/* Question card */
.q{
  background:var(--card); border:1px solid var(--line); border-radius:15px;
  padding:18px 18px 16px; margin-bottom:14px; transition:border-color .25s;
}
.q.correct{border-color:var(--teal-d)}
.q.wrong{border-color:var(--rose)}
.q-top{display:flex;gap:12px;align-items:flex-start}
.qn{
  font-family:"JetBrains Mono",monospace;font-size:.78rem;color:var(--teal);
  background:rgba(70,214,196,.1);border:1px solid var(--line);
  border-radius:7px;padding:3px 8px;flex-shrink:0;margin-top:2px;min-width:34px;text-align:center
}
.q-body{flex:1}
.prompt{font-size:1.02rem;margin-bottom:4px}
.prompt .blank{color:var(--teal);font-weight:600}
.jphint{color:var(--amber);font-size:.86rem;font-family:"Noto Sans JP",sans-serif;margin-bottom:4px}

/* options */
.opts{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
.opt{
  font-family:inherit;font-size:.95rem;color:var(--ink);
  background:var(--card2);border:1px solid var(--line);border-radius:10px;
  padding:9px 14px;cursor:pointer;transition:.16s;text-align:left;
}
.opt:hover:not(:disabled){border-color:var(--teal-d);transform:translateY(-1px)}
.opt:disabled{cursor:default}
.opt.pick-correct{background:rgba(95,224,168,.16);border-color:var(--good);color:#cdfbe5}
.opt.pick-wrong{background:rgba(240,107,142,.14);border-color:var(--bad);color:#ffd6e1}
.opt.reveal{border-color:var(--good);color:#cdfbe5}
.opt .lab{font-family:"JetBrains Mono",monospace;color:var(--teal);margin-right:7px;font-size:.85rem}

/* tf */
.tf-opts{display:flex;gap:8px;margin-top:11px}
.tf-opts .opt{flex:1;text-align:center;max-width:140px;font-weight:600}

/* feedback */
.fb{margin-top:10px;font-size:.9rem;display:none}
.fb.show{display:block}
.fb .verdict{font-weight:600}
.fb .verdict.g{color:var(--good)}
.fb .verdict.b{color:var(--bad)}
.note{color:var(--muted);margin-top:4px;font-size:.88rem}
.note .ans{color:var(--teal);font-weight:600}
.note .jp{font-family:"Noto Sans JP",sans-serif}

.tip{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:10px;padding:12px 15px;margin-bottom:18px;font-size:.9rem;color:var(--muted)}
.tip b{color:var(--amber)}

footer{margin-top:60px;padding-top:24px;border-top:1px solid var(--line);color:var(--dim);font-size:.82rem;text-align:center}
footer b{color:var(--muted)}

@media (max-width:560px){
  .q-top{flex-direction:column;gap:7px}
  .tf-opts .opt{max-width:none}
}
</style>
</head>
<body>

<div class="scoreboard">
  <div class="wrap">
    <span class="scorenum" id="sNum">0 / 0</span>
    <span class="scorelbl">正解</span>
    <div class="bar"><i id="sBar"></i></div>
    <button class="resetbtn" onclick="resetAll()">リセット</button>
  </div>
</div>

<header>
  <div class="wrap">
    <div class="eyebrow">科学技術英語Ⅰ ・ 定期試験対策</div>
    <h1>武藤模試 <span class="jp">ハンドアウト演習</span><br>Unit 1 &amp; Unit 2</h1>
    <p class="sub">授業ハンドアウトから直接抽出した問題セット。語彙の文脈選択・本文内容Q&amp;A・T/Fを収録。総合テストの補完として使おう。</p>
    <div class="units">
      <span class="utag">Unit 1：<b>Artificial Light on the Sea</b></span>
      <span class="utag">Unit 2：<b>Tuning Out Mom's Voice?</b></span>
    </div>
  </div>
</header>

<div class="wrap">

<nav class="toc" id="toc"></nav>

<div class="tip" style="margin-top:18px">
  <b>使い方：</b>選択肢をタップすると即判定。解説は判定後に表示。進捗は同じ端末・ブラウザなら自動保存。
</div>

<div id="app"></div>

<footer>
  <b>武藤模試 ハンドアウト演習 Unit 1 &amp; 2</b><br>
  P7 語彙文脈選択・本文Q&amp;A・T/F 計19問収録
</footer>
</div>

<script>
/* ============ DATA ============ */

// Unit 1: 本文P7から語彙文脈選択（handout直出）
const FILL1 = [
  {u:"U1",
   s:"Artificial lights can ___ the normal behavior of plants and animals on land.",
   jp:"人工の光は陸上の植物や動物の正常な行動を___する可能性がある。",
   opts:["enhance","amplify","interfere with"],
   ans:"interfere with",
   note:"interfere with = 〜を妨げる・干渉する。enhance/amplify は「増強・拡大」で意味が逆。"},
  {u:"U1",
   s:"Sparrows exposed to bright lights find it harder to ___ West Nile virus.",
   jp:"強い人工光にさらされたスズメはウエストナイルウイルスを___することが難しくなる。",
   opts:["resist","endure","recover"],
   ans:"resist",
   note:"resist = 抵抗・撃退する。endure（耐え忍ぶ）はウイルスへの抵抗の意味にならない。recover（回復）も意味がずれる。"},
  {u:"U1",
   s:"Plants find pollination more ___ due to the glare of artificial lights.",
   jp:"植物は人工光のまぶしさのために受粉が___になると気付く。",
   opts:["difficult","difficulty","difficulties"],
   ans:"difficult",
   note:"find O C（第5文型）のCには形容詞 difficult が入る。difficulty/difficulties は名詞なので不可。"},
];

// Unit 1: 本文内容Q&A（handout Q8・Q11・Q13）
const QA1 = [
  {u:"U1",
   q:"What is Tim Smyth's occupation?",
   jp:"Tim Smythの職業は何か。",
   opts:[
     "A marine biogeochemist who studies how life in the oceans interacts with the environment.",
     "A satellite engineer who designs ocean monitoring systems.",
     "A marine biologist focusing specifically on the behavior of copepods."
   ],
   ans:"A marine biogeochemist who studies how life in the oceans interacts with the environment.",
   note:"He is a marine biogeochemist who studies how life in the oceans interacts with the environment.（ハンドアウトQ8）"},
  {u:"U1",
   q:"What two types of data did Tim Smyth's team use in their research?",
   jp:"Smythのチームが研究で使用した2種類のデータとは何か。",
   opts:[
     "Shipboard measurements and satellite images",
     "Drone footage and weather station data",
     "Underwater cameras and sonar recordings"
   ],
   ans:"Shipboard measurements and satellite images",
   note:"船上計測(shipboard measurements)＋衛星画像(satellite images)の2種類。（ハンドアウトQ11）"},
  {u:"U1",
   q:"What method did Smyth and his team use to examine how different wavelengths of light travel through the water?",
   jp:"異なる波長の光が水中をどのように進むかを調べるために何を使ったか。",
   opts:[
     "A computer simulation",
     "Direct sensors placed on the ocean floor",
     "Satellite spectral analysis"
   ],
   ans:"A computer simulation",
   note:"コンピュータシミュレーションを実施して波長ごとの光の到達深度を調べた。（ハンドアウトQ13）"},
];

// Unit 2: 本文から語彙文脈選択（handout Q3・P15・P16・P21）
const FILL2 = [
  {u:"U2",
   s:"Young kids' brains are tuned in to their mothers' voices because they rely heavily on them for ___ during their early developmental stages.",
   jp:"幼児の脳が母の声に強く反応するのは、発達初期の___のために母親に大きく依存しているからだ。",
   opts:["survival","entertainment","socializing"],
   ans:"survival",
   note:"幼児にとって母の声＝生存(survival)のための支援。（ハンドアウトQ3、選択肢: survival / entertainment / socializing）"},
  {u:"U2",
   s:"It's just that unfamiliar voices become more rewarding and ___ of attention.",
   jp:"見知らぬ声がより充実感をもたらし、注意を払う___になったということだ。",
   opts:["worthy","capable","deserving"],
   ans:"worthy",
   note:"worthy of attention = 注意を払う価値がある。\"be worthy of 〜\" の形。（ハンドアウトP15）"},
  {u:"U2",
   s:"As kids grow up, they expand their social connections way ___ their family.",
   jp:"子供たちが成長するにつれて、社会的なつながりを家族の___に広げていく。",
   opts:["beyond","beside","behind"],
   ans:"beyond",
   note:"way beyond = はるかに〜を超えて。家族の枠をはるかに超えた社会的広がりを表す。（ハンドアウトP16）"},
  {u:"U2",
   s:"As we mature, our survival depends ___ on maternal support.",
   jp:"私たちが成熟するにつれて、生存のための母親の支援への依存は___なっていく。",
   opts:["less and less","more and more","just as much"],
   ans:"less and less",
   note:"本文: \"our survival depends less and less on maternal support\" = 成熟とともに母の支援への依存は減っていく。（ハンドアウトP21）"},
];

// Unit 2: 本文内容Q&A（handout Q1/Q6/P6/P7）
const QA2 = [
  {u:"U2",
   q:"Who were the subjects of Daniel Abrams' brain-scanning experiment?",
   jp:"Daniel Abramsの脳スキャン実験の被験者は誰か。",
   opts:[
     "7-to-15-year-old boys and girls",
     "University students aged 18 to 22",
     "Mothers and their young children"
   ],
   ans:"7-to-15-year-old boys and girls",
   note:"実験の被験者は7〜15歳の少年少女(boys and girls)。（ハンドアウトQ6/Q8）"},
  {u:"U2",
   q:"When and where did Daniel Abrams' team share their findings?",
   jp:"Abramsのチームはいつ・どこで研究結果を発表したか。",
   opts:[
     "April 28 in the Journal of Neuroscience",
     "December 13 in Elementa: Science of the Anthropocene",
     "March 5 in Nature Neuroscience"
   ],
   ans:"April 28 in the Journal of Neuroscience",
   note:"Unit 2の発表先はJournal of Neuroscience (April 28)。Elementa はUnit 1の発表先なので混同注意。（ハンドアウトP7）"},
  {u:"U2",
   q:"What does \"this whole other class of sounds and voices\" (L.9) refer to?",
   jp:"本文L.9の「全く別のクラスの音や声」とは何を指すか。",
   opts:[
     "Unfamiliar voices (strangers' voices)",
     "Their parents' voices",
     "Music and sounds of nature"
   ],
   ans:"Unfamiliar voices (strangers' voices)",
   note:"思春期の若者がtune intoする「別クラスの声」= unfamiliar voices（見知らぬ人の声）。（ハンドアウトP6）"},
  {u:"U2",
   q:"Why do teenage brains become more sensitive to unfamiliar voices?",
   jp:"思春期の脳が見知らぬ声により敏感になる理由は何か。",
   opts:[
     "Their brains are programmed to tune in to unfamiliar voices to help expand social connections.",
     "Their mothers' voices have become too loud and overwhelming to process.",
     "Their schools force them to interact with many new people."
   ],
   ans:"Their brains are programmed to tune in to unfamiliar voices to help expand social connections.",
   note:"脳が自然に見知らぬ声に注意を向けるようプログラムされている = 社会的繋がりの拡大のため。（ハンドアウトQ1/Q2）"},
];

// T/F（既存テストに含まれない観点）
const TF2 = [
  {u:"U1",
   s:"Smyth and his colleagues started their project with a world atlas of artificial night-sky brightness that had been created in 2016.",
   a:true,
   note:"2016年に作成された夜空の明るさの世界地図からスタートした。（ハンドアウトQ10）"},
  {u:"U1",
   s:"Tim Smyth's team used three types of data: shipboard measurements, satellite images, and drone footage.",
   a:false,
   note:"使用したデータは船上計測と衛星画像の2種類のみ。ドローン映像は使っていない。（ハンドアウトQ11）"},
  {u:"U2",
   s:"Daniel Abrams and his colleagues shared their findings on April 28 in the Journal of Neuroscience.",
   a:true,
   note:"Journal of Neuroscienceに4月28日に発表。（ハンドアウトP7）"},
  {u:"U2",
   s:"The subjects of Abrams' experiment were 7-to-16-year-old boys and girls.",
   a:false,
   note:"正しくは7〜15歳(7-to-15-year-old)。16歳は含まれない。"},
  {u:"U2",
   s:"As we mature, we rely on our mothers more and more for survival.",
   a:false,
   note:"本文: \"our survival depends less and less on maternal support\" = 成熟とともに母への依存は減る。"},
];

/* ============ SECTIONS ============ */
const SECTIONS = [
  {id:"f1", no:"01", title:"Unit 1 — 語彙文脈選択", desc:"P7の選択肢から文意に合う語(句)を選べ。ハンドアウト直出し問題。", type:"sel", data:FILL1},
  {id:"q1", no:"02", title:"Unit 1 — 本文Q&A", desc:"ハンドアウトのQ8・Q11・Q13に対応する内容理解問題。", type:"sel", data:QA1},
  {id:"f2", no:"03", title:"Unit 2 — 語彙文脈選択", desc:"ハンドアウトの穴埋め問題をもとにした語選択。", type:"sel", data:FILL2},
  {id:"q2", no:"04", title:"Unit 2 — 本文Q&A", desc:"ハンドアウトQ1・Q6・P6・P7等の内容理解問題。", type:"sel", data:QA2},
  {id:"tf", no:"05", title:"T/F Questions", desc:"本文の内容に合えばTrue、合わなければFalse。既存テストに含まれない観点。", type:"tf", data:TF2},
];

let state = {};
try{ state = JSON.parse(localStorage.getItem("mutou_handout_u12")||"{}"); }catch(e){ state={}; }
function save(){ try{ localStorage.setItem("mutou_handout_u12", JSON.stringify(state)); }catch(e){} if(window.progressSave) progressSave("mutou_handout_u12", state); }

function mark(key, ok){
  state[key] = {correct:ok, done:true};
  save(); updateScore(); if(window.addPoints) ok ? addPoints(100, 'mutou_handout_u12', key) : addPoints(0, 'mutou_handout_u12', key, false);
}

function updateScore(){
  const allKeys = [...document.querySelectorAll("[data-key]")].map(e=>e.dataset.key);
  let correct=0, done=0;
  allKeys.forEach(k=>{ if(state[k]&&state[k].done){done++; if(state[k].correct)correct++;} });
  document.getElementById("sNum").textContent = correct+" / "+allKeys.length;
  document.getElementById("sBar").style.width = (allKeys.length? (correct/allKeys.length*100):0)+"%";
  SECTIONS.forEach(sec=>{
    const ks=[...document.querySelectorAll(`[data-key^="${sec.id}-"]`)].map(e=>e.dataset.key);
    let c=0; ks.forEach(k=>{ if(state[k]&&state[k].done&&state[k].correct)c++; });
    const sc=document.getElementById("score-"+sec.id);
    if(sc) sc.textContent = c+" / "+ks.length;
  });
}

function norm(s){
  return (s||"").toLowerCase().trim()
    .replace(/['']/g,"'").replace(/[""]/g,'"')
    .replace(/\s+/g," ")
    .replace(/[.,;:!?]+$/,"")
    .replace(/^[.,;:!?]+/,"");
}

function pickOpt(btn, key, ans){
  const q = btn.closest(".q");
  if(q.dataset.locked) return;
  q.dataset.locked="1";
  const opts = q.querySelectorAll(".opt");
  const chosen = btn.dataset.opt;
  const ok = norm(chosen)===norm(ans);
  opts.forEach(o=>{
    o.disabled=true;
    if(norm(o.dataset.opt)===norm(ans)) o.classList.add(ok? "pick-correct":"reveal");
  });
  if(!ok) btn.classList.add("pick-wrong");
  q.classList.add(ok?"correct":"wrong");
  const note = q.dataset.note? `<div class="note">${q.dataset.note}</div>`:"";
  document.getElementById("fb-"+key).innerHTML =
    `<span class="verdict ${ok?'g':'b'}">${ok?'◎ 正解':'✕ 不正解'}</span> — 答え: <span style="color:var(--teal);font-weight:600">${ans}</span>${note}`;
  document.getElementById("fb-"+key).classList.add("show");
  mark(key, ok);
}

function optButtons(key, opts, ans){
  let html = `<div class="opts">`;
  opts.forEach((o,i)=>{
    const lab = String.fromCharCode(97+i);
    html += `<button class="opt" data-opt="${o.replace(/"/g,'&quot;')}" onclick="pickOpt(this,'${key}','${ans.replace(/'/g,"\\'")}')"><span class="lab">${lab}.</span>${o}</button>`;
  });
  html += `</div><div class="fb" id="fb-${key}"></div>`;
  return html;
}

function questionBox(key,n,body,note,utag){
  return `<div class="q" data-key="${key}" ${note?`data-note="${note.replace(/"/g,'&quot;')}"`:""}>
    <div class="q-top"><span class="qn">${n}</span>${utag?`<span class="qn" style="min-width:auto">${utag}</span>`:""}<div class="q-body">${body}</div></div></div>`;
}

function render(){
  document.getElementById("toc").innerHTML =
    SECTIONS.map(s=>`<a href="#${s.id}">${s.no} ${s.title.replace(/^.*— /,'')}</a>`).join("");

  let html="";
  SECTIONS.forEach(sec=>{
    html += `<section id="${sec.id}"><div class="sec-head">
      <span class="sec-no">${sec.no}</span><h2>${sec.title}</h2>
      <span class="sec-score" id="score-${sec.id}">0 / 0</span></div>
      <p class="sec-desc">${sec.desc}</p>`;

    sec.data.forEach((item,i)=>{
      const key = sec.id+"-"+i;
      const n = i+1;

      if(sec.type==="sel"){
        const prompt = (item.s||item.q).replace("___",'<span class="blank">______</span>');
        const body = `${item.jp?`<p class="jphint">${item.jp}</p>`:""}
          <p class="prompt">${prompt}</p>${optButtons(key,item.opts,item.ans)}`;
        html += questionBox(key,n,body,item.note,item.u);
      } else if(sec.type==="tf"){
        const body=`<p class="prompt">${item.s}</p>
          <div class="tf-opts">
            <button class="opt" data-opt="T" onclick="pickOpt(this,'${key}','${item.a?'T':'F'}')">True</button>
            <button class="opt" data-opt="F" onclick="pickOpt(this,'${key}','${item.a?'T':'F'}')">False</button>
          </div><div class="fb" id="fb-${key}"></div>`;
        html += questionBox(key,n,body,item.note+(item.a?" ✓ True":" ✓ False"),item.u);
      }
    });
    html += `</section>`;
  });

  document.getElementById("app").innerHTML = html;
  updateScore();
}

function resetAll(){
  if(!confirm("全部の解答状況をリセットする？")) return;
  state={}; save();
  localStorage.setItem("mutou_handout_u12_reset", "1");
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

render();
window._quizSync = async function() {
  if(localStorage.getItem("mutou_handout_u12_reset")){
    localStorage.removeItem("mutou_handout_u12_reset");
    return;
  }
  const s = await progressLoad("mutou_handout_u12");
  if (!s || !Object.keys(s).length) return;
  let chg = false;
  for (const k in s) { if (s[k] && !state[k]) { state[k] = s[k]; chg = true; } }
  if (chg) { save(); render(); updateScore(); }
};
