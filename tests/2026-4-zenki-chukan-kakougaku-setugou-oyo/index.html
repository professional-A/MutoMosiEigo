<!DOCTYPE html>
<html lang="ja">
<head>

<style>
:root{
  --bg:#0a1626; --bg2:#0e1d33; --card:#15263f; --card2:#1b2f4d;
  --line:#27406a; --ink:#e7eef7; --muted:#8aa1c0; --dim:#5f7c9c;
  --teal:#46d6c4; --teal-d:#1f9e90;
  --amber:#f6b352; --rose:#f06b8e; --good:#5fe0a8; --bad:#f06b8e;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Outfit","Noto Sans JP",sans-serif;
  background:radial-gradient(1100px 600px at 80% -8%,rgba(70,214,196,.10),transparent 55%),
             radial-gradient(900px 500px at 5% 5%,rgba(246,179,82,.07),transparent 50%),
             var(--bg);
  color:var(--ink); line-height:1.6; padding-bottom:80px;
}
.wrap{max-width:880px;margin:0 auto;padding:0 18px}
header{padding:46px 0 30px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--bg2),transparent)}
.eyebrow{font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:10px}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(2rem,6vw,3rem);line-height:1.04}
.sub{color:var(--muted);margin-top:12px;font-size:1rem;max-width:600px}
.scoreboard{position:sticky;top:0;z-index:50;background:rgba(10,22,38,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.scoreboard .wrap{display:flex;align-items:center;gap:14px;padding:11px 18px;flex-wrap:wrap}
.scorenum{font-family:"JetBrains Mono",monospace;font-size:1.05rem;color:var(--teal);font-weight:500}
.scorelbl{color:var(--muted);font-size:.85rem}
.bar{flex:1;min-width:120px;height:7px;background:var(--card2);border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal-d),var(--teal));border-radius:99px;transition:width .5s ease}
.resetbtn{font-family:inherit;font-size:.78rem;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;cursor:pointer;transition:.2s}
.resetbtn:hover{color:var(--ink);border-color:var(--teal-d)}
nav.toc{display:flex;gap:8px;flex-wrap:wrap;padding:22px 0 6px}
nav.toc a{font-size:.82rem;color:var(--muted);text-decoration:none;padding:7px 13px;border:1px solid var(--line);border-radius:99px;background:var(--card);transition:.2s;white-space:nowrap}
nav.toc a:hover{color:var(--ink);border-color:var(--teal-d);transform:translateY(-1px)}
section{margin-top:44px;scroll-margin-top:64px}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}
.sec-no{font-family:"JetBrains Mono",monospace;font-size:.9rem;color:var(--teal);letter-spacing:.05em}
.sec-head h2{font-family:"Fraunces",serif;font-weight:600;font-size:1.5rem}
.sec-score{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:.82rem;color:var(--muted);white-space:nowrap;align-self:center}
.q{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:18px 18px 16px;margin-bottom:14px;transition:border-color .25s}
.q.correct{border-color:var(--teal-d)}
.q.wrong{border-color:var(--rose)}
.q-top{display:flex;gap:12px;align-items:flex-start}
.qn{font-family:"JetBrains Mono",monospace;font-size:.78rem;color:var(--teal);background:rgba(70,214,196,.1);border:1px solid var(--line);border-radius:7px;padding:3px 8px;flex-shrink:0;margin-top:2px;min-width:34px;text-align:center}
.q-body{flex:1}
.prompt{font-size:1.02rem;margin-bottom:4px}
.opts{display:flex;flex-direction:column;gap:8px;margin-top:11px}
.opt{font-family:inherit;font-size:.9rem;color:var(--ink);background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;cursor:pointer;transition:.16s;text-align:left;line-height:1.5}
.opt:hover:not(:disabled){border-color:var(--teal-d);transform:translateY(-1px)}
.opt:disabled{cursor:default}
.opt.pick-correct{background:rgba(95,224,168,.16);border-color:var(--good);color:#cdfbe5}
.opt.pick-wrong{background:rgba(240,107,142,.14);border-color:var(--bad);color:#ffd6e1}
.opt.reveal{border-color:var(--good);color:#cdfbe5}
.fb{margin-top:10px;font-size:.9rem;display:none}
.fb.show{display:block}
.fb .verdict{font-weight:600}
.fb .verdict.g{color:var(--good)}
.fb .verdict.b{color:var(--bad)}
.note{color:var(--muted);margin-top:4px;font-size:.88rem}
.tip{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:10px;padding:12px 15px;margin-bottom:18px;font-size:.9rem;color:var(--muted)}
.tip b{color:var(--amber)}
footer{margin-top:60px;padding-top:24px;border-top:1px solid var(--line);color:var(--dim);font-size:.82rem;text-align:center}
@media(max-width:560px){.q-top{flex-direction:column;gap:7px}}
</style>
</head>

<div class="scoreboard">

    <p class="sub">「なぜ」「どのように」を問う応用問題全30問。接合の原理・溶接法の特徴・欠陥メカニズムを深く理解しよう。</p>

<div class="wrap">

<footer>加工学 接合 応用問題 ｜ 接合分類・原理10問・各種溶接法10問・欠陥・変形・検査10問 計30問</footer>

<script>
const STORAGE_KEY = "kakougaku_setugou_oyo_v1";

const SECTIONS = [

{id:"s1", no:"01", title:"接合の分類・原理", qs:[

{type:"single",
 q:"溶接（融接）と機械的接合（ボルト締結）の本質的な違いとして正しいものを選べ",
 opts:[

   "融接はボルトより常に強度が高く、あらゆる用途で機械的接合より優れている",

 ],
 ans:"融接は材料を局所的に溶融させ金属原子間の金属結合を直接形成して一体化するため、接合部の強度は理論的に母材と同等に達しうる。ボルトは摩擦力と圧縮力で機械的に固定するため分解・再組立が可能だが応力集中が生じる",
 note:"接合分類：機械的接合（ボルト・リベット・焼きばめ）→物理的固定・分解可能。冶金的接合（融接・圧接・ろう付け）→金属原子間結合形成・高強度。融接は理論上母材強度と同等だが欠陥があれば低下する。"},

{type:"single",
 q:"HAZ（熱影響部 Heat Affected Zone）が溶接継手の弱点になりやすい理由として正しいものを選べ",
 opts:[
   "HAZは溶融はしていないが溶接熱サイクル（急加熱・急冷）により結晶組織が変化し、場所によって硬化・軟化・粗大粒化・残留応力集中が起きるため、母材や溶接金属と異なる不均一な特性分布が形成されて破断起点になりやすい",
   "HAZは溶接金属より高温になるため完全に溶融し、そのまま凝固して欠陥が多く生じる",
   "HAZは冷却速度が遅いため全域でフェライト化し脆弱になる",

 ],

 note:"HAZ（ビードと母材の間）の温度履歴：溶接金属近傍は1400℃近く→急冷でマルテンサイト→硬化・脆化。遠ざかるほど低温→軟化域（A3付近）・粒粗大化域など複雑な分布。最弱部はHAZ内の粒粗大化域や軟化域が多い。"},

{type:"single",
 q:"SPR（Self Piercing Rivet）が異種材料（アルミニウムと鋼板）の接合に用いられる理由として正しいものを選べ",
 opts:[
   "SPRは孔を開けずにリベットが自力で板を貫通してかしめるため、孔あけ工程が不要で工程が短縮でき、さらに溶接（アーク・スポット）では難しいAlと鋼の異種材を熱を加えずに機械的に接合できる。自動車の軽量化設計で重要",
   "SPRはスポット溶接と同じ原理でジュール熱を使って接合する。孔を開けるため予備工程が必要",
   "SPRはアルミ専用の接合法で、鋼板には使用できない",
   "SPRは接着剤を使って板を固定した後、リベットで固定する複合接合法である"
 ],
 ans:"SPRは孔を開けずにリベットが自力で板を貫通してかしめるため、孔あけ工程が不要で工程が短縮でき、さらに溶接（アーク・スポット）では難しいAlと鋼の異種材を熱を加えずに機械的に接合できる。自動車の軽量化設計で重要",
 note:"SPR（Self Piercing Rivet）：リベットをそのまま材料に打ち込み貫通→下側でかしめ形成→孔あけ不要。Alと鋼の異種材接合：溶接では両者の融点・熱膨張率の違いでクラックや金属間化合物が生成するため困難→SPRは熱を使わない機械的接合で解決。"},

{type:"single",
 q:"焼きばめ（shrink fitting）の接合原理として正しいものを選べ",
 opts:[
   "外輪を加熱して熱膨張させ軸に嵌め込み、冷却収縮により軸を強く締め付ける。接触面の締付け圧力と摩擦力で大きなトルク伝達が可能。ボルト不要・接合部に段差なし・高精度が特徴",
   "外輪を冷却して収縮させてから軸に嵌め、加熱して膨張させることで固定する",
   "焼きばめはろう材を接触面に塗布して加熱することで接合するろう付けの一種",
   "焼きばめは接触面を溶融接合するため、溶接の一種として分類される"
 ],
 ans:"外輪を加熱して熱膨張させ軸に嵌め込み、冷却収縮により軸を強く締め付ける。接触面の締付け圧力と摩擦力で大きなトルク伝達が可能。ボルト不要・接合部に段差なし・高精度が特徴",
 note:"焼きばめ原理：Δd = α × d × ΔT（線膨張係数α×寸法×温度差）だけ内径が広がる。例：d=100mm、α=12×10⁻⁶/℃、ΔT=200℃→Δd=0.24mm。設計ではこのΔdがしめしろより大きくなる温度を選択。"},

{type:"single",
 q:"ろう付け（Brazing）と融接（Welding）の最大の違いとして正しいものを選べ",
 opts:[
   "ろう付けは母材を溶融させず、融点が450℃以上のろう材（銀ろう・銅ろう等）を毛細管現象で接合面に流し込んで固化させる。母材への熱影響が最小で異種材・複雑形状の接合が可能。融接は母材自身を溶融して接合する",
   "ろう付けは母材を溶融させる点が融接と同じで、違いはシールドガスの有無だけである",
   "ろう付けは鉄鋼専用の接合法で、アルミや銅には使用できない",
   "ろう付けは常温で行う冷間接合法で、加熱を一切使用しない"
 ],
 ans:"ろう付けは母材を溶融させず、融点が450℃以上のろう材（銀ろう・銅ろう等）を毛細管現象で接合面に流し込んで固化させる。母材への熱影響が最小で異種材・複雑形状の接合が可能。融接は母材自身を溶融して接合する",
 note:"ろう付けのポイント：①ろう材融点 < 母材融点（母材は溶けない）②毛細管現象でろう材が流入（クリアランス0.025〜0.25mm）③フラックスで酸化膜除去④硬ろう≥450℃（銀・銅ろう）/ 軟ろう（はんだ）<450℃。異種材・電子部品・熱交換器など幅広く使用。"},

{type:"single",
 q:"摩擦攪拌接合（FSW）が通常の溶接より熱ひずみが少ない理由として正しいものを選べ",
 opts:[
   "FSWは材料を溶融させない固相接合であり、発生する熱量が融接の1/4〜1/10程度に留まるため加熱範囲が狭くHAZも小さい。また入熱が低いため冷却時の収縮応力・ひずみが格段に小さくなる",
   "FSWは高温で行うため材料が完全に軟化して応力が生じない",
   "FSWはアーク溶接と同じ入熱量だが、シールドガスを使わないためひずみが少ない",
   "FSWは溶接後に焼なまし処理を自動で行うためひずみが解消される"
 ],
 ans:"FSWは材料を溶融させない固相接合であり、発生する熱量が融接の1/4〜1/10程度に留まるため加熱範囲が狭くHAZも小さい。また入熱が低いため冷却時の収縮応力・ひずみが格段に小さくなる",
 note:"FSWの温度：ツールと母材の摩擦熱で材料が塑性流動状態（固相）になる温度（Al合金で約400〜500℃）。融点以下なので凝固収縮なし→引け巣なし→ひずみ小。アーク溶接と比較：同じAlで溶融溶接は1600℃超→収縮量大→ひずみ大。"},

{type:"single",
 q:"電子ビーム溶接が真空チャンバー内で行われる理由として正しいものを選べ",
 opts:[
   "電子はガス分子と衝突すると散乱・減速して集束できなくなるため、真空（10⁻³〜10⁻⁵Pa程度）が必要。同時に真空環境により活性金属（Ti・Zr・Nb等）の酸化や窒化が防止でき、これらの難溶接材料の接合が可能になる",
   "真空中でのみ電子ビームが発生できるため、大気中での使用は物理的に不可能",
   "真空中では電子ビームの温度が上昇して必要な入熱量を得られる",
   "真空中ではビームが母材から反射しやすくなり効率が向上する"
 ],
 ans:"電子はガス分子と衝突すると散乱・減速して集束できなくなるため、真空（10⁻³〜10⁻⁵Pa程度）が必要。同時に真空環境により活性金属（Ti・Zr・Nb等）の酸化や窒化が防止でき、これらの難溶接材料の接合が可能になる",
 note:"電子ビーム溶接：電子銃→電子加速（数十〜数百kV）→集束レンズで微細スポットに集光→母材に照射→運動エネルギー→熱。特長：エネルギー密度最高（10⁶〜10⁸W/cm²）→キーホール溶接→深溶込み（アスペクト比10以上可）・HAZ最小。"},

{type:"single",
 q:"スポット溶接（Spot Welding）でナゲット（接合核）が形成されるメカニズムとして正しいものを選べ",
 opts:[
   "電極で板を加圧しながら大電流（数千〜数万A）を通電すると、接触抵抗が最も大きい板と板の界面でジュール熱Q=I²Rtが集中発生し、界面の金属が溶融してレンズ状の溶接金属（ナゲット）が形成される",
   "スポット溶接は電極から発するアーク熱で板表面を溶かしてナゲットを形成する",
   "ナゲットは板の表面に形成され、板の内部は接合されない",
   "スポット溶接はレーザーを用いて点状に溶融させるため「スポット」と呼ばれる"
 ],
 ans:"電極で板を加圧しながら大電流（数千〜数万A）を通電すると、接触抵抗が最も大きい板と板の界面でジュール熱Q=I²Rtが集中発生し、界面の金属が溶融してレンズ状の溶接金属（ナゲット）が形成される",
 note:"スポット溶接のメカニズム：①電極で加圧→接触面の酸化膜破壊・接触抵抗確定②通電（0.1〜1秒程度）→Q=I²Rtで板間界面が最高温→溶融③通電停止→加圧継続→ナゲット凝固。ナゲット径は板厚の約5×√t mm目安。電流・時間・加圧力が3大管理項目。"},

{type:"single",
 q:"軟ろう付け（Soldering）ではんだが電子部品の接合に広く使用される理由として正しいものを選べ",
 opts:[
   "はんだ（Sn系合金）は融点が200℃前後と低いため、電子部品・半導体・基板を熱損傷させずに接合できる。さらに毛細管現象でパターン間を充填し複数箇所を一括接合でき、電気伝導性も確保される",
   "はんだは融点が450℃以上のため高温に強い電子部品の接合に向いている",
   "はんだ付けは母材を溶融させて接合するため、融接の一種として扱われる",

 ],
 ans:"はんだ（Sn系合金）は融点が200℃前後と低いため、電子部品・半導体・基板を熱損傷させずに接合できる。さらに毛細管現象でパターン間を充填し複数箇所を一括接合でき、電気伝導性も確保される",
 note:"はんだ組成：従来はSn-Pb（融点183℃）→現在はRoHS規制によりSn-Ag-Cu系（Sn96.5-Ag3-Cu0.5、融点約217℃）が主流。フラックスが酸化膜を除去しぬれ性を確保→毛細管現象で接合面に流入→凝固で接合。"},

{type:"single",
 q:"接合法を選択する際に「異種材接合」が課題となる理由として正しいものを選べ",
 opts:[
   "異種金属（例：AlとFe）を融接しようとすると融点・熱膨張率・熱伝導率の違いから溶接部に大きな残留応力が発生し、さらに界面に脆い金属間化合物（Fe₃Al等）が生成して接合強度が著しく低下する。このためSPR・FSW・接着・ろう付けなど熱の少ない接合法が有効",
   "異種材接合で問題になるのは外観だけで、強度や耐久性への影響はほとんどない",
   "異種材接合では必ずシールドガスを使用すれば問題なく融接できる",
   "異種材接合で金属間化合物が生成することがあるが、それらは常に接合強度を向上させる"
 ],
 ans:"異種金属（例：AlとFe）を融接しようとすると融点・熱膨張率・熱伝導率の違いから溶接部に大きな残留応力が発生し、さらに界面に脆い金属間化合物（Fe₃Al等）が生成して接合強度が著しく低下する。このためSPR・FSW・接着・ろう付けなど熱の少ない接合法が有効",
 note:"異種材接合の問題：①熱的：融点差（Al 660℃ vs Fe 1538℃）→片側だけ溶融②膨張率差：α_Al≈23、α_Fe≈12 [×10⁻⁶/℃]→冷却時にひずみ③金属間化合物：Fe₃Al・FeAl₃など脆弱。対策：FSW（固相・低温）・SPR（機械的）・摩擦圧接・接着剤など。"},

]},

{id:"s2", no:"02", title:"各種溶接法の仕組み・選択", qs:[

{type:"single",

 ],

   "入熱量は多いほど常に品質が向上するため、できる限り大電流で溶接するのが正しい",
   "入熱量は材料の種類と全く無関係で、溶接速度のみによって決まる",
   "入熱量が小さいほど溶け込みが深くなるため、薄板には大電流を使用する"
 ],
 ans:"入熱量が大きいほど溶け込みは深く生産性は上がるが、HAZが広がり組織が粗大化して靱性が低下し、冷却時の収縮応力が大きくなって変形・残留応力・割れのリスクが増す。薄板・精密部品には入熱の小さいTIG・レーザーが適し、厚板・高生産には大入熱のSAW・エレクトロスラグが使われる",
 note:"入熱量Q = (V × I) / v [J/mm]（V:電圧、I:電流、v:速度）。材料別制限：高張力鋼・調質鋼→過大入熱でHAZ軟化→Q管理重要。Al合金→過小入熱で融合不良、過大入熱で割れ。二相ステンレス→入熱過大で窒素逸散→フェライト過多→靱性低下。"},

]},

{id:"s3", no:"03", title:"溶接欠陥・変形・検査の原理", qs:[

{type:"single",

   "溶接変形は溶接棒の重さによって生じる重力変形で、上向き溶接を行えば防げる",
   "溶接変形はシールドガスの種類によって決まり、Arガスを使えば変形しない",
   "溶接変形は溶接速度を遅くするほど小さくなるため、低速溶接が変形防止に有効"
 ],
 ans:"溶接で局所的に加熱された部分は膨張しようとするが周囲の冷たい母材に拘束されて自由に膨張できず塑性変形（圧縮）が起きる。冷却時には逆に収縮しようとして引張応力・変形が残留する。この加熱→拘束→塑性変形→冷却収縮のサイクルが溶接変形の原因",
 note:"溶接変形の種類：①縦収縮（溶接線方向）②横収縮（垂直方向）③角変形（ビード断面の非対称収縮）④座屈変形（薄板）⑤回転変形。対策：①逆変形（事前に逆方向に曲げる）②剛性固定（拘束治具）③バックステップ法④対称溶接⑤ピーニング（ハンマで叩く）。"},

{type:"single",
 q:"溶接部のポロシティ（気孔）が発生するメカニズムとして正しいものを選べ",
 opts:[
   "溶融金属は液体の時に多量のガス（H₂・CO・N₂等）を溶解できるが凝固時に溶解度が急低下するため、溶融金属内で過飽和になったガスが泡として析出し、凝固前に浮上・逃げ出せなかった泡がそのまま空洞（ポロシティ）として残留する",
   "ポロシティは溶接中に混入した砂・スラグ粒子が残留したもので、ガスとは無関係",
   "ポロシティは電流が高すぎて溶接金属が蒸発して穴が残ったものである",
   "ポロシティは溶接金属が凝固するときに収縮した空洞で、引け巣と同じメカニズム"
 ],
 ans:"溶融金属は液体の時に多量のガス（H₂・CO・N₂等）を溶解できるが凝固時に溶解度が急低下するため、溶融金属内で過飽和になったガスが泡として析出し、凝固前に浮上・逃げ出せなかった泡がそのまま空洞（ポロシティ）として残留する",
 note:"ポロシティの原因別対策：H₂（水分・油・さび）→乾燥・清掃・低水素系溶接棒。CO（母材の炭素+酸素→CO）→脱酸剤添加・電流適正化。N₂（大気混入）→シールドガス流量↑・ノズル距離確認。Al溶接でのポロシティは主にH₂。"},

{type:"single",

// ===== State & Storage =====
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")}catch{return {}}}
function saveState(s){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}catch{}}
let state=loadState();


// ===== Score =====
function updateScore(){
  let total=0,correct=0;
  SECTIONS.forEach(sec=>{
    let sc=0,st=0;
    sec.qs.forEach((q,qi)=>{
      const k=sec.id+"_"+qi;
      if(state[k]!==undefined){total++;st++;}
      if(state[k]===true){correct++;sc++;}
    });
    const el=document.getElementById("ss_"+sec.id);
    if(el)el.textContent=sc+" / "+sec.qs.length;
  });
  const all=SECTIONS.reduce((a,s)=>a+s.qs.length,0);
  document.getElementById("sNum").textContent=correct+" / "+all;
  document.getElementById("sBar").style.width=(all>0?correct/all*100:0)+"%";
}

// ===== Render =====
function render(){
  const toc=document.getElementById("toc");
  const app=document.getElementById("app");
  toc.innerHTML="";app.innerHTML="";
  SECTIONS.forEach(sec=>{
    const a=document.createElement("a");
    a.href="#"+sec.id;a.textContent=sec.no+" "+sec.title;
    toc.appendChild(a);
    const section=document.createElement("section");
    section.id=sec.id;
    section.innerHTML=`<div class="sec-head">
      <span class="sec-no">${sec.no}</span>
      <h2>${sec.title}</h2>
      <span class="sec-score" id="ss_${sec.id}">0 / ${sec.qs.length}</span>
    </div>`;
    sec.qs.forEach((q,qi)=>{
      const key=sec.id+"_"+qi;
      const div=document.createElement("div");
      div.className="q"+(state[key]===true?" correct":state[key]===false?" wrong":"");
      div.id="q_"+key;
      const optsHtml=q.opts.map(o=>`<button class="opt${state[key]!==undefined?(o===q.ans?" reveal":""):""}${state[key]!==undefined?" disabled":""}"
        onclick="pickSingle('${key}','${sec.id}',this,'${o.replace(/'/g,"\\'")}','${q.ans.replace(/'/g,"\\'")}')">
        ${o}</button>`).join("");
      const answered=state[key]!==undefined;
      div.innerHTML=`<div class="q-top">
        <span class="qn">${qi+1}</span>
        <div class="q-body">
          <p class="prompt">${q.q}</p>
          <div class="opts">${optsHtml}</div>
          <div class="fb${answered?" show":""}" id="fb_${key}">
            <span class="verdict ${state[key]===true?"g":"b"}">${state[key]===true?"✓ 正解！":"✗ 不正解"}</span>
            <p class="note">${q.note||""}</p>
          </div>
        </div>
      </div>`;
      if(answered){
        div.querySelectorAll(".opt").forEach(b=>{
          if(b.textContent.trim()===q.ans)b.classList.add("reveal");
        });
      }
      section.appendChild(div);
    });
    app.appendChild(section);
  });
  updateScore();
}

function pickSingle(key,secId,btn,chosen,ans){
  if(state[key]!==undefined)return;
  const correct=chosen===ans;
  state[key]=correct;
  saveState(state);
  if(correct)addPoints(100,key);
  const qDiv=document.getElementById("q_"+key);
  qDiv.classList.add(correct?"correct":"wrong");
  qDiv.querySelectorAll(".opt").forEach(b=>{
    b.disabled=true;
    if(b.textContent.trim()===ans)b.classList.add("reveal");
  });
  if(!correct)btn.classList.add("pick-wrong");
  const fb=document.getElementById("fb_"+key);
  if(fb){fb.classList.add("show");fb.querySelector(".verdict").className="verdict "+(correct?"g":"b");fb.querySelector(".verdict").textContent=correct?"✓ 正解！":"✗ 不正解";}
  updateScore();
}

function resetAll(){
  if(!confirm("回答をリセットしますか？"))return;
  state={};saveState(state);render();
}

render();
</script>
